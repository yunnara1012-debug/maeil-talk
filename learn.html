ern": "put together", "meaning": "조합하다 / 합치다 / 꾸리다", "situation": "무언가를 조립하거나 준비하는 상황", "examples": [{"en": "Let's put it together.", "pronunciation": "렛츠 풋 잇 투게더", "ko": "같이 만들어봐요.", "context": "조립·제작을 함께 하자고 할 때"}, {"en": "Can you put together a report?", "pronunciation": "캔 유 풋 투게더 어 리포트", "ko": "보고서 만들어줄 수 있어요?", "context": "문서 작성을 요청할 때"}, {"en": "She put together a great team.", "pronunciation": "쉬 풋 투게더 어 그레이트 팀", "ko": "그녀는 훌륭한 팀을 꾸렸어요.", "context": "팀 구성을 말할 때"}, {"en": "It's hard to put together a good plan.", "pronunciation": "잇츠 하드 투 풋 투게더 어 굿 플랜", "ko": "좋은 계획을 세우기가 어려워요.", "context": "계획 수립이 어려울 때"}, {"en": "He's very put together.", "pronunciation": "히즈 베리 풋 투게더", "ko": "그는 정말 단정하고 준비된 사람이에요.", "context": "사람의 준비성·단정함을 표현할 때"}], "tip": "put together = assemble / organize. 'well put together' = 잘 정돈된, 준비된. 사람에게도 쓸 수 있어요. 'She's so put together!'(그녀는 정말 완벽해 보여요!)"}, {"day": 65, "type": "학습", "part": "PART 7 — PUT", "pattern": "put away", "meaning": "치우다 / 정리하다", "situation": "물건을 제자리에 놓거나 정리하는 상황", "examples": [{"en": "Please put it away when done.", "pronunciation": "플리즈 풋 잇 어웨이 웬 던", "ko": "다 쓰고 나면 치워놓으세요.", "context": "정리를 부탁할 때"}, {"en": "Put away your phone.", "pronunciation": "풋 어웨이 유어 폰", "ko": "핸드폰 좀 치워요.", "context": "집중하라고 할 때"}, {"en": "Can you put away the groceries?", "pronunciation": "캔 유 풋 어웨이 더 그로서리즈", "ko": "식료품 좀 정리해줄 수 있어요?", "context": "집안일을 부탁할 때"}, {"en": "She put away money for the future.", "pronunciation": "쉬 풋 어웨이 머니 포 더 퓨처", "ko": "그녀는 미래를 위해 돈을 모았어요.", "context": "저축을 말할 때"}, {"en": "Put away your worries for now.", "pronunciation": "풋 어웨이 유어 워리즈 포 나우", "ko": "지금은 걱정은 접어두세요.", "context": "마음을 편히 하라고 할 때"}], "tip": "put away = 물건을 제자리에 치우다. put away money = 돈을 저축하다. put away your worries = 걱정을 접다. 물건·감정·돈 모두에 써요."}, {"day": 66, "type": "학습", "part": "PART 7 — PUT", "pattern": "put down", "meaning": "내려놓다 / 깎아내리다 / 적다", "situation": "무언가를 내려놓거나 메모하는 상황", "examples": [{"en": "Put your phone down.", "pronunciation": "풋 유어 폰 다운", e in = yield = surrender. 압박에 굴복하거나 원하는 것에 져서 허락할 때 써요. 'I gave in to temptation.'(유혹에 져버렸어요.) 도 자주 써요."}, {"day": 77, "type": "학습", "part": "PART 8 — GIVE", "pattern": "give away", "meaning": "나눠주다 / 드러내다 / 비밀을 말해버리다", "situation": "무언가를 공짜로 주거나 비밀이 드러나는 상황", "examples": [{"en": "He gave away the secret.", "pronunciation": "히 게이브 어웨이 더 시크릿", "ko": "그가 비밀을 말해버렸어요.", "context": "비밀이 새어나갔을 때"}, {"en": "She's giving away free samples.", "pronunciation": "쉬즈 기빙 어웨이 프리 샘플즈", "ko": "그녀가 무료 샘플을 나눠주고 있어요.", "context": "무료 배포를 말할 때"}, {"en": "Don't give away the ending!", "pronunciation": "돈 기브 어웨이 디 엔딩", "ko": "결말 말하지 마요!", "context": "스포일러를 막을 때"}, {"en": "His face gave him away.", "pronunciation": "히즈 페이스 게이브 힘 어웨이", "ko": "그의 표정이 들켰어요.", "context": "감정이 드러났을 때"}, {"en": "We're giving away prizes today.", "pronunciation": "위어 기빙 어웨이 프라이지즈 투데이", "ko": "오늘 경품을 드립니다.", "context": "이벤트 안내할 때"}], "tip": "give away = ① 공짜로 주다 ② 비밀·정보를 드러내다. 'It gives it away.'(그게 딱 보여요 / 티가 나요.) 처럼 무언가가 들켰을 때도 써요."}, {"day": 78, "type": "학습", "part": "PART 8 — GIVE", "pattern": "give a call", "meaning": "전화하다", "situation": "전화를 하거나 연락을 부탁하는 상황", "examples": [{"en": "Give me a call later.", "pronunciation": "기브 미 어 콜 레이러", "ko": "나중에 전화해요.", "context": "연락 요청할 때"}, {"en": "I'll give you a call when I arrive.", "pronunciation": "아일 기브 유 어 콜 웬 아이 어라이브", "ko": "도착하면 전화할게요.", "context": "연락 시점을 약속할 때"}, {"en": "Give her a call — she needs to hear from you.", "pronunciation": "기브 허 어 콜 쉬 니즈 투 히어 프럼 유", "ko": "그녀에게 전화해요 — 당신 연락이 필요해요.", "context": "연락을 권할 때"}, {"en": "Can I give you a quick call?", "pronunciation": "캔 아이 기브 유 어 퀵 콜", "ko": "짧게 전화해도 될까요?", "context": "통화 허락을 구할 때"}, {"en": "Just give me a call anytime.", "pronunciation": "저스트 기브 미 어 콜 애니타임", "ko": "언제든지 전화해요.", "context": "편하게 연락하라고 할 때"}], "tip": "give a call = make a call = call. 셋 다 '전화하다'예요. give a call이 조금 더 친근하고 구어체예요. 'Give me a ring.'도 영국식으로 자주 써요."}, {"day": 79, "type": "학습", "part": "PART 8 — GIVE", "pattern": "give credit", "meaning": "공을 인정하다 / 칭찬하다", "situation": "누군가의 노력이나 성과를 인정해주는 상황", "examples": [{"en": "Give credit where it's due.", "pronunciation": "기브 크레딧 웨어 잇츠 듀", "ko": "공이 있는 곳에 공을 인정해요.", "context": "올바른 인정의 중요성을 말할 때"}, {"en": "You have to give her credit for trying.", "pronunciation": "유 해브 투 기브 허 크레딧 포 트라잉", "ko": "도전한 것만큼은 인정해줘야 해요.", "context": "노력을 인정할 때"}, {"en": "I don't get enough credit.", "pronunciation": "아이 돈 겟 이너프 크레딧", "ko": "제가 충분히 인정받지 못하고 있어요.", "context": "인정받지 못할 때"}, {"en": "Let's give credit to the whole team.", "pronunciation": "렛츠 기브 크레딧 투 더 홀 팀", "ko": "팀 전체에게 공을 돌려요.", "context": "팀워크를 인정할 때"}, {"en": "She never gets the credit she deserves.", "pronunciation": "쉬 네버 겟츠 더 크레딧 쉬 디저브즈", "ko": "그녀는 받아야 할 인정을 받지 못해요.", "context": "불공평한 상황을 말할 때"}], "tip": "give credit = 공을 인정하다. take credit = 공을 가져가다(혼자 다 차지하다). 'Don't take all the credit!'(혼자 다 차지하지 마요!) 도 함께 외워두세요."}, {"day": 80, "type": "복습", "part": "PART 8 — GIVE 총정리", "pattern": "GIVE 복습", "meaning": "Day 71~79 핵심 표현 총정리", "situation": "GIVE 동사 9가지 표현 복습", "examples": [{"en": "Give it a try — don't give up!", "pronunciation": "기브 잇 어 트라이 돈 기브 업", "ko": "한번 해봐요 — 포기하지 마요!", "context": "give it a try + give up 콤보"}, {"en": "Give me a sec — I'll give you a call right back.", "pronunciation": "기브 미 어 섹 아일 기브 유 어 콜 라잇 백", "ko": "잠깐만요 — 바로 전화할게요.", "context": "give a sec + give a call 콤보"}, {"en": "Can you give me a hand? I won't give in.", "pronunciation": "캔 유 기브 미 어 핸드 아이 원 기브 인", "ko": "도와줄 수 있어요? 포기 안 할 거예요.", "context": "give a hand + give in 콤보"}, {"en": "Give back what you borrowed and give credit to others.", "pronunciation": "기브 백 왓 유 보로우드 앤 기브 크레딧 투 아더즈", "ko": "빌린 것을 돌려주고 다른 사람에게 공을 인정해요.", "context": "give back + give credit 콤보"}, {"en": "Don't give away the secret — give her a chance.", "pronunciation": "돈 기브 어웨이 더 시크릿 기브 허 어 찬스", "ko": "비밀 말하지 말고 — 그녀에게 기회를 줘요.", "context": "give away + give 콤보"}], "tip": "GIVE 9가지: give it a try / give up / give me a sec / give a hand / give back / give in / give away / give a call / give credit — 80일 완성! 마지막 20일!"}, {"day": 81, "type": "학습", "part": "PART 9 — LOOK", "pattern": "look for", "meaning": "찾다", "situation": "잃어버린 물건이나 원하는 것을 찾는 상황", "examples": [{"en": "I'm looking for my keys.", "pronunciation": "아임 루킹 포 마이 키즈", "ko": "열쇠를 찾고 있어요.", "context": "잃어버린 물건을 찾을 때"}, {"en": "What are you looking for?", "pronunciation": "왓 아 유 루킹 포", "ko": "뭘 찾고 있어요?", "context": "도움을 제안할 때"}, {"en": "I'm looking for a new job.", "pronunciation": "아임 루킹 포 어 뉴 잡", "ko": "새 직장을 구하고 있어요.", "context": "구직 중임을 말할 때"}, {"en": "She's looking for a place to stay.", "pronunciation": "쉬즈 루킹 포 어 플레이스 투 스테이", "ko": "그녀는 머물 곳을 찾고 있어요.", "context": "숙소를 찾는 상황"}, {"en": "I found what I was looking for.", "pronunciation": "아이 파운드 왓 아이 워즈 루킹 포", "ko": "찾던 걸 찾았어요.", "context": "원하던 것을 발견했을 때"}], "tip": "look for = search for. 'I'm just looking.'(그냥 구경 중이에요.) 은 가게에서 직원이 도움을 물을 때 쓰는 표현이에요. 외워두면 쇼핑할 때 바로 써요!"}, {"day": 82, "type": "학습", "part": "PART 9 — LOOK", "pattern": "look like", "meaning": "~처럼 보이다 / ~와 닮다", "situation": "외모나 상태가 어떻게 보이는지 말하는 상황", "examples": [{"en": "You look like your mom.", "pronunciation": "유 룩 라이크 유어 맘", "ko": "엄마 닮았어요.", "context": "닮은 사람을 말할 때"}, {"en": "It looks like rain.", "pronunciation": "잇 룩스 라이크 레인", "ko": "비가 올 것 같아요.", "context": "날씨를 예측할 때"}, {"en": "You look like you need sleep.", "pronunciation": "유 룩 라이크 유 니드 슬립", "ko": "잠이 필요해 보여요.", "context": "피곤해 보이는 사람에게"}, {"en": "What does it look like?", "pronunciation": "왓 더즈 잇 룩 라이크", "ko": "어떻게 생겼어요?", "context": "외형을 물을 때"}, {"en": "This looks like a good deal.", "pronunciation": "디스 룩스 라이크 어 굿 딜", "ko": "이거 괜찮은 것 같아요.", "context": "좋은 거래처럼 보일 때"}], "tip": "look like + 명사 = ~처럼 보이다. look like + 주어+동사 = ~인 것 같아 보이다. 'It looks like he's tired.'(그가 피곤해 보여요.) 패턴으로 많이 써요."}, {"day": 83, "type": "학습", "part": "PART 9 — LOOK", "pattern": "look into", "meaning": "조사하다 / 알아보다", "situation": "문제나 사안을 파악하거나 조사하는 상황", "examples": [{"en": "I'll look into it.", "pronunciation": "아일 룩 인투 잇", "ko": "알아볼게요.", "context": "조사하겠다고 할 때"}, {"en": "Can you look into this for me?", "pronunciation": "캔 유 룩 인투 디스 포 미", "ko": "이거 좀 알아봐줄 수 있어요?", "context": "조사를 부탁할 때"}, {"en": "We need to look into the problem.", "pronunciation": "위 니드 투 룩 인투 더 프라블럼", "ko": "문제를 파악해봐야 해요.", "context": "원인 파악이 필요할 때"}, {"en": "The police are looking into the case.", "pronunciation": "더 폴리스 아 루킹 인투 더 케이스", "ko": "경찰이 사건을 조사하고 있어요.", "context": "수사 상황을 말할 때"}, {"en": "I looked into it and found the answer.", "pronunciation": "아이 룩트 인투 잇 앤 파운드 디 앤서", "ko": "알아봤더니 답을 찾았어요.", "context": "조사 결과를 말할 때"}], "tip": "look into = investigate = check out. 'I'll look into it.'은 비즈니스·일상에서 모두 자주 써요. 즉답을 못할 때 '확인해볼게요'의 자연스러운 표현이에요."}, {"day": 84, "type": "학습", "part": "PART 9 — LOOK", "pattern": "look forward to", "meaning": "기대하다 / 고대하다", "situation": "앞으로 있을 일을 설레며 기다리는 상황", "examples": [{"en": "I'm looking forward to it.", "pronunciation": "아임 루킹 포워드 투 잇", "ko": "기대하고 있어요.", "context": "설레는 마음을 표현할 때"}, {"en": "I'm looking forward to meeting you.", "pronunciation": "아임 루킹 포워드 투 미팅 유", "ko": "만날 날이 기대돼요.", "context": "이메일이나 첫 만남 전에"}, {"en": "We're looking forward to the trip.", "pronunciation": "위어 루킹 포워드 투 더 트립", "ko": "여행이 기대돼요.", "context": "여행 전 기대를 표현할 때"}, {"en": "I look forward to hearing from you.", "pronunciation": "아이 룩 포워드 투 히링 프럼 유", "ko": "답장 기다릴게요.", "context": "이메일 마무리 문장으로"}, {"en": "What are you looking forward to?", "pronunciation": "왓 아 유 루킹 포워드 투", "ko": "뭐가 기대돼요?", "context": "상대방의 설렘을 물을 때"}], "tip": "look forward to + 명사/동명사(~ing). to 다음에 반드시 명사나 ~ing 형태가 와요. 'I look forward to seeing you.' (O) / 'I look forward to see you.' (X)"}, {"day": 85, "type": "학습", "part": "PART 9 — LOOK", "pattern": "look up", "meaning": "찾아보다 / 올려다보다 / 상황이 나아지다", "situation": "정보를 검색하거나 위를 올려다보는 상황", "examples": [{"en": "Look it up on Google.", "pronunciation": "룩 잇 업 온 구글", "ko": "구글에 찾아봐요.", "context": "검색을 권할 때"}, {"en": "Can you look up the address?", "pronunciation": "캔 context": "상대방 의견을 물을 때"}], "tip": "I think...는 100% 확신이 아닌 의견이에요. 더 강하면 I'm sure, 더 약하면 I guess. 'What do you think?'는 대화에서 정말 자주 쓰는 표현이에요!"}, {"day": 92, "type": "학습", "part": "PART 10 — THINK", "pattern": "think about", "meaning": "~에 대해 생각하다 / 고려하다", "situation": "어떤 주제나 결정에 대해 고민하는 상황", "examples": [{"en": "I'm thinking about it.", "pronunciation": "아임 띵킹 어바웃 잇", "ko": "생각 중이에요.", "context": "결정을 미룰 때"}, {"en": "Think about it carefully.", "pronunciation": "띵크 어바웃 잇 케어풀리", "ko": "신중하게 생각해봐요.", "context": "서두르지 말라고 할 때"}, {"en": "What are you thinking about?", "pronunciation": "왓 아 유 띵킹 어바웃", "ko": "무슨 생각하고 있어요?", "context": "상대방 생각을 물을 때"}, {"en": "I've been thinking about changing jobs.", "pronunciation": "아이브 빈 띵킹 어바웃 체인징 잡즈", "ko": "직장을 바꾸는 것을 생각하고 있어요.", "context": "고민 중인 일을 말할 때"}, {"en": "I don't even want to think about it.", "pronunciation": "아이 돈 이븐 원 투 띵크 어바웃 잇", "ko": "생각도 하기 싫어요.", "context": "떠올리기 싫을 때"}], "tip": "think about = 생각하다 (일반적). think about + 동명사(~ing) = ~하는 것을 고려하다. 'Are you thinking about it?'(생각해보고 있어요?) 으로 결정 상황을 확인할 때도 써요."}, {"day": 93, "type": "학습", "part": "PART 10 — THINK", "pattern": "think of", "meaning": "~을 생각해내다 / ~로 여기다 / 떠오르다", "situation": "아이디어가 떠오르거나 누군가를 생각하는 상황", "examples": [{"en": "I can't think of a better way.", "pronunciation": "아이 캔 띵크 오브 어 베러 웨이", "ko": "더 좋은 방법이 생각나지 않아요.", "context": "최선의 방법을 찾을 때"}, {"en": "Can you think of anyone who can help?", "pronunciation": "캔 유 띵크 오브 애니원 후 캔 헬프", "ko": "도와줄 수 있는 사람 떠오르는 사람 있어요?", "context": "아는 사람을 떠올려달라고 할 때"}, {"en": "I always think of you.", "pronunciation": "아이 올웨이즈 띵크 오브 유", "ko": "항상 당신 생각해요.", "context": "그리움을 표현할 때"}, {"en": "What do you think of it?", "pronunciation": "왓 두 유 띵크 오브 잇", "ko": "어떻게 생각해요?", "context": "평가나 느낌을 물을 때"}, {"en": "Think of it as an opportunity.", "pronunciation": "띵크 오브 잇 애즈 언 오퍼튜니티", "ko": "이걸 기회로 생각해봐요.", "context": "긍정적으로 바라보라고 할 때"}], "tip": "think of vs think about: think of = 갑자기 떠오르다 / 평가하다. think about = 계속 생각하다 / 고민하다. 'What do you think of it?'(어떻게 생각해요?) 은 평가를 물을 때, 'What are you thinking about?'은 무슨 생각을 하는지 물을 때예요."}, {"day": 94, "type": "학습", "part": "PART 10 — THINK", "pattern": "think over", "meaning": "신중하게 생각하다 / 숙고하다", "situation": "중요한 결정 전에 충분히 생각하는 상황", "examples": [{"en": "Let me think it over.", "pronunciation": "렛 미 띵크 잇 오버", "ko": "잘 생각해볼게요.", "context": "즉답을 피하고 생각할 시간이 필요할 때"}, {"en": "Think it over before deciding.", "pronunciation": "띵크 잇 오버 비포 디사이딩", "ko": "결정하기 전에 신중하게 생각해봐요.", "context": "서두르지 말라고 조언할 때"}, {"en": "I need more time to think it over.", "pronunciation": "아이 니드 모어 타임 투 띵크 잇 오버", "ko": "더 생각해볼 시간이 필요해요.", "context": "즉답이 어려울 때"}, {"en": "She thought it over and said yes.", "pronunciation": "쉬 쏫 잇 오버 앤 세드 예스", "ko": "그녀는 신중하게 생각 후 승낙했어요.", "context": "숙고 후 결정했을 때"}, {"en": "I've thought it over and I'm ready.", "pronunciation": "아이브 쏫 잇 오버 앤 아임 레디", "ko": "충분히 생각했고 준비됐어요.", "context": "결정이 끝났을 때"}], "tip": "think over = 충분히 생각하다. 'Let me think it over.'는 비즈니스와 일상 모두에서 자주 써요. 즉답을 피할 때 가장 정중한 표현이에요."}, {"day": 95, "type": "학습", "part": "PART 10 — THINK", "pattern": "think so / not think so", "meaning": "그렇게 생각해요 / 그렇게 생각하지 않아요", "situation": "동의하거나 반대 의견을 간단하게 말하는 상황", "examples": [{"en": "I think so.", "pronunciation": "아이 띵크 쏘", "ko": "그렇게 생각해요. / 그런 것 같아요.", "context": "동의할 때 간단하게"}, {"en": "I don't think so.", "pronunciation": "아이 돈 띵크 쏘", "ko": "그렇게 생각하지 않아요.", "context": "부드럽게 반대할 때"}, {"en": "Do you think so?", "pronunciation": "두 유 띵크 쏘", "ko": "그렇게 생각해요?", "context": "상대방 의견을 확인할 때"}, {"en": "I hope so.", "pronunciation": "아이 호프 쏘", "ko": "그랬으면 좋겠어요.", "context": "바람을 표현할 때 (think so와 함께 외우기)"}, {"en": "I guess so.", "pronunciation": "아이 게스 쏘", "ko": "그런 것 같기도 해요.", "context": "확신이 없을 때 (think so보다 더 약함)"}], "tip": "I think so. / I don't think so. / I hope so. / I guess so. 네 가지를 함께 외우면 동의·반대·바람·불확실함을 모두 표현할 수 있어요!"}, {"day": 96, "type": "학습", "part": "PART 10 — THINK", "pattern": "think ahead", "meaning": "미리 생각하다 / 앞을 내다보다", "situation": "미리 계획하거나 결과를 예측하는 상황", "examples": [{"en": "You need to think ahead.", "pronunciation": "유 니드 투 띵크 어헤드", "ko": "미리 생각해야 해요.", "context": "준비성을 강조할 때"}, {"en": "I didn't think ahead and now I'm in trouble.", "pronunciation": "아이 디든 띵크 어헤드 앤 나우 아임 인 트러블", "ko": "미리 생각 못했더니 지금 문제가 생겼어요.", "context": "준비 부족의 결과를 말할 때"}, {"en": "Always think ahead when making plans.", "pronunciation": "올웨이즈 띵크 어헤드 웬 메이킹 플랜즈", "ko": "계획할 때는 항상 앞을 내다봐야 해요.", "context": "조언할 때"}, {"en": "She thinks ahead — that's why she succeeds.", "pronunciation": "쉬 띵크스 어헤드 댓츠 와이 쉬 석시즈", "ko": "그녀는 미리 생각해요 — 그래서 성공하는 거예요.", "context": "성공 비결을 말할 때"}, {"en": "Let's think ahead and prepare.", "pronunciation": "렛츠 띵크 어헤드 앤 프리페어", "ko": "미리 생각하고 준비해요.", "context": "사전 준비를 권할 때"}], "tip": "think ahead = plan ahead = 미리 생각하다/준비하다. 'Think ahead!'는 즉흥적인 사람에게 준비성을 강조할 때 쓰는 표현이에요."}, {"day": 97, "type": "학습", "part": "PART 10 — THINK", "pattern": "think twice", "meaning": "다시 생각하다 / 신중하게 고려하다", "situation": "섣불리 행동하기 전에 다시 생각하라고 할 때", "examples": [{"en": "Think twice before deciding.", "pronunciation": "띵크 트와이스 비포 디사이딩", "ko": "결정하기 전에 다시 생각해봐요.", "context": "신중한 결정을 권할 때"}, {"en": "I should have thought twice.", "pronunciation": "아이 슈드 해브 쏫 트와이스", "ko": "다시 생각했어야 했어요.", "context": "경솔했음을 후회할 때"}, {"en": "I didn't think twice about it.", "pronunciation": "아이 디든 띵크 트와이스 어바웃 잇", "ko": "전혀 망설이지 않았어요.", "context": "확신이 있었을 때"}, {"en": "Think twice — this is a big decision.", "pronunciation": "띵크 트와이스 디스 이즈 어 빅 디시전", "ko": "다시 생각해봐요 — 중요한 결정이에요.", "context": "신중함을 강조할 때"}, {"en": "She never thinks twice about helping others.", "pronunciation": "쉬 네버 띵크스 트와이스 어바웃 헬핑 아더즈", "ko": "그녀는 남 돕는 것을 전혀 주저하지 않아요.", "context": "망설임 없는 선한 행동을 표현할 때"}], "tip": "think twice = 신중하게 다시 생각하다. 'without thinking twice' = 망설임 없이. 두 가지 반대 방향으로 모두 쓸 수 있어요!"}, {"day": 98, "type": "학습", "part": "PART 10 — THINK", "pattern": "think outside the box", "meaning": "창의적으로 생각하다 / 틀을 벗어나 생각하다", "situation": "새로운 관점이나 창의적인 해결책이 필요한 상황", "examples": [{"en": "Try to think outside the box.", "pronunciation": "트라이 투 띵크 아웃사이드 더 박스", "ko": "틀을 벗어나 생각해봐요.", "context": "창의력이 필요할 때"}, {"en": "We need to think outside the box here.", "pronunciation": "위 니드 투 띵크 아웃사이드 더 박스 히어", "ko": "여기서 창의적으로 생각해야 해요.", "context": "일반적인 방법이 안 될 때"}, {"en": "She always thinks outside the box.", "pronunciation": "쉬 올웨이즈 띵크스 아웃사이드 더 박스", "ko": "그녀는 항상 창의적으로 생각해요.", "context": "창의적인 사람을 묘사할 때"}, {"en": "Don't be afraid to think outside the box.", "pronunciation": "돈 비 어프레이드 투 띵크 아웃사이드 더 박스", "ko": "창의적으로 생각하는 것을 두려워하지 마요.", "context": "격려할 때"}, {"en": "Thinking outside the box got us here.", "pronunciation": "띵킹 아웃사이드 더 박스 갓 어스 히어", "ko": "창의적인 생각이 우리를 여기까지 이끌었어요.", "context": "성공 요인을 말할 때"}], "tip": "think outside the box = 틀에서 벗어나 생각하다. 비즈니스·교육 모두에서 자주 쓰는 표현이에요. 반대는 think inside the box(틀에 박힌 생각을 하다)예요."}, {"day": 99, "type": "학습", "part": "PART 10 — THINK", "pattern": "I was thinking ~", "meaning": "~하려고 했는데 / ~라고 생각하고 있었는데", "situation": "조심스럽게 제안하거나 생각을 꺼낼 때", "examples": [{"en": "I was thinking we could go out.", "pronunciation": "아이 워즈 띵킹 위 쿠드 고우 아웃", "ko": "나갈 수 있을 것 같아서요.", "context": "제안을 조심스럽게 꺼낼 때"}, {"en": "I was thinking about you.", "pronunciation": "아이 워즈 띵킹 어바웃 유", "ko": "당신 생각하고 있었어요.", "context": "그리움을 표현할 때"}, {"en": "I was thinking — maybe we should wait.", "pronunciation": "아이 워즈 띵킹 메이비 위 슈드 웨이트", "ko": "생각해봤는데 — 기다리는 게 좋을 것 같아요.", "context": "망설임을 담아 제안할 때"}, {"en": "I was thinking of trying something new.", "pronunciation": "아이 워즈 띵킹 오브 트라잉 썸띵 뉴", "ko": "새로운 걸 시도해볼까 생각하고 있었어요.", "context": "새 도전을 고민할 때"}, {"en": "I was just thinking out loud.", "pronunciation": "아이 워즈 저스트 띵킹 아웃 라우드", "ko": "그냥 생각을 말로 꺼낸 거예요.", "context": "무심코 말을 뱉었을 때"}], "tip": "I was thinking... 은 제안·아이디어를 부드럽게 꺼낼 때 써요. 직접 말하기보다 덜 강요하는 뉘앙스예요. 'I was thinking... what do you think?'처럼 의견을 물으며 자주 써요."}, {"day": 100, "type": "마무리", "part": "PART 10 — THINK + 2단계 전체 마무리", "pattern": "2단계 전체 총정리 🎉", "meaning": "기본동사 10개 완전 정복 + 축하", "situation": "100일 완주를 축하하며 전체 내용을 되돌아보는 날", "examples": [{"en": "I think I've got it — I can get along with English now!", "pronunciation": "아이 띵크 아이브 갓 잇 아이 캔 겟 얼롱 위드 잉글리쉬 나우", "ko": "이제 이해한 것 같아요 — 영어랑 잘 지낼 수 있어요!", "context": "GET + THINK 콤보 — 100일 완주 소감"}, {"en": "I've made it — I can make sense of English conversations.", "pronunciation": "아이브 메이드 잇 아이 캔 메잌 센스 오브 잉글리쉬 컨버세이션즈", "ko": "해냈어요 — 영어 대화가 이해되기 시작했어요!", "context": "MAKE + HAVE 콤보 — 성취감 표현"}, {"en": "I've come a long way and I'm looking forward to stage 3.", "pronunciation": "아이브 컴 어 롱 웨이 앤 아임 루킹 포워드 투 스테이지 쓰리", "ko": "멀리 왔어요 — 3단계가 기대돼요!", "context": "COME + LOOK 콤보 — 앞으로의 기대"}, {"en": "Don't give up — keep putting in the effort.", "pronunciation": "돈 기브 업 킵 푸팅 인 디 에퍼트", "ko": "포기하지 마요 — 계속 노력해요.", "context": "GIVE + PUT 콤보 — 격려"}, {"en": "Take it one day at a time — go for it!", "pronunciation": "테잌 잇 원 데이 앳 어 타임 고우 포 잇", "ko": "하루하루 해나가요 — 도전해요!", "context": "TAKE + GO 콤보 — 완주 메시지"}], "tip": "🎉 2단계 100일 완주 축하해요! GET / HAVE / MAKE / TAKE / GO / COME / PUT / GIVE / LOOK / THINK — 기본동사 10개로 500개 표현 완성! 이제 3단계 실전 회화로 Go for it!"}],3:[{"day": 1, "type": "학습", "part": "PART 1 — 일상", "situation": "카페에서 주문하기", "examples": [{"en": "Can I get a latte, please?", "pronunciation": "캔 아이 겟 어 라떼 플리즈", "ko": "라떼 한 잔 주세요.", "context": "가장 기본 주문"}, {"en": "Can I make that iced?", "pronunciation": "캔 아이 메잌 댓 아이스트", "ko": "그거 아이스로 해줄 수 있어요?", "context": "음료 온도 변경"}, {"en": "What size would you like?", "pronunciation": "왓 사이즈 우쥬 라이크", "ko": "사이즈는 어떻게 드릴까요?", "context": "직원이 물어볼 때"}, {"en": "Can I add an extra shot?", "pronunciation": "캔 아이 애드 언 엑스트라 샷", "ko": "샷 추가할 수 있어요?", "context": "샷 추가 요청"}, {"en": "For here or to go?", "pronunciation": "포 히어 오어 투 고", "ko": "여기서 드실 건가요, 가져가실 건가요?", "context": "직원이 물어보는 표현"}], "tip": "'Can I get ~?'는 카페에서 가장 자연스러운 주문 표현이에요. 'I'd like ~'보다 더 캐주얼하고 원어민답게 들려요."}, {"day": 2, "type": "학습", "part": "PART 1 — 일상", "situation": "카페에서 문제 해결하기", "examples": [{"en": "Excuse me, this isn't what I ordered.", "pronunciation": "익스큐즈 미 디스 이즌 왓 아이 오더드", "ko": "저기요, 제가 주문한 게 아닌 것 같아요.", "context": "잘못된 음료를 받았을 때"}, {"en": "My drink is way too sweet.", "pronunciation": "마이 드링크 이즈 웨이 투 스위트", "ko": "음료가 너무 달아요.", "context": "맛이 맞지 않을 때"}, {"en": "Could you remake this, please?", "pronunciation": "쿠쥬 리메잌 디스 플리즈", "ko": "다시 만들어줄 수 있어요?", "context": "교체 요청할 때"}, {"en": "There's no wifi password posted anywhere.", "pronunciation": "데어즈 노 와이파이 패스워드 포스티드 애니웨어", "ko": "와이파이 비밀번호가 어디에도 없네요.", "context": "와이파이 물어볼 때"}, {"en": "Can I get a receipt, please?", "pronunciation": "캔 아이 겟 어 리싯 플리즈", "ko": "영수증 주실 수 있어요?", "context": "영수증 요청"}], "tip": "문제가 생겼을 때 'Excuse me'로 시작하면 가장 정중해요. 화내지 않고 차분하게 말하는 게 핵심이에요."}, {"day": 3, "type": "학습", "part": "PART 1 — 일상", "situation": "식당 예약하기", "examples": [{"en": "I'd like to make a reservation for two.", "pronunciation": "아이드 라이크 투 메잌 어 레저베이션 포 투", "ko": "두 명으로 예약하고 싶어요.", "context": "전화로 예약할 때"}, {"en": "Do you have any tables available tonight?", "pronunciation": "두 유 해브 애니 테이블즈 어베일러블 투나잇", "ko": "오늘 저녁 자리 있나요?", "context": "당일 예약 문의"}, {"en": "Can I book a table for 7 PM?", "pronunciation": "캔 아이 북 어 테이블 포 세븐 피엠", "ko": "7시로 예약할 수 있을까요?", "context": "시간 지정"}, {"en": "Could we get a window seat?", "pronunciation": "쿠드 위 겟 어 윈도우 싯", "ko": "창가 자리로 부탁드려요.", "context": "자리 요청"}, {"en": "What name should I put the reservation under?", "pronunciation": "왓 네임 슈드 아이 풋 더 레저베이션 언더", "ko": "예약자 성함이 어떻게 되세요?", "context": "직원이 이름을 물을 때"}], "tip": "예약할 때 'I'd like to make a reservation'이 가장 정중한 표현이에요. 전화로 예약 시 꼭 쓰는 표현이니 통째로 외워두세요."}, {"day": 4, "type": "학습", "part": "PART 1 — 일상", "situation": "식당에서 주문하기", "examples": [{"en": "What do you recommend?", "pronunciation": "왓 두 유 레코멘드", "ko": "뭐가 제일 맛있어요?", "context": "메뉴 추천 요청"}, {"en": "I'll have what they're having.", "pronunciation": "아일 해브 왓 데어 해빙", "ko": "저도 저분들이 드시는 걸로 할게요.", "context": "옆 테이블 음식이 맛있어 보일 때"}, {"en": "Does this contain any nuts?", "pronunciation": "더즈 디스 컨테인 애니 넛츠", "ko": "이 음식에 견과류가 들어있나요?", "context": "알레르기 확인"}, {"en": "Can I substitute the fries for salad?", "pronunciation": "캔 아이 섭스티튜트 더 프라이즈 포 샐러드", "ko": "감자튀김 대신 샐러드로 바꿀 수 있나요?", "context": "사이드 메뉴 변경"}, {"en": "We need a few more minutes.", "pronunciation": "위 니드 어 퓨 모어 미닛츠", "ko": "조금 더 시간이 필요해요.", "context": "주문 결정이 안 됐을 때"}], "tip": "'What do you recommend?'는 식당에서 가장 유용한 한 문장이에요. 메뉴를 모를 때, 현지 맛집에서 특선 메뉴를 알고 싶을 때 바로 써요."}, {"day": 5, "type": "학습", "part": "PART 1 — 일상", "situation": "식당에서 계산하기", "examples": [{"en": "Can we get the check, please?", "pronunciation": "캔 위 겟 더 첵 플리즈", "ko": "계산서 주세요.", "context": "식사 후 계산 요청"}, {"en": "Can we split the bill?", "pronunciation": "캔 위 스플릿 더 빌", "ko": "각자 계산할 수 있어요?", "context": "더치페이 요청"}, {"en": "I'll get this one.", "pronunciation": "아일 겟 디스 원", "ko": "제가 낼게요.", "context": "내가 쏘겠다고 할 때"}, {"en": "Is the tip included?", "pronunciation": "이즈 더 팁 인클루디드", "ko": "팁이 포함된 건가요?", "context": "팁 포함 여부 확인"}, {"en": "Keep the change.", "pronunciation": "킵 더 체인지", "ko": "거스름돈은 괜찮아요.", "context": "잔돈을 팁으로 줄 때"}], "tip": "미국에서는 식당 계산 시 보통 15~20% 팁을 줘요. 'Is the gratuity included?'도 같은 의미예요. 영수증에 'Tip included'라고 써있으면 추가 팁 불필요!"}, {"day": 6, "type": "학습", "part": "PART 1 — 일상", "situation": "마트·편의점에서", "examples": [{"en": "Where can I find the milk?", "pronunciation": "웨어 캔 아이 파인드 더 밀크", "ko": "우유는 어디에 있어요?", "context": "상품 위치 물어보기"}, {"en": "Do you have this in stock?", "pronunciation": "두 유 해브 디스 인 스탁", "ko": "이거 재고 있나요?", "context": "재고 확인"}, {"en": "Can I pay by card?", "pronunciation": "캔 아이 페이 바이 카드", "ko": "카드로 계산할 수 있어요?", "context": "결제 방법 확인"}, {"en": "Do you have a loyalty card?", "pronunciation": "두 유 해브 어 로열티 카드", "ko": "멤버십 카드 있으세요?", "context": "직원이 물어볼 때"}, {"en": "Can I get a bag, please?", "pronunciation": "캔 아이 겟 어 백 플리즈", "ko": "봉투 하나 주실 수 있어요?", "context": "쇼핑백 요청"}], "tip": "'Do you carry ~?'도 재고를 묻는 자연스러운 표현이에요. 'Do you carry almond milk?'(아몬드 우유 있어요?) 처럼 써요."}, {"day": 7, "type": "학습", "part": "PART 1 — 일상", "situation": "옷 쇼핑하기", "examples": [{"en": "Do you have this in a larger size?", "pronunciation": "두 유 해브 디스 인 어 라저 사이즈", "ko": "이거 더 큰 사이즈 있나요?", "context": "사이즈 문의"}, {"en": "Can I try this on?", "pronunciation": "캔 아이 트라이 디스 온", "ko": "입어봐도 될까요?", "context": "피팅룸 이용"}, {"en": "Where are the fitting rooms?", "pronunciation": "웨어 아 더 피팅 룸즈", "ko": "탈의실이 어디예요?", "context": "탈의실 위치 문의"}, {"en": "This doesn't fit quite right.", "pronunciation": "디스 더즌 핏 콰이트 라잇", "ko": "이게 잘 안 맞네요.", "context": "사이즈가 맞지 않을 때"}, {"en": "Do you have this in a different color?", "pronunciation": "두 유 해브 디스 인 어 디퍼런트 컬러", "ko": "이거 다른 색상으로 있나요?", "context": "색상 변경 문의"}], "tip": "피팅룸은 나라마다 다르게 불러요. 미국: fitting room / changing room, 영국: changing room. 'Try it on'(입어보다)은 반드시 외워두세요!"}, {"day": 8, "type": "학습", "part": "PART 1 — 일상", "situation": "환불·교환 요청하기", "examples": [{"en": "I'd like to return this, please.", "pronunciation": "아이드 라이크 투 리턴 디스 플리즈", "ko": "이거 반품하고 싶어요.", "context": "환불 요청"}, {"en": "I have the receipt right here.", "pronunciation": "아이 해브 더 리싯 라잇 히어", "ko": "영수증 여기 있어요.", "context": "영수증 제시"}, {"en": "It's defective — there's a hole in it.", "pronunciation": "잇츠 디펙티브 데어즈 어 홀 인 잇", "ko": "불량품이에요 — 구멍이 있어요.", "context": "불량 이유 설명"}, {"en": "Can I exchange this for a different size?", "pronunciation": "캔 아이 익스체인지 디스 포 어 디퍼런트 사이즈", "ko": "다른 사이즈로 교환할 수 있어요?", "context": "교환 요청"}, {"en": "What's your return policy?", "pronunciation": "왓츠 유어 리턴 팔러시", "ko": "환불 정책이 어떻게 되나요?", "context": "정책 확인"}], "tip": "환불은 'return', 교환은 'exchange'예요. 영수증은 'receipt'(리싯). 영수증 없이 반품하려면 'Can I return without a receipt?'라고 물어봐요."}, {"day": 9, "type": "학습", "part": "PART 1 — 일상", "situation": "대중교통 이용하기", "examples": [{"en": "Which bus goes to the city center?", "pronunciation": "위치 버스 고우즈 투 더 시티 센터", "ko": "시내 가는 버스가 몇 번이에요?", "context": "버스 노선 문의"}, {"en": "Does this train stop at Central Station?", "pronunciation": "더즈 디스 트레인 스탑 앳 센트럴 스테이션", "ko": "이 기차 센트럴역에 서나요?", "context": "정차역 확인"}, {"en": "How many stops until downtown?", "pronunciation": "하우 매니 스탑스 언틸 다운타운", "ko": "시내까지 몇 정거장이에요?", "context": "정거장 수 확인"}, {"en": "Can I tap my card here?", "pronunciation": "캔 아이 탭 마이 카드 히어", "ko": "여기서 카드 태그 하면 돼요?", "context": "교통카드 사용"}, {"en": "I think I missed my stop.", "pronunciation": "아이 띵크 아이 미스트 마이 스탑", "ko": "정류장을 지나친 것 같아요.", "context": "내릴 곳을 놓쳤을 때"}], "tip": "지하철·버스에서 'transfer'는 환승이에요. 'Where do I transfer?'(환승은 어디서 해요?) 꼭 외워두세요. 'next stop'은 다음 정류장이에요."}, {"day": 10, "type": "복습", "part": "PART 1 — 일상 복습 1", "situation": "Day 1~9 핵심 표현 총정리", "examples": [{"en": "Can I get an iced latte and a receipt, please?", "pronunciation": "캔 아이 겟 언 아이스트 라떼 앤 어 리싯 플리즈", "ko": "아이스 라떼 하나랑 영수증 주세요.", "context": "카페 주문 + 영수증"}, {"en": "I'd like to make a reservation — what do you recommend?", "pronunciation": "아이드 라이크 투 메잌 어 레저베이션 왓 두 유 레코멘드", "ko": "예약하고 싶어요 — 뭐가 맛있어요?", "context": "식당 예약 + 추천"}, {"en": "Can we split the bill? — Sure, keep the change.", "pronunciation": "캔 위 스플릿 더 빌 슈어 킵 더 체인지", "ko": "각자 낼까요? — 네, 거스름돈은 괜찮아요.", "context": "계산 상황"}, {"en": "Do you have this in a larger size? I'd like to try it on.", "pronunciation": "두 유 해브 디스 인 어 라저 사이즈 아이드 라이크 투 트라이 잇 온", "ko": "더 큰 사이즈 있나요? 입어보고 싶어요.", "context": "쇼핑 상황"}, {"en": "Which bus goes downtown? I think I missed my stop.", "pronunciation": "위치 버스 고우즈 다운타운 아이 띵크 아이 미스트 마이 스탑", "ko": "시내 가는 버스가 뭐예요? 정류장을 지난 것 같아요.", "context": "대중교통 상황"}], "tip": "Day 1~9 복습 완료! 카페·식당·쇼핑·대중교통 — 일상의 90%를 이제 영어로 해결할 수 있어요. 오늘 배운 표현 중 가장 쓸 것 같은 3개를 골라 소리 내어 3번씩 연습해보세요."}, {"day": 11, "type": "학습", "part": "PART 1 — 일상", "situation": "택시·우버 타기", "examples": [{"en": "Take me to this address, please.", "pronunciation": "테잌 미 투 디스 어드레스 플리즈", "ko": "이 주소로 가주세요.", "context": "목적지 알려줄 때"}, {"en": "How long will it take to get there?", "pronunciation": "하우 롱 윌 잇 테잌 투 겟 데어", "ko": "거기까지 얼마나 걸려요?", "context": "소요 시간 확인"}, {"en": "Can you take a different route? There's a lot of traffic.", "pronunciation": "캔 유 테잌 어 디퍼런트 루트 데어즈 얼랏 오브 트래픽", "ko": "다른 길로 가줄 수 있어요? 차가 많이 막혀요.", "context": "경로 변경 요청"}, {"en": "Can you drop me off here?", "pronunciation": "캔 유 드랍 미 오프 히어", "ko": "여기서 내려줄 수 있어요?", "context": "중간 하차 요청"}, {"en": "Keep the change.", "pronunciation": "킵 더 체인지", "ko": "거스름돈은 가지세요.", "context": "팁을 줄 때"}], "tip": "우버·카카오택시처럼 앱으로 부를 때는 목적지를 입력하면 되지만, 일반 택시는 'Take me to ~'로 말해야 해요. 'Drop me off'는 차에서 내려달라는 뜻이에요."}, {"day": 12, "type": "학습", "part": "PART 1 — 일상", "situation": "길 물어보기", "examples": [{"en": "Excuse me, how do I get to the subway?", "pronunciation": "익스큐즈 미 하우 두 아이 겟 투 더 서브웨이", "ko": "저기요, 지하철역이 어떻게 가요?", "context": "길을 모를 때"}, {"en": "Is it within walking distance?", "pronunciation": "이즈 잇 위딘 워킹 디스턴스", "ko": "걸어갈 수 있는 거리예요?", "context": "도보 가능 여부 확인"}, {"en": "How far is it from here?", "pronunciation": "하우 파 이즈 잇 프럼 히어", "ko": "여기서 얼마나 멀어요?", "context": "거리 확인"}, {"en": "Could you point me in the right direction?", "pronunciation": "쿠쥬 포인트 미 인 더 라잇 디렉션", "ko": "방향만 알려줄 수 있어요?", "context": "대략적인 방향만 물을 때"}, {"en": "Is there a landmark nearby?", "pronunciation": "이즈 데어 어 랜드마크 니어바이", "ko": "근처에 눈에 띄는 건물이 있나요?", "context": "목적지 찾는 데 도움 요청"}], "tip": "길을 물을 때 항상 'Excuse me'로 시작하세요. 모르는 사람에게 갑자기 말 거는 건 어색할 수 있으니, 짧게 'Excuse me?'로 주의를 먼저 끌어요."}, {"day": 13, "type": "학습", "part": "PART 1 — 일상", "situation": "길 알려주기", "examples": [{"en": "Go straight and turn left at the traffic light.", "pronunciation": "고우 스트레이트 앤 턴 레프트 앳 더 트래픽 라잇", "ko": "직진하다가 신호등에서 왼쪽으로 꺾어요.", "context": "기본 방향 안내"}, {"en": "It's about a 10-minute walk.", "pronunciation": "잇츠 어바웃 어 텐 미닛 워크", "ko": "걸어서 약 10분 거리예요.", "context": "소요 시간 알려줄 때"}, {"en": "You can't miss it — it's right next to the bank.", "pronunciation": "유 캔 미스 잇 잇츠 라잇 넥스트 투 더 뱅크", "ko": "못 찾을 수가 없어요 — 은행 바로 옆이에요.", "context": "목적지가 눈에 잘 띌 때"}, {"en": "Take the second right after the gas station.", "pronunciation": "테잌 더 세컨드 라잇 애프터 더 개스 스테이션", "ko": "주유소 지나 두 번째 오른쪽으로 가요.", "context": "구체적인 방향 안내"}, {"en": "I'm not from around here — let me look it up for you.", "pronunciation": "아임 낫 프럼 어라운드 히어 렛 미 룩 잇 업 포 유", "ko": "저도 이 동네 사람이 아닌데 — 찾아봐 드릴게요.", "context": "잘 모를 때 친절하게 도울 때"}], "tip": "길 안내할 때 핵심 표현: go straight(직진), turn left/right(왼쪽/오른쪽으로), at the corner(모퉁이에서), past the ~(~을 지나서). 'You can't miss it.'은 찾기 쉽다는 표현이에요."}, {"day": 14, "type": "학습", "part": "PART 1 — 일상", "situation": "미용실·네일샵에서", "examples": [{"en": "Just a trim, please.", "pronunciation": "저스트 어 트림 플리즈", "ko": "다듬기만 해주세요.", "context": "조금만 자를 때"}, {"en": "Can you take about 2 inches off?", "pronunciation": "캔 유 테잌 어바웃 투 인치즈 오프", "ko": "약 5센티 정도 잘라줄 수 있어요?", "context": "길이 지정할 때"}, {"en": "I'd like the same style but shorter.", "pronunciation": "아이드 라이크 더 쎄임 스타일 벗 쇼터", "ko": "같은 스타일로 좀 더 짧게 해주세요.", "context": "스타일 유지하며 길이 조절"}, {"en": "Can you do a French manicure?", "pronunciation": "캔 유 두 어 프렌치 매니큐어", "ko": "프렌치 네일 해줄 수 있어요?", "context": "네일 스타일 요청"}, {"en": "Is this the color I picked?", "pronunciation": "이즈 디스 더 컬러 아이 픽트", "ko": "제가 고른 색이 이게 맞아요?", "context": "색상 확인할 때"}], "tip": "미용실에서 'trim'은 다듬기, 'cut'은 자르기예요. 사진을 보여주는 게 가장 확실해요. 'Can I show you a photo?'(사진 보여줘도 될까요?)도 꼭 기억해요."}, {"day": 15, "type": "학습", "part": "PART 1 — 일상", "situation": "병원·약국에서", "examples": [{"en": "I've had a headache since this morning.", "pronunciation": "아이브 해드 어 헤데잌 신스 디스 모닝", "ko": "오늘 아침부터 두통이 있어요.", "context": "증상 설명"}, {"en": "It hurts when I press here.", "pronunciation": "잇 허츠 웬 아이 프레스 히어", "ko": "여기를 누르면 아파요.", "context": "통증 위치 알려줄 때"}, {"en": "Do I need a prescription for this?", "pronunciation": "두 아이 니드 어 프리스크립션 포 디스", "ko": "이거 처방전이 필요해요?", "context": "처방 필요 여부 확인"}, {"en": "How often should I take this?", "pronunciation": "하우 오픈 슈드 아이 테잌 디스", "ko": "이걸 얼마나 자주 먹어야 해요?", "context": "복용법 확인"}, {"en": "I'm allergic to penicillin.", "pronunciation": "아임 얼러직 투 페니실린", "ko": "저는 페니실린 알레르기가 있어요.", "context": "알레르기 고지"}], "tip": "병원에서 증상을 설명할 때 'I have a + 증상'(두통: headache, 발열: fever, 기침: cough, 메스꺼움: nausea)을 써요. 'Since when?'(언제부터요?)에 대비해 시작 시점도 준비해요."}, {"day": 16, "type": "학습", "part": "PART 1 — 일상", "situation": "은행·환전하기", "examples": [{"en": "I'd like to exchange some money.", "pronunciation": "아이드 라이크 투 익스체인지 썸 머니", "ko": "환전하고 싶어요.", "context": "환전 요청"}, {"en": "What's the exchange rate today?", "pronunciation": "왓츠 디 익스체인지 레이트 투데이", "ko": "오늘 환율이 어떻게 돼요?", "context": "환율 문의"}, {"en": "Can I get this in small bills?", "pronunciation": "캔 아이 겟 디스 인 스몰 빌즈", "ko": "소액 지폐로 받을 수 있어요?", "context": "지폐 단위 요청"}, {"en": "I'd like to send money overseas.", "pronunciation": "아이드 라이크 투 센드 머니 오버시즈", "ko": "해외 송금을 하고 싶어요.", "context": "해외 송금 요청"}, {"en": "Is there a transaction fee?", "pronunciation": "이즈 데어 어 트랜잭션 피", "ko": "수수료가 있나요?", "context": "수수료 확인"}], "tip": "환전할 때 공항보다 시내 환전소나 은행이 환율이 유리해요. ATM에서 현지 통화로 출금하는 것도 좋은 방법이에요. 'No foreign transaction fee'(해외 결제 수수료 없음) 카드를 챙기세요."}, {"day": 17, "type": "학습", "part": "PART 1 — 일상", "situation": "헬스장·운동시설 이용하기", "examples": [{"en": "I'd like to sign up for a membership.", "pronunciation": "아이드 라이크 투 사인 업 포 어 멤버십", "ko": "회원권을 등록하고 싶어요.", "context": "회원 가입"}, {"en": "Do you offer a day pass?", "pronunciation": "두 유 오퍼 어 데이 패스", "ko": "일일 이용권 있나요?", "context": "단기 이용 문의"}, {"en": "Is this machine taken?", "pronunciation": "이즈 디스 머신 테이큰", "ko": "이 기구 사용 중이에요?", "context": "기구 사용 가능 여부"}, {"en": "How do I use this equipment?", "pronunciation": "하우 두 아이 유즈 디스 이큅먼트", "ko": "이 기구 어떻게 사용해요?", "context": "사용법 문의"}, {"en": "Are there lockers available?", "pronunciation": "아 데어 라커즈 어베일러블", "ko": "사용 가능한 라커가 있나요?", "context": "락커 이용 확인"}], "tip": "헬스장에서 'Is this seat taken?'(이 자리 사용 중이에요?)은 어디서든 쓸 수 있어요. 'spot'도 자리를 뜻해요. 'Can I work in?'은 함께 번갈아 사용하자는 표현이에요."}, {"day": 18, "type": "학습", "part": "PART 1 — 일상", "situation": "이웃·아파트 생활", "examples": [{"en": "Could you keep it down a little?", "pronunciation": "쿠쥬 킵 잇 다운 어 리틀", "ko": "좀 조용히 해줄 수 있어요?", "context": "소음 민원 정중하게"}, {"en": "I have a package that was delivered to me by mistake.", "pronunciation": "아이 해브 어 패키지 댓 워즈 딜리버드 투 미 바이 미스테잌", "ko": "잘못 배달된 택배가 있어요.", "context": "오배송 aim' 데스크로 가세요. 반드시 '짐표(baggage claim tag)'를 가지고 가야 해요. 사진도 찍어두면 좋아요."}, {"day": 23, "type": "학습", "part": "PART 2 — 여행", "situation": "입국 심사 받기", "examples": [{"en": "I'm here for tourism.", "pronunciation": "아임 히어 포 투어리즘", "ko": "관광 목적으로 왔어요.", "context": "방문 목적 답변"}, {"en": "I'll be staying for two weeks.", "pronunciation": "아일 비 스테잉 포 투 윅스", "ko": "2주 동안 머물 예정이에요.", "context": "체류 기간 답변"}, {"en": "I'm staying at the Hilton Hotel.", "pronunciation": "아임 스테잉 앳 더 힐튼 호텔", "ko": "힐튼 호텔에 머물 거예요.", "context": "숙소 정보 답변"}, {"en": "I have about 500 dollars in cash.", "pronunciation": "아이 해브 어바웃 파이브 헌드레드 달러즈 인 캐시", "ko": "현금 약 500달러 가지고 있어요.", "context": "소지 현금 신고"}, {"en": "I'm traveling alone.", "pronunciation": "아임 트래블링 얼론", "ko": "혼자 여행하고 있어요.", "context": "동행 여부 답변"}], "tip": "입국 심사에서 가장 중요한 3가지: ① 방문 목적(tourism/business), ② 체류 기간(stay duration), ③ 숙소(accommodation). 이 3가지만 준비하면 당황하지 않아요."}, {"day": 24, "type": "학습", "part": "PART 2 — 여행", "situation": "기내에서 승무원에게", "examples": [{"en": "Could I have a blanket, please?", "pronunciation": "쿠드 아이 해브 어 블랭킷 플리즈", "ko": "담요 하나 주실 수 있어요?", "context": "담요 요청"}, {"en": "I'd like the chicken, please.", "pronunciation": "아이드 라이크 더 치킨 플리즈", "ko": "치킨으로 할게요.", "context": "기내식 선택"}, {"en": "Can you move my bag to the overhead bin?", "pronunciation": "캔 유 무브 마이 백 투 디 오버헤드 빈", "ko": "제 가방을 선반에 올려줄 수 있어요?", "context": "짐 수납 도움 요청"}, {"en": "Excuse me, someone is in my seat.", "pronunciation": "익스큐즈 미 썸원 이즈 인 마이 싯", "ko": "저기요, 제 자리에 누군가 앉아 있어요.", "context": "좌석 문제"}, {"en": "I'm not feeling well — do you have any medicine?", "pronunciation": "아임 낫 필링 웰 두 유 해브 애니 메디신", "ko": "몸이 안 좋은데 — 약 있어요?", "context": "기내 몸 상태 불편"}], "tip": "기내에서는 무조건 'Could I have ~?'나 'Can I get ~?'으로 부드럽게 요청해요. 승무원을 부를 때는 호출 버튼을 누르거나 'Excuse me'라고 말해요."}, {"day": 25, "type": "학습", "part": "PART 2 — 여행", "situation": "호텔 체크인하기", "examples": [{"en": "I have a reservation under Kim.", "pronunciation": "아이 해브 어 레저베이션 언더 킴", "ko": "김으로 예약했어요.", "context": "예약자 이름 확인 : "근처에 병원이 있어요?", "context": "병원 위치 문의"}], "tip": "해외 여행 전 반드시 여행자 보험을 가입하세요. 미국은 의료비가 매우 비싸요. 보험증서(insurance card)를 항상 갖고 다니고, 긴급 연락처를 저장해두세요."}, {"day": 37, "type": "학습", "part": "PART 2 — 여행", "situation": "응급 상황 — 길을 잃었을 때", "examples": [{"en": "I think I'm lost — can you help me?", "pronunciation": "아이 띵크 아임 로스트 캔 유 헬프 미", "ko": "길을 잃은 것 같아요 — 도와줄 수 있어요?", "context": "도움 요청"}, {"en": "Can you show me on the map?", "pronunciation": "캔 유 쇼우 미 온 더 맵", "ko": "지도에 표시해 줄 수 있어요?", "context": "지도 도움 요청"}, {"en": "I'm trying to get to this hotel.", "pronunciation": "아임 트라잉 투 겟 투 디스 호텔", "ko": "이 호텔로 가려고 해요.", "context": "목적지 보여주기"}, {"en": "Is it safe to walk here at night?", "pronunciation": "이즈 잇 세이프 투 워크 히어 앳 나잇", "ko": "여기 밤에 걸어다녀도 안전해요?", "context": "안전 확인"}, {"en": "Can I use your phone to call a taxi?", "pronunciation": "캔 아이 유즈 유어 폰 투 콜 어 택시", "ko": "택시 부르는 데 핸드폰 좀 빌릴 수 있어요?", "context": "핸드폰 빌리기"}], "tip": "길을 잃으면 당황하지 말고 Google Maps를 켜세요. 배터리가 없을 때는 편의점, 카페, 호텔 로비에 들어가서 WiFi를 연결하거나 도움을 요청하세요."}, {"day": 38, "type": "학습", "part": "PART 2 — 여행", "situation": "귀국·환승하기", "examples": [{"en": "I have a connecting flight — will I make it?", "pronunciation": "아이 해브 어 커넥팅 플라잇 윌 아이 메잌 잇", "ko": "환승 비행편이 있는데 — 탈 수 있을까요?", "context": "환승 가능 여부"}, {"en": "Where is the transit area?", "pronunciation": "웨어 이즈 더 트랜짓 에어리어", "ko": "환승 구역이 어디예요?", "context": "환승 구역 위치"}, {"en": "Do I need to re-check my bag?", "pronunciation": "두 아이 니드 투 리첵 마이 백", "ko": "짐을 다시 부쳐야 해요?", "context": "짐 재탁송 여부"}, {"en": "My flight was cancelled — what are my options?", "pronunciation": "마이 플라잇 워즈 캔슬드 왓 아 마이 옵션즈", "ko": "비행기가 취소됐는데 — 어떻게 할 수 있어요?", "context": "항공편 취소 대응"}, {"en": "Can I get a hotel voucher for the night?", "pronunciation": "캔 아이 겟 어 호텔 바우처 포 더 나잇", "ko": "하룻밤 호텔 바우처 받을 수 있어요?", "context": "항공사 제공 숙박권"}], "tip": "항공편 취소·지연 시 항공사 카운터로 가서 'What are my rights?'(제 권리가 뭐예요?)라고 물어보세요. EU 규정 등에 따라 보상 받을 수 있는 경우가 많아요."}, {"day": 39, "type": "학습", "part": "PART 2 — 여행", "situation": "Airbnb·게 arted — shall we?", "pronunciation": "렛츠 겟 스타티드 샬 위", "ko": "시작해볼까요?", "context": "회의 시작"}, {"en": "Today's agenda has three main items.", "pronunciation": "투데이즈 어젠다 해즈 쓰리 메인 아이템즈", "ko": "오늘 안건은 세 가지예요.", "context": "안건 소개"}, {"en": "Before we begin, any updates from last time?", "pronunciation": "비포 위 비긴 애니 업데이츠 프럼 라스트 타임", "ko": "시작 전에, 지난번 이후 업데이트 있어요?", "context": "이전 미팅 팔로업"}, {"en": "We have about an hour, so let's stay focused.", "pronunciation": "위 해브 어바웃 언 아워 소우 렛츠 스테이 포커스트", "ko": "1시간 정도 있으니 집중해서 진행해요.", "context": "시간 안내"}, {"en": "Please hold your questions until the end.", "pronunciation": "플리즈 홀드 유어 퀘스쳔즈 언틸 디 엔드", "ko": "질문은 마지막에 해주세요.", "context": "진행 방식 안내"}], "tip": "회의 시작 시 안건(agenda)을 미리 공유하면 효율이 높아져요. 'Let's get started.'는 어색함 없이 바로 시작을 알리는 가장 자연스러운 표현이에요."}, {"day": 63, "type": "학습", "part": "PART 4 — 직장", "situation": "회의에서 의견 제시하기", "examples": [{"en": "I'd like to propose a different approach.", "pronunciation": "아이드 라이크 투 프로포우즈 어 디퍼런트 어프로치", "ko": "다른 방법을 제안하고 싶어요.", "context": "새 아이디어 제안"}, {"en": "Building on what you said, I think we could also ~", "pronunciation": "빌딩 온 왓 유 세드 아이 띵크 위 쿠드 올소", "ko": "말씀하신 것에 덧붙여서, ~도 할 수 있을 것 같아요.", "context": "상대 의견 확장"}, {"en": "The data suggests we should reconsider.", "pronunciation": "더 데이터 서제스츠 위 슈드 리컨시더", "ko": "데이터를 보면 재고해볼 필요가 있어요.", "context": "데이터 기반 의견"}, {"en": "I have some concerns about the timeline.", "pronunciation": "아이 해브 썸 컨선즈 어바웃 더 타임라인", "ko": "일정에 대해 우려가 있어요.", "context": "우려 사항 표현"}, {"en": "Could we table this for now and move on?", "pronunciation": "쿠드 위 테이블 디스 포 나우 앤 무브 온", "ko": "이 건은 나중으로 미루고 넘어갈까요?", "context": "안건 보류 제안"}], "tip": "'Table this'는 미국 영어에서 '나중으로 미루다'는 뜻이에요. 주의: 영국 영어에서는 반대로 '의제에 올리다'는 뜻이에요! 문화권에 따라 다르니 헷갈리지 마세요."}, {"day": 64, "type": "학습", "part": "PART 4 — 직장", "situation": "동의·반대 표현하기", "examples": [{"en": "I'm fully on board with that idea.", "pronunciation": "아임 풀리 온 보드 위드 댓 아이디어", "ko": "그 아이디어에 완전히 동의해요.", "context": "강한 동의"}, {"en": "That makes a lot of sense.", "pronunciation": "댓 메잌스 얼랏 오브 센스", "ko": "그게 맞는 것 같아요.", "context": "논리적 동의"}, {"en": "I'd push back on that a little.", "pronunciation": "아이드 푸시 백 온 댓 어 리틀", "ko": "그 부분에는 조금 반대 의견이 있어요.", "context": "부드러운 반대"}, {"en": "I understand the logic, but the risk is too high.", "pronunciation": "아이 언더스탠드 더 라직 벗 더 리스크 이즈 투 하이", "ko": "논리는 이해하지만, 리스크가 너무 커요.", "context": "근거를 갖춘 반대"}, {"en": "Let's agree to disagree on this one.", "pronunciation": "렛츠 어그리 투 디스어그리 온 디스 원", "ko": "이건 서로 다른 의견으로 남겨두는 게 좋겠어요.", "context": "합의점 없을 때"}], "tip": "직장에서 반대 의견을 낼 때 'I'd push back on that'은 공격적이지 않으면서도 분명하게 반대 의사를 전달해요. 'Let's agree to disagree.'는 결론 없이 마무리할 때 유용해요."}, {"day": 65, "type": "학습", "part": "PART 4 — 직장", "situation": "발표하기", "examples": [{"en": "Good morning, everyone — thank you for being here.", "pronunciation": "굿 모닝 에브리원 땡큐 포 비잉 히어", "ko": "좋은 아침이에요 여러분 — 참석해 주셔서 감사해요.", "context": "발표 시작 인사"}, {"en": "Today I'll be covering three key points.", "pronunciation": "투데이 아일 비 커버링 쓰리 키 포인츠", "ko": "오늘 세 가지 핵심 포인트를 다룰 거예요.", "context": "발표 구조 안내"}, {"en": "As you can see on this slide ~", "pronunciation": "애즈 유 캔 씨 온 디스 슬라이드", "ko": "이 슬라이드에서 볼 수 있듯이 ~", "context": "자료 설명"}, {"en": "To sum up, the key takeaway is ~", "pronunciation": "투 썸 업 더 키 테이크어웨이 이즈", "ko": "요약하자면, 핵심은 ~예요.", "context": "발표 마무리"}, {"en": "I'd be happy to take any questions now.", "pronunciation": "아이드 비 해피 투 테잌 애니 퀘스쳔즈 나우", "ko": "지금 질문 받겠습니다.", "context": "질의응답 열기"}], "tip": "발표 구조: 인사 → 오늘 다룰 내용 소개 → 본론 → 요약 → Q&A. 'Key takeaway'는 발표에서 청중이 기억해야 할 핵심 메시지예요."}, {"day": 66, "type": "학습", "part": "PART 4 — 직장", "situation": "이메일 쓰기 (1)", "examples": [{"en": "I hope this email finds you well.", "pronunciation": "아이 호프 디스 이메일 파인즈 유 웰", "ko": "이 메일이 잘 도착하기를 바랍니다.", "context": "이메일 시작 인사"}, {"en": "I'm writing to follow up on our last conversation.", "pronunciation": "아임 라이팅 투 팔로우 업 온 아워 라스트 컨버세이션", "ko": "지난 대화에 대한 팔로업으로 메일 드려요.", "context": "팔로업 이메일"}, {"en": "Please find the attached document.", "pronunciation": "플리즈 파인드 디 어태치드 다큐먼트", "ko": "첨부 파일을 확인해주세요.", "context": "첨부 파일 안내"}, {"en": "Could you please review and let me know?", "pronunciation": "쿠쥬 플리즈 리뷰 앤 렛 미 노우", "ko": "검토 후 알려주실 수 있나요?", "context": "확인 요청"}, {"en": "I look forward to hearing from you.", "pronunciation": "아이 룩 포워드 투 히어링 프럼 유", "ko": "회신 기다리겠습니다.", "context": "이메일 마무리"}], "tip": "비즈니스 이메일 마무리 표현: 'Best regards'(감사하며), 'Kind regards'(감사히), 'Sincerely'(진심을 담아). 가장 무난한 건 'Best regards'예요."}, {"day": 67, "type": "학습", "part": "PART 4 — 직장", "situation": "이메일 쓰기 (2)", "examples": [{"en": "I wanted to touch base on the project status.", "pronunciation": "아이 원티드 투 터치 베이스 온 더 프로젝트 스테이터스", "ko": "프로젝트 현황을 확인하고 싶어서요.", "context": "진행 상황 문의"}, {"en": "Please let me know if there are any issues.", "pronunciation": "플리즈 렛 미 노우 이프 데어 아 애니 이슈즈", "ko": "문제가 있으면 알려주세요.", "context": "문제 보고 요청"}, {"en": "I apologize for the late reply.", "pronunciation": "아이 어팔러자이즈 포 더 레잇 리플라이", "ko": "늦은 답장 사과드립니다.", "context": "늦은 답장 사과"}, {"en": "Just a gentle reminder about the deadline.", "pronunciation": "저스트 어 젠틀 리마인더 어바웃 더 데드라인", "ko": "마감일 알림이에요.", "context": "마감 리마인더"}, {"en": "Please disregard my previous email.", "pronunciation": "플리즈 디스리가드 마이 프리비어스 이메일", "ko": "이전 이메일은 무시해주세요.", "context": "잘못 보낸 메일 취소"}], "tip": "'Touch base'는 짧게 연락해서 상황을 확인한다는 의미예요. 'Gentle reminder'는 상대방을 압박하지 않고 부드럽게 상기시키는 표현이에요."}, {"day": 68, "type": "학습", "part": "PART 4 — 직장", "situation": "전화 영어 (업무)", "examples": [{"en": "Is this a good time to talk?", "pronunciation": "이즈 디스 어 굿 타임 투 토크", "ko": "지금 통화하기 괜찮은 시간인가요?", "context": "통화 가능 여부 확인"}, {"en": "I'm calling about the proposal we discussed.", "pronunciation": "아임 콜링 어바웃 더 프로포잘 위 디스커스트", "ko": "논의했던 제안서 관련해서 전화드렸어요.", "context": "전화 목적 설명"}, {"en": "Can I put you on hold for a moment?", "pronunciation": "캔 아이 풋 유 온 홀드 포 어 모먼트", "ko": "잠깐 대기해주실 수 있어요?", "context": "잠시 보류 요청"}, {"en": "Let me transfer you to the right department.", "pronunciation": "렛 미 트랜스퍼 유 투 더 라잇 디파트먼트", "ko": "담당 부서로 연결해드릴게요.", "context": "부서 연결"}, {"en": "Can I get your direct number for next time?", "pronunciation": "캔 아이 겟 유어 다이렉트 넘버 포 넥스트 타임", "ko": "다음번을 위해 직통 번호를 받을 수 있을까요?", "context": "연락처 확보"}], "tip": "업무 전화는 항상 먼저 통화 가능 여부를 확인하는 'Is this a good time?'으로 시작하는 게 예의예요. 'Put on hold'는 잠깐 기다리게 하는 거예요."}, {"day": 69, "type": "학습", "part": "PART 4 — 직장", "situation": "전화 영어 (2)", "examples": [{"en": "I'm afraid I dialed the wrong number.", "pronunciation": "아임 어프레이드 아이 다이얼드 더 롱 넘버", "ko": "죄송한데 번호를 잘못 눌렀어요.", "context": "잘못 건 전화"}, {"en": "Could you speak up? The line is a bit noisy.", "pronunciation": "쿠쥬 스피크 업 더 라인 이즈 어 빗 노이지", "ko": "더 크게 말씀해줄 수 있어요? 연결이 좀 안 좋아요.", "context": "통화 품질 문제"}, {"en": "I think we got cut off — can I call you back?", "pronunciation": "아이 띵크 위 갓 컷 오프 캔 아이 콜 유 백", "ko": "통화가 끊겼던 것 같아요 — 다시 전화해도 될까요?", "context": "전화 끊김"}, {"en": "I'll have her call you back within the hour.", "pronunciation": "아일 해브 허 콜 유 백 위딘 더 아워", "ko": "한 시간 안에 다시 전화드리도록 할게요.", "context": "콜백 약속"}, {"en": "Let me confirm — the meeting is at 3 PM, right?", "pronunciation": "렛 미 컨펌 더 미팅 이즈 앳 쓰리 피엠 라잇", "ko": "확인할게요 — 미팅이 3시 맞죠?", "context": "정보 재확인"}], "tip": "전화에서 'cut off'는 통화가 끊겼다는 표현이에요. 'Could you speak up?'(더 크게 말해줄 수 있어요?)와 'Could you slow down?'(천천히 말해줄 수 있어요?)도 필수예요."}, {"day": 70, "type": "복습", "part": "PART 4 — 직장 복습 1", "situation": "Day 61~69 핵심 표현 총정리", "examples": [{"en": "Feel free to reach out — I'm excited to be part of the team.", "pronunciation": "필 프리 투 리치 아웃 아임 익사이티드 투 비 파트 오브 더 팀", "ko": "편하게 연락해요 — 팀 일원이 된 게 기대돼요.", "context": "자기소개"}, {"en": "Let's get started — today's agenda has three main items.", "pronunciation": "렛츠 겟 스타티드 투데이즈 어젠다 해즈 쓰리 메인 아이템즈", "ko": "시작해볼까요 — 오늘 안건이 세 가지예요.", "context": "미팅 시작"}, {"en": "I'd push back on that — the risk is too high.", "pronunciation": "아이드 푸시 백 온 댓 더 리스크 이즈 투 하이", "ko": "그 부분엔 반대해요 — 리스크가 너무 커요.", "context": "의견 반대"}, {"en": "Please find the attached — I look forward to hearing from you.", "pronunciation": "플리즈 파인드 디 어태치드 아이 룩 포워드 투 히어링 프럼 유", "ko": "첨부 파일 확인해주세요 — 회신 기다릴게요.", "context": "이메일"}, {"en": "Is this a good time? — I think we got cut off.", "pronunciation": "이즈 디스 어 굿 타임 아이 띵크 위 갓 컷 오프", "ko": "지금 통화 괜찮아요? — 통화가 끊겼던 것 같아요.", "context": "전화 영어"}], "tip": "PART 4 직장 전반전 완료! 자기소개, 미팅, 발표, 이메일, 전화까지 — 이제 직장에서의 기본 영어가 갖춰졌어요. Day 71부터는 업무 요청, 협상, 퇴근 네트워킹까지!"}, {"day": 71, "type": "학습", "part": "PART 4 — 직장", "situation": "업무 요청하기", "examples": [{"en": "Could you take care of this by Friday?", "pronunciation": "쿠쥬 테잌 케어 오브 디스 바이 프라이데이", "ko": "금요일까지 이거 처리해줄 수 있어요?", "context": "마감 포함 업무 요청"}, {"en": "I'd like you to handle the client presentation.", "pronunciation": "아이드 라이크 유 투 핸들 더 클라이언트 프레젠테이션", "ko": "클라이언트 발표를 맡아줬으면 해요.", "context": "역할 배정"}, {"en": "Do you have capacity to take this on?", "pronunciation": "두 유 해브 캐퍼시티 투 테잌 디스 온", "ko": "이걸 맡을 여력이 있어요?", "context": "업무 가능 여부 확인"}, {"en": "This is time-sensitive — I need it ASAP.", "pronunciation": "디스 이즈 타임 센시티브 아이 니드 잇 에이에스에이피", "ko": "시간이 촉박해요 — 최대한 빨리 필요해요.", "context": "긴급 업무 요청"}, {"en": "Just focus on the high-priority items for now.", "pronunciation": "저스트 포커스 온 더 하이 프라이어리티 아이템즈 포 나우", "ko": "지금은 우선순위 높은 것만 집중해요.", "context": "우선순위 안내"}], "tip": "'ASAP'(As Soon As Possible)은 업무에서 자주 쓰는 표현이에요. 'Time-sensitive'는 시간이 중요한, 긴급한 이란 뜻이에요. 직장 이메일·메시지에서 자주 나와요."}, {"day": 72, "type": "학습", "part": "PART 4 — 직장", "situation": "보고하기", "examples": [{"en": "I'd like to give you a quick update.", "pronunciation": "아이드 라이크 투 기브 유 어 퀵 업데이트", "ko": "빠른 업데이트를 드리고 싶어요.", "context": "보고 시작"}, {"en": "The project is on track — we're 80% done.", "pronunciation": "더 프로젝트 이즈 온 트랙 위아 에이티 퍼센트 던", "ko": "프로젝트는 순조롭게 진행 중이에요 — 80% 완료됐어요.", "context": "진행 상황 보고"}, {"en": "We've hit a bit of a snag.", "pronunciation": "위브 힛 어 빗 오브 어 스내그", "ko": "작은 문제가 생겼어요.", "context": "문제 발생 보고"}, {"en": "I'll escalate this if we can't resolve it by Monday.", "pronunciation": "아일 에스컬레이트 디스 이프 위 캔 리잘브 잇 바이 먼데이", "ko": "월요일까지 해결 못 하면 위로 보고할 거예요.", "context": "상위 보고 예고"}, {"en": "Everything is under control.", "pronunciation": "에브리띵 이즈 언더 컨트롤", "ko": "다 잘 관리되고 있어요.", "context": "안정적인 상황 보고"}], "tip": "'Hit a snag'는 예상치 못한 문제가 생겼다는 표현이에요. 'On track'은 계획대로 진행 중이라는 의미예요. 두 표현 모두 직장 보고에서 자주 쓰여요."}, {"day": 73, "type": "학습", "part": "PART 4 — 직장", "situation": "회의 진행하기", "examples": [{"en": "Let's get back on track.", "pronunciation": "렛츠 겟 백 온 트랙", "ko": "다시 본론으로 돌아가요.", "context": "주제 벗어났을 때"}, {"en": "We're running low on time — let's wrap up.", "pronunciation": "위아 러닝 로우 온 타임 렛츠 랩 업", "ko": "시간이 얼마 없어요 — 마무리해요.", "context": "시간 부족할 때"}, {"en": "Can I get a show of hands?", "pronunciation": "캔 아이 겟 어 쇼우 오브 핸즈", "ko": "손 들어볼까요?", "context": "의견 투표"}, {"en": "Let's take a 10-minute break.", "pronunciation": "렛츠 테잌 어 텐 미닛 브레이크", "ko": "10분 쉬어요.", "context": "휴식 제안"}, {"en": "To summarize what we've agreed on today ~", "pronunciation": "투 써머라이즈 왓 위브 어그리드 온 투데이", "ko": "오늘 합의한 내용을 요약하면 ~", "context": "회의 마무리"}], "tip": "'Get back on track'은 이야기가 옆으로 샜을 때 다시 본론으로 돌아올 때 쓰는 표현이에요. 회의 진행자가 꼭 알아야 할 표현이에요."}, {"day": 74, "type": "학습", "part": "PART 4 — 직장", "situation": "협업하기", "examples": [{"en": "Let's loop in the design team on this.", "pronunciation": "렛츠 룹 인 더 디자인 팀 온 디스", "ko": "디자인 팀도 이 건에 포함시켜요.", "context": "다른 팀 참여 제안"}, {"en": "Can you sync up with Mia about the timeline?", "pronunciation": "캔 유 싱크 업 위드 미아 어바웃 더 타임라인", "ko": "미아와 일정 관련해서 맞춰볼 수 있어요?", "context": "담당자 간 조율 요청"}, {"en": "I'll take the lead on this — you handle the back-end.", "pronunciation": "아일 테잌 더 리드 온 디스 유 핸들 더 백 엔드", "ko": "제가 리드할게요 — 당신은 백엔드를 맡아요.", "context": "역할 분담"}, {"en": "Let's set up a shared doc so everyone stays aligned.", "pronunciation": "렛츠 셋 업 어 셰어드 닥 소우 에브리원 스테이즈 얼라인드", "ko": "모두가 같은 방향을 유지할 수 있게 공유 문서 만들어요.", "context": "협업 도구 제안"}, {"en": "We're on the same page now — let's move forward.", "pronunciation": "위아 온 더 쎄임 페이지 나우 렛츠 무브 포워드", "ko": "이제 같은 방향이에요 — 진행해요.", "context": "합의 확인 후 진행"}], "tip": "직장 협업 표현: 'loop in'(포함시키다), 'sync up'(맞추다·조율하다), 'take the lead'(리드하다), 'on the same page'(같은 방향으로 이해하다). 이 4개만 알아도 협업 대화가 돼요."}, {"day": 75, "type": "학습", "part": "PART 4 — 직장", "situation": "칭찬·피드백 주고받기", "examples": [{"en": "You did a great job on that report.", "pronunciation": "유 디드 어 그레잇 잡 온 댓 리포트", "ko": "그 보고서 정말 잘 했어요.", "context": "성과 칭찬"}, {"en": "I think there's room for improvement here.", "pronunciation": "아이 띵크 데어즈 룸 포 임프루브먼트 히어", "ko": "여기 개선할 여지가 있는 것 같아요.", "context": "부드러운 피드백"}, {"en": "Your presentation skills have really improved.", "pronunciation": "유어 프레젠테이션 스킬즈 해브 리얼리 임프루브드", "ko": "발표 실력이 정말 많이 늘었어요.", "context": "성장 칭찬"}, {"en": "This needs another round of revision.", "pronunciation": "디스 니즈 어나더 라운드 오브 리비전", "ko": "이건 한 번 더 수정이 필요해요.", "context": "수정 요청"}, {"en": "I appreciate your effort on this project.", "pronunciation": "아이 어프리시에잇 유어 에포트 온 디스 프로젝트", "ko": "이 프로젝트에서의 노력에 감사해요.", "context": "노력 인정"}], "tip": "피드백할 때 'sandwich method'를 써보세요: 칭찬 → 개선점 → 격려. 'There's room for improvement'는 직접적이지 않게 개선을 요청하는 정중한 표현이에요."}, {"day": 76, "type": "학습", "part": "PART 4 — 직장", "situation": "휴가 요청하기", "examples": [{"en": "I'd like to request a week off in August.", "pronunciation": "아이드 라이크 투 리퀘스트 어 윅 오프 인 오거스트", "ko": "8월에 일주일 휴가를 신청하고 싶어요.", "context": "휴가 신청"}, {"en": "I'll make sure everything is covered before I leave.", "pronunciation": "아일 메잌 슈어 에브리띵 이즈 커버드 비포 아이 리브", "ko": "떠나기 전에 모든 업무를 마무리할게요.", "context": "업무 인수인계 약속"}, {"en": "Is there anyone who can cover for me?", "pronunciation": "이즈 데어 애니원 후 캔 커버 포 미", "ko": "제 업무를 대신할 사람이 있어요?", "context": "대체 인력 확인"}, {"en": "I'll be available by phone for emergencies.", "pronunciation": "아일 비 어베일러블 바이 폰 포 이머전시즈", "ko": "긴급 상황에는 전화로 연락 가능해요.", "context": "비상 연락 약속"}, {"en": "Can I take unpaid leave?", "pronunciation": "캔 아이 테잌 언페이드 리브", "ko": "무급 휴가를 쓸 수 있어요?", "context": "무급 휴가 문의"}], "tip": "휴가 신청할 때 미리 인수인계 계획을 함께 제시하면 승인 받기 훨씬 수월해요. 'Cover for me'는 내 자리를 대신한다는 표현이에요."}, {"day": 77, "type": "학습", "part": "PART 4 report.", "pronunciation": "아이 니드 투 파일 어 폴리스 리포트", "ko": "경찰 신고서를 제출해야 해요.", "context": "신고서 요청"}, {"en": "The suspect was wearing a red jacket.", "pronunciation": "더 서스펙트 워즈 웨어링 어 레드 재킷", "ko": "용의자는 빨간 재킷을 입고 있었어요.", "context": "용의자 묘사"}, {"en": "My credit cards were in there — I need to cancel them.", "pronunciation": "마이 크레딧 카즈 워 인 데어 아이 니드 투 캔슬 뎀", "ko": "신용카드가 있었어요 — 취소해야 해요.", "context": "카드 분실 후 조치"}], "tip": "도난 후 즉시 해야 할 일: ① 경찰 신고(police report) ② 은행/카드사 연락으로 카드 정지 ③ 여권 분실이라면 대사관 연락. 순서대로 빠르게 대응하세요."}, {"day": 84, "type": "학습", "part": "PART 5 — 생존", "situation": "아플 때 (1)", "examples": [{"en": "I don't feel well — I think I need to see a doctor.", "pronunciation": "아이 돈 필 웰 아이 띵크 아이 니드 투 씨 어 닥터", "ko": "몸이 안 좋아요 — 의사를 봐야 할 것 같아요.", "context": "진료 필요 표현"}, {"en": "I've been feeling this way since yesterday.", "pronunciation": "아이브 빈 필링 디스 웨이 신스 예스터데이", "ko": "어제부터 이런 상태예요.", "context": "증상 시작 시간"}, {"en": "It's getting worse, not better.", "pronunciation": "잇츠 게팅 워스 낫 베터", "ko": "좋아지는 게 아니라 더 나빠지고 있어요.", "context": "증상 악화 설명"}, {"en": "Do you have anything for a stomachache?", "pronunciation": "두 유 해브 애니띵 포 어 스터마케잌", "ko": "배탈에 먹는 약 있어요?", "context": "약국에서"}, {"en": "I need a prescription for this medication.", "pronunciation": "아이 니드 어 프리스크립션 포 디스 메디케이션", "ko": "이 약에 처방전이 필요해요.", "context": "처방전 확인"}], "tip": "몸 증상 영어: headache(두통), stomachache(복통), fever(열), cough(기침), nausea(메스꺼움), dizziness(어지러움), sore throat(인후통). 증상 + 'I have a ~'로 말하면 돼요."}, {"day": 85, "type": "학습", "part": "PART 5 — 생존", "situation": "아플 때 (2)", "examples": [{"en": "I'm having trouble breathing.", "pronunciation": "아임 해빙 트러블 브리딩", "ko": "숨쉬기가 힘들어요.", "context": "호흡 곤란"}, {"en": "My chest hurts when I breathe deeply.", "pronunciation": "마이 체스트 허츠 웬 아이 브리드 딥리", "ko": "깊게 숨을 쉬면 가슴이 아파요.", "context": "흉통 설명"}, {"en": "I'm allergic to aspirin.", "pronunciation": "아임 얼러직 투 애스프린", "ko": "아스피린에 알레르기가 있어요.", "context": "알레르기 고지"}, {"en": "I take medication for high blood pressure.", "pronunciation": "아이 테잌 메디케이션 포 하이 블러드 프레셔", "ko": "고혈압 약을 복용하고 있어요.", "context": "기저질환 고지"}, {"en": "When will the test results be ready?", "pronunciation": "웬 윌 더 테스트 리절츠 비 레디", "ko": "검사 결과가 언제 나와요?", "context": "결과 대기 문의"}], "tip": "해외 병원에서는 기존에 먹는 약(medication), 알레르기(allergy), 지병(medical condition)을 꼭 먼저 알려주세요. 이 정보가 치료에 결정적이에요."}, {"day": 86, "type": "학습", "part": "PART 5 — 생존", "situation": "사고·응급 상황", "examples": [{"en": "Call 911! This is an emergency!", "pronunciation": "콜 나인 원원 디스 이즈 언 이머전시", "ko": "911에 전화해요! 응급 상황이에요!", "context": "응급 상황 알림"}, {"en": "There's been an accident.", "pronunciation": "데어즈 빈 언 액시던트", "ko": "사고가 났어요.", "context": "사고 신고"}, {"en": "Someone is unconscious!", "pronunciation": "썸원 이즈 언컨셔스", "ko": "의식 없는 사람이 있어요!", "context": "의식 불명 신고"}, {"en": "Please don't move them.", "pronunciation": "플리즈 돈 무브 뎀", "ko": "움직이게 하지 마세요.", "context": "부상자 이동 주의"}, {"en": "Can anyone perform CPR?", "pronunciation": "캔 애니원 퍼폼 씨피아르", "ko": "CPR 할 수 있는 분 계세요?", "context": "심폐소생술 도움 요청"}], "tip": "미국 응급 전화: 911. 영국: 999. 호주: 000. 해외 여행 전 현지 응급 번호를 반드시 저장해두세요. 응급 상황에서 'Help!'만 외쳐도 일단 주목을 끌 수 있어요."}, {"day": 87, "type": "학습", "part": "PART 5 — 생존", "situation": "차 문제 해결하기", "examples": [{"en": "My car won't start.", "pronunciation": "마이 카 원 스타트", "ko": "차가 안 켜져요.", "context": "시동 불량"}, {"en": "I have a flat tire.", "pronunciation": "아이 해브 어 플랫 타이어", "ko": "타이어가 펑크났어요.", "context": "타이어 펑크"}, {"en": "Can you send a tow truck?", "pronunciation": "캔 유 센드 어 토우 트럭", "ko": "견인차를 보내줄 수 있어요?", "context": "견인 요청"}, {"en": "I've run out of gas.", "pronunciation": "아이브 런 아웃 오브 개스", "ko": "기름이 떨어졌어요.", "context": "연료 소진"}, {"en": "I'm on Route 95, near mile marker 42.", "pronunciation": "아임 온 루트 나인티파이브 니어 마일 마커 포티투", "ko": "95번 국도, 마일 표지 42 근처에 있어요.", "context": "위치 설명"}], "tip": "렌터카 이용 시 긴급 출동 번호를 꼭 저장해두세요. 위치를 설명할 때는 가장 가까운 고속도로 번호나 출구 번호를 말하는 게 가장 빠른 방법이에요."}, {"day": 88, "type": "학습", "part": "PART 5 — 생존", "situation": "분쟁·항의하기", "examples": [{"en": "I'd like to file a complaint.", "pronunciation": "아이드 라이크 투 파일 어 컴플레인트", "ko": "불만 신고를 하고 싶어요.", "context": "공식 항의 시작"}, {"en": "This is unacceptable — I'd like to speak with a manager.", "pronunciation": "디스 이즈 언억셉터블 아이드 라이크 투 스피크 위드 어 매니저", "ko": "이건 용납이 안 돼요 — 매니저를 불러주세요.", "context": "강한 항의"}, {"en": "I was charged the wrong amount.", "pronunciation": "아이 워즈 차지드 더 롱 어마운트", "ko": "금액이 잘못 청구됐어요.", "context": "잘못된 청구"}, {"en": "I have the receipt to prove it.", "pronunciation": "아이 해브 더 리싯 투 프루브 잇", "ko": "증명할 영수증이 있어요.", "context": "증거 제시"}, {"en": "I expect a full refund.", "pronunciation": "아이 익스펙트 어 풀 리펀드", "ko": "전액 환불을 원해요.", "context": "환불 요구"}], "tip": "항의할 때 증거(영수증, 사진, 이메일)를 갖추는 게 핵심이에요. 항상 차분하지만 단호하게 말하세요. 감정적으로 흥분하면 오히려 요청이 받아들여지지 않을 수 있어요."}, {"day": 89, "type": "학습", "part": "PART 5 — 생존", "situation": "법적 상황 대응하기", "examples": [{"en": "I'd like to call a lawyer.", "pronunciation": "아이드 라이크 투 콜 어 로이어", "ko": "변호사에게 연락하고 싶어요.", "context": "법적 조력 요청"}, {"en": "I don't consent to a search.", "pronunciation": "아이 돈 컨센트 투 어 서치", "ko": "수색에 동의하지 않아요.", "context": "수색 거부 의사 표명"}, {"en": "I'm invoking my right to remain silent.", "pronunciation": "아임 인보킹 마이 라잇 투 리메인 사일런트", "ko": "묵비권을 행사할게요.", "context": "묵비권 선언"}, {"en": "I'm a foreign national — can I contact my embassy?", "pronunciation": "아임 어 포린 내셔널 캔 아이 컨택트 마이 엠버시", "ko": "저는 외국인이에요 — 대사관에 연락할 수 있어요?", "context": "대사관 연락 요청"}, {"en": "I don't understand what I'm being accused of.", "pronunciation": "아이 돈 언더스탠드 왓 아임 비잉 억큐즈드 오브", "ko": "제가 무엇으로 기소되는지 모르겠어요.", "context": "혐의 확인 요청"}], "tip": "법적 상황에서는 묵비권(right to remain silent)이 있어요. 무조건 많이 말하는 게 도움이 되지 않아요. '변호사 연락'이 최우선이에요. 외국에서도 영사관 도움을 받을 수 있어요."}, {"day": 90, "type": "복습", "part": "PART 5 — 생존 복습 1", "situation": "Day 81~89 핵심 표현 총정리", "examples": [{"en": "I need help — I've lost my phone. Where's the lost and found?", "pronunciation": "아이 니드 헬프 아이브 로스트 마이 폰 웨어즈 더 로스트 앤 파운드", "ko": "도움이 필요해요 — 핸드폰을 잃어버렸어요. 분실물 센터 어디예요?", "context": "분실 상황"}, {"en": "Someone stole  "정책 확인"}, {"en": "I'm not satisfied and I'd like to escalate this.", "pronunciation": "아임 낫 새티스파이드 앤 아이드 라이크 투 에스컬레이트 디스", "ko": "만족하지 않고, 이 건을 위로 올리고 싶어요.", "context": "상위 해결 요청"}, {"en": "Can we settle on a partial refund?", "pronunciation": "캔 위 세틀 온 어 파셜 리펀드", "ko": "부분 환불로 합의할 수 있을까요?", "context": "협상 타결 제안"}, {"en": "I'll leave a review if this isn't resolved.", "pronunciation": "아일 리브 어 리뷰 이프 디스 이즌 리잘브드", "ko": "해결이 안 되면 리뷰를 남길 거예요.", "context": "최후 카드"}], "tip": "환불 협상에서 'I'd like to speak with a supervisor.'(상사와 이야기하고 싶어요.)는 강력한 카드예요. 리뷰 위협은 최후 수단으로만 사용하세요."}, {"day": 93, "type": "학습", "part": "PART 5 — 생존", "situation": "언어 장벽 극복하기", "examples": [{"en": "I'm sorry, I didn't quite catch that.", "pronunciation": "아임 쏘리 아이 디든 콰이트 캐치 댓", "ko": "죄송한데 잘 못 들었어요.", "context": "못 알아들었을 때"}, {"en": "Could you write that down for me?", "pronunciation": "쿠쥬 라잇 댓 다운 포 미", "ko": "그거 적어줄 수 있어요?", "context": "글로 써달라고 요청"}, {"en": "Can you translate this for me?", "pronunciation": "캔 유 트랜슬레잇 디스 포 미", "ko": "이거 번역해줄 수 있어요?", "context": "번역 도움 요청"}, {"en": "My English isn't perfect — please bear with me.", "pronunciation": "마이 잉글리쉬 이즌 퍼펙트 플리즈 베어 위드 미", "ko": "영어가 완벽하지 않아요 — 양해해 주세요.", "context": "영어 실력 양해 구하기"}, {"en": "I'll use a translation app if that's okay.", "pronunciation": "아일 유즈 어 트랜슬레이션 앱 이프 댓츠 오케이", "ko": "번역 앱을 써도 될까요?", "context": "번역 앱 사용 양해"}], "tip": "영어가 완벽하지 않아도 괜찮아요! 'Please bear with me.'(양해해 주세요.)로 시작하면 상대방이 더 천천히 말해줘요. 포인팅, 바디랭귀지, 번역 앱도 훌륭한 소통 도구예요."}, {"day": 94, "type": "학습", "part": "PART 5 — 생존", "situation": "문화 차이 대응하기", "examples": [{"en": "I'm not familiar with this custom — could you explain?", "pronunciation": "아임 낫 퍼밀리어 위드 디스 커스텀 쿠쥬 익스플레인", "ko": "이 관습에 익숙하지 않아요 — 설명해줄 수 있어요?", "context": "문화 이해 요청"}, {"en": "Is it customary to tip here?", "pronunciation": "이즈 잇 커스터메리 투 팁 히어", "ko": "여기서는 팁을 주는 게 관례인가요?", "context": "팁 문화 확인"}, {"en": "I hope I didn't say anything offensive.", "pronunciation": "아이 호프 아이 디든 세이 애니띵 오펜시브", "ko": "혹시 실례되는 말을 한 건   1:{color:'#fcd64d',textColor:'#1e293b',badgeBg:'#1e293b',badgeText:'#fcd64d',accentNum:'#b8960a',tipBg:'#fffbea',tipBorder:'#fcd64d',tipLabel:'#b8960a',barColor:'#fcd64d',name:'왕초보 영어회화'},
  2:{color:'#70C1B3',textColor:'#1e293b',badgeBg:'#1e293b',badgeText:'#70C1B3',accentNum:'#2a8a7e',tipBg:'#f0faf8',tipBorder:'#70C1B3',tipLabel:'#2a8a7e',barColor:'#70C1B3',name:'기초동사 영어회화'},
  3:{color:'#247BA0',textColor:'#fff',badgeBg:'#fff',badgeText:'#247BA0',accentNum:'#90c8e0',tipBg:'#eef6fb',tipBorder:'#247BA0',tipLabel:'#247BA0',barColor:'#247BA0',name:'실전상황별 영어회화'},
  4:{color:'#FFE066',textColor:'#1e293b',badgeBg:'#1e293b',badgeText:'#FFE066',accentNum:'#b8960a',tipBg:'#fffbea',tipBorder:'#FFE066',tipLabel:'#b8960a',barColor:'#FFE066',name:'단어확장 500'}
};
var params=new URLSearchParams(location.search);
var stageNum=parseInt(params.get('stage')||'1');
var dayNum=parseInt(params.get('day')||'1');
var cfg=CONFIGS[stageNum]||CONFIGS[1];
var stageData=DB[stageNum]||DB[1];
var sentences=[],currentBtn=null,maleVoice=null,allIdx=0,quizAnswerIdx=0;

function loadVoice(){var v=window.speechSynthesis.getVoices();if(!v.length)return;var p=['Google UK English Male','Microsoft David','Alex','Daniel'];for(var i=0;i<p.length;i++){var f=v.find(function(vv){return vv.name.indexOf(p[i])!==-1;});if(f){maleVoice=f;return;}}maleVoice=v.find(function(vv){return vv.lang.indexOf('en')===0;})||null;}
if(window.speechSynthesis){window.speechSynthesis.addEventListener('voiceschanged',loadVoice,{once:true});loadVoice();}
function speakOne(idx,btn){if(!window.speechSynthesis||!sentences[idx])return;window.speechSynthesis.cancel();if(currentBtn){currentBtn.textContent='▶';currentBtn.classList.remove('playing');}var u=new SpeechSynthesisUtterance(sentences[idx]);u.lang='en-US';u.rate=0.85;u.pitch=0.85;if(maleVoice)u.voice=maleVoice;btn.textContent='■';btn.classList.add('playing');currentBtn=btn;u.onend=function(){btn.textContent='▶';btn.classList.remove('playing');currentBtn=null;};window.speechSynthesis.speak(u);}
function speakAll(){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();allIdx=0;speakNext();}
function speakNext(){if(allIdx>=sentences.length)return;var u=new SpeechSynthesisUtterance(sentences[allIdx++]);u.lang='en-US';u.rate=0.85;u.pitch=0.85;if(maleVoice)u.voice=maleVoice;u.onend=function(){setTimeout(speakNext,600);};window.speechSynthesis.speak(u);}
function checkAnswer(el,isCorrect){var opts=document.querySelectorAll('.quiz-opt');opts.forEach(function(o){o.classList.add('disabled');});var fb=document.getElementById('quizFeedback');if(isCorrect){el.classList.add('correct');fb.textContent='정답이에요! 잘 하셨어요 🎉';fb.className='quiz-feedback show ok';}else{el.classList.add('wrong');opts[quizAnswerIdx].classList.add('correct');fb.textContent='아쉽지만 다음엔 맞출 수 있어요!';fb.className='quiz-feedback show fail';}}
function markDone(){var key='mt_s'+stageNum+'_completed';var completed=JSON.parse(localStorage.getItem(key)||'[]');if(completed.indexOf(dayNum)===-1){completed.push(dayNum);localStorage.setItem(key,JSON.stringify(completed));var today=new Date().toDateString();var lastDate=localStorage.getItem('mt_s'+stageNum+'_lastDate');var yesterday=new Date(Date.now()-86400000).toDateString();var streak=parseInt(localStorage.getItem('mt_s'+stageNum+'_streak')||'0');if(lastDate===yesterday){streak+=1;}else if(lastDate!==today){streak=1;}localStorage.setItem('mt_s'+stageNum+'_streak',String(streak));localStorage.setItem('mt_s'+stageNum+'_lastDate',today);}var btn=document.getElementById('doneBtn');btn.textContent='오늘 완료됐어요! ✓';btn.classList.add('completed');document.getElementById('doneMsg').classList.add('show');updateProgress();}
function updateProgress(){var key='mt_s'+stageNum+'_completed';var completed=JSON.parse(localStorage.getItem(key)||'[]');var streak=parseInt(localStorage.getItem('mt_s'+stageNum+'_streak')||'1');var count=Math.max(completed.length,1);var b=document.getElementById('barFill');if(b)b.style.width=Math.min(count/100*100,100)+'%';var l=document.getElementById('barLabel');if(l)l.textContent=count+' / 100 완료';var s=document.getElementById('streakTxt');if(s)s.textContent='🔥 '+streak+'일 연속';if(completed.indexOf(dayNum)!==-1){var btn=document.getElementById('doneBtn');if(btn){btn.textContent='오늘 완료됐어요! ✓';btn.classList.add('completed');}var msg=document.getElementById('doneMsg');if(msg)msg.classList.add('show');}}
function shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(d){
  var isVocab=(stageNum===4);
  var hasPattern=d.pattern&&d.pattern.trim()!=='';
  var titleText=hasPattern?d.pattern:d.situation;
  sentences=[];
  var cardsHtml='',quizHtml='';
  if(isVocab&&d.words){
    d.words.forEach(function(w,i){sentences.push(w.word);cardsHtml+='<div class="word-card"><div class="word-header"><div class="word-main"><span class="word-en">'+esc(w.word)+'</span><span class="word-pron">'+esc(w.pronunciation)+'</span><span class="word-meaning">'+esc(w.meaning)+'</span></div><button class="speak-btn" style="border-color:'+cfg.color+'" onclick="speakOne('+i+',this)">▶</button></div><div class="word-example"><span class="en">'+esc(w.example.en)+'</span><span class="ko">'+esc(w.example.ko)+'</span></div></div>';});
    if(d.words.length>=4){var ci=Math.floor(Math.random()*d.words.length);var cw=d.words[ci];var opts=shuffle([{t:cw.meaning,ok:true}].concat(d.words.filter(function(_,i){return i!==ci;}).slice(0,3).map(function(w){return{t:w.meaning,ok:false};})));quizAnswerIdx=opts.findIndex(function(o){return o.ok;});quizHtml='<div class="quiz-title">오늘의 퀴즈</div><div class="quiz-box"><div class="quiz-q">"<strong>'+esc(cw.word)+'</strong>"의 뜻은?</div><div class="quiz-options" id="quizOpts">'+opts.map(function(o){return'<button class="quiz-opt" onclick="checkAnswer(this,'+o.ok+')">'+esc(o.t)+'</button>';}).join('')+'</div><div class="quiz-feedback" id="quizFeedback"></div></div>';}
  } else if(d.examples){
    d.examples.forEach(function(ex,i){sentences.push(ex.en);cardsHtml+='<div class="expr-card"><span class="expr-num" style="color:'+cfg.accentNum+'">'+(i+1)+'</span><div class="expr-body"><span class="expr-en">'+esc(ex.en)+'</span><span class="expr-ko">'+esc(ex.ko)+'</span><span class="expr-pron">'+esc(ex.pronunciation)+'</span>'+(ex.context?'<span class="expr-ctx" style="border-color:'+cfg.color+'">'+esc(ex.context)+'</span>':'')+'</div><button class="speak-btn" style="border-color:'+cfg.color+'" onclick="speakOne('+i+',this)">▶</button></div>';});
    if(d.examples.length>=4){var ei=Math.floor(Math.random()*d.examples.length);var ce=d.examples[ei];var eopts=shuffle([{ko:ce.ko,en:ce.en,ok:true}].concat(d.examples.filter(function(_,i){return i!==ei;}).slice(0,3).map(function(e){return{ko:e.ko,en:e.en,ok:false};})));quizAnswerIdx=eopts.findIndex(function(o){return o.ok;});quizHtml='<div class="quiz-title">오늘의 퀴즈</div><div class="quiz-box"><div class="quiz-q">"'+esc(ce.ko)+'"를 영어로 하면?</div><div class="quiz-options" id="quizOpts">'+eopts.map(function(o){return'<button class="quiz-opt" onclick="checkAnswer(this,'+o.ok+')">'+esc(o.en)+'</button>';}).join('')+'</div><div class="quiz-feedback" id="quizFeedback"></div></div>';}
  }
  var tipHtml='';
  if(d.tip){tipHtml='<div class="tip-box" style="background:'+cfg.tipBg+';border-color:'+cfg.tipBorder+';margin-top:14px;"><div class="tip-label" style="color:'+cfg.tipLabel+'">💡 TIP</div><div class="tip-text">'+esc(d.tip)+'</div></div>';}
  var patMeanHtml=(hasPattern&&d.meaning)?'<div class="pattern-meaning" style="color:'+cfg.textColor+'">'+esc(d.meaning)+'</div>':'';
  var sitHtml=d.situation?'<span class="situation-badge">📍 '+esc(d.situation)+'</span>':'';
  var sectionLabel=isVocab?'오늘의 단어':'오늘의 표현';
  var html=''
    +'<div class="header" style="background:'+cfg.color+';color:'+cfg.textColor+'">'
    +'<div class="header-top"><span class="brand" style="color:'+cfg.textColor+'">매일톡 '+cfg.name+'</span>'
    +'<span class="day-badge" style="background:'+cfg.badgeBg+';color:'+cfg.badgeText+'">DAY '+String(dayNum).padStart(2,'0')+'</span></div>'
    +'<div class="pattern-title" style="color:'+cfg.textColor+'">'+esc(titleText)+'</div>'
    +patMeanHtml+sitHtml+'</div>'
    +'<div class="progress-bar"><div class="streak" id="streakTxt">🔥 1일 연속</div>'
    +'<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" id="barFill" style="width:1%;background:'+cfg.barColor+'"></div></div>'
    +'<div class="bar-label" id="barLabel">1 / 100 완료</div></div></div>'
    +'<div class="content"><div class="section-title-row"><span class="section-title">'+sectionLabel+'</span>'
    +'<button class="listen-all-btn" onclick="speakAll()">▶ 전체 듣기</button></div>'
    +cardsHtml+tipHtml+quizHtml+'</div>'
    +'<div class="done-section"><button class="done-btn" id="doneBtn" style="background:'+cfg.badgeBg+';color:'+cfg.badgeText+'" onclick="markDone()">오늘 학습 완료! ✓</button>'
    +'<div class="done-msg" id="doneMsg">🎉 완료됐어요! 내일도 카톡으로 도착해요.<br><span style="font-size:12px;">오늘도 수고하셨어요 💪</span></div></div>'
    +'<div class="footer">매일톡 · 내 삶을 바꾸는 톡<br>@maeiltalk_official</div>';
  document.getElementById('app').innerHTML=html;
  document.getElementById('app').style.display='block';
  document.getElementById('loading').style.display='none';
  document.title='매일톡 · Day '+String(dayNum).padStart(2,'0')+' — '+titleText;
  updateProgress();
}

var dayData=null;
for(var i=0;i<stageData.length;i++){if(stageData[i].day===dayNum){dayData=stageData[i];break;}}
if(!dayData)dayData=stageData[0];
render(dayData);
</script>
</body>
</html>
