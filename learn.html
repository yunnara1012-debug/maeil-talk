<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>매일톡 학습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Montserrat:wght@600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f0;min-height:100vh;padding-bottom:60px;}
  #loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:15px;color:#94a3b8;font-weight:600;}
  #app{display:none;}
  .header{padding:20px 20px 18px;}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .brand{font-size:12px;font-weight:700;}
  .day-badge{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;}
  .pattern-title{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;margin-bottom:3px;line-height:1.2;word-break:break-word;}
  .pattern-meaning{font-size:14px;font-weight:600;opacity:0.8;margin-bottom:6px;}
  .situation-badge{display:inline-block;font-size:11px;background:rgba(255,255,255,0.25);padding:2px 10px;border-radius:20px;}
  .progress-bar{background:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee;}
  .streak{font-size:13px;font-weight:700;color:#e55;white-space:nowrap;}
  .bar-wrap{flex:1;}
  .bar-track{width:100%;height:8px;background:#e8e8e8;border-radius:10px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:10px;transition:width 0.5s;}
  .bar-label{font-size:11px;color:#64748b;margin-top:3px;}
  .content{padding:12px 20px 0;}
  .section-title-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px;}
  .section-title{font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.08em;text-transform:uppercase;}
  .listen-all-btn{background:#1e293b;color:#fcd64d;border:none;border-radius:24px;padding:7px 16px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
  .listen-all-btn:active{opacity:0.8;}
  .expr-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:flex-start;gap:10px;}
  .expr-num{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;min-width:18px;margin-top:3px;}
  .expr-body{flex:1;min-width:0;}
  .expr-en{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#1e293b;line-height:1.3;display:block;margin-bottom:2px;word-break:break-word;}
  .expr-ko{font-size:13px;font-weight:700;color:#1e293b;display:block;}
  .expr-pron{font-size:12px;color:#64748b;display:block;margin-top:2px;}
  .expr-ctx{font-size:11px;color:#64748b;background:#fafafa;border-radius:0 4px 4px 0;padding:4px 8px;margin-top:6px;display:block;border-left:3px solid #e0e0e0;}
  .speak-btn{border:2px solid #e0e0e0;background:none;border-radius:50%;cursor:pointer;width:34px;height:34px;min-width:34px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#1e293b;flex-shrink:0;transition:background 0.15s;}
  .speak-btn:active,.speak-btn.playing{background:#fcd64d;border-color:#fcd64d;}
  .word-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  .word-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .word-main{flex:1;}
  .word-en{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:#1e293b;display:block;margin-bottom:2px;}
  .word-pron{font-size:12px;color:#64748b;display:block;}
  .word-meaning{font-size:14px;font-weight:700;color:#1e293b;display:block;margin-top:6px;}
  .word-example{font-size:13px;color:#475569;margin-top:8px;padding:8px 12px;background:#fafafa;border-radius:8px;line-height:1.6;}
  .word-example .en{font-family:'Montserrat',sans-serif;font-weight:600;display:block;}
  .word-example .ko{display:block;color:#94a3b8;font-size:12px;}
  .tip-box{border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:10px;border-left:4px solid;}
  .tip-label{font-size:11px;font-weight:700;margin-bottom:4px;}
  .tip-text{font-size:13px;color:#334155;line-height:1.7;}
  .quiz-title{font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.08em;text-transform:uppercase;margin:20px 0 10px;}
  .quiz-box{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:10px;}
  .quiz-q{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:14px;line-height:1.5;}
  .quiz-options{display:flex;flex-direction:column;gap:8px;}
  .quiz-opt{background:#f8f8f6;border:2px solid #e8e8e4;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:500;color:#334155;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left;}
  .quiz-opt:active{background:#f0f0e8;}
  .quiz-opt.correct{background:#dcfce7;border-color:#22c55e;color:#166534;}
  .quiz-opt.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b;}
  .quiz-opt.disabled{pointer-events:none;}
  .quiz-feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;display:none;}
  .quiz-feedback.show{display:block;}
  .quiz-feedback.ok{background:#dcfce7;color:#166534;}
  .quiz-feedback.fail{background:#fee2e2;color:#991b1b;}
  .done-section{padding:20px 20px 0;}
  .done-btn{width:100%;padding:16px;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}
  .done-btn:active{opacity:0.85;}
  .done-btn.completed{background:#22c55e !important;color:#fff !important;pointer-events:none;}
  .done-msg{text-align:center;margin-top:14px;font-size:14px;color:#64748b;line-height:1.7;display:none;}
  .done-msg.show{display:block;}
  .footer{text-align:center;margin-top:32px;font-size:11px;color:#94a3b8;padding:0 20px;line-height:1.8;}
</style>
</head>
<body>
<div id="loading">불러오는 중...</div>
<div id="app"></div>
<script>
var DB={1:[{"day": 1, "type": "학습", "pattern": "I'm ~", "meaning": "~이에요 / ~해요", "situation": "카페에서 처음 만난 사람에게 자기소개", "examples": [{"en": "I'm James.", "pronunciation": "아임 제임스", "ko": "저는 제임스예요.", "context": "이름을 말할 때 가장 기본!"}, {"en": "I'm from Korea.", "pronunciation": "아임 프럼 코리아", "ko": "저는 한국에서 왔어요.", "context": "출신을 말할 때"}, {"en": "I'm a coffee lover.", "pronunciation": "아임 어 커피 러버", "ko": "저는 커피를 정말 좋아해요.", "context": "취향·성격을 소개할 때"}, {"en": "I'm here with my friend.", "pronunciation": "아임 히어 위드 마이 프렌드", "ko": "저는 친구랑 같이 왔어요.", "context": "지금 상황을 설명할 때"}, {"en": "I'm so happy to meet you!", "pronunciation": "아임 쏘 해피 투 밋 유", "ko": "만나서 정말 반가워요!", "context": "첫 만남 마무리 인사"}], "tip": "I'm은 I am의 줄임말이에요. 말할 때는 거의 항상 I'm으로 써요. I am은 강조할 때만! 예: I am serious. (나 진지해!)"}, {"day": 2, "type": "학습", "pattern": "She is ~ / He is ~", "meaning": "그녀는 ~이에요 / 그는 ~이에요", "situation": "카페에서 친구를 소개해주는 상황", "examples": [{"en": "She is my best friend.", "pronunciation": "쉬 이즈 마이 베스트 프렌드", "ko": "그녀는 제 가장 친한 친구예요.", "context": "친구를 소개할 때"}, {"en": "She is a nurse.", "pronunciation": "쉬 이즈 어 너스", "ko": "그녀는 간호사예요.", "context": "직업을 소개할 때"}, {"en": "She is so kind to everyone.", "pronunciation": "쉬 이즈 쏘 카인드 투 에브리원", "ko": "그녀는 모두에게 정말 친절해요.", "context": "성격을 칭찬할 때"}, {"en": "He is a doctor.", "pronunciation": "히 이즈 어 닥터", "ko": "그는 의사예요.", "context": "직업을 소개할 때"}, {"en": "He is from Japan.", "pronunciation": "히 이즈 프럼 재팬", "ko": "그는 일본 출신이에요.", "context": "출신을 소개할 때"}], "tip": "She is = She's, He is = He's 로 줄여서 말하는 게 더 자연스러워요. 예: She's my friend. / He's so tall."}, {"day": 3, "type": "학습", "pattern": "Are you ~?", "meaning": "당신은 ~인가요?", "situation": "처음 만난 자리에서 상대방에 대해 물어보기", "examples": [{"en": "Are you a student?", "pronunciation": "아 유 어 스튜던트", "ko": "학생이에요?", "context": "상대방 신분을 물어볼 때"}, {"en": "Are you from Seoul?", "pronunciation": "아 유 프럼 서울", "ko": "서울 출신이에요?", "context": "출신지를 물어볼 때"}, {"en": "Are you new here?", "pronunciation": "아 유 뉴 히어", "ko": "여기 처음이에요?", "context": "처음 보는 사람에게"}, {"en": "Are you free this weekend?", "pronunciation": "아 유 프리 디스 위켄드", "ko": "이번 주말에 시간 있어요?", "context": "약속을 잡을 때"}, {"en": "Are you interested in coffee?", "pronunciation": "아 유 인터레스티드 인 커피", "ko": "커피에 관심 있어요?", "context": "공통 관심사를 찾을 때"}], "tip": "Are you ~? 는 Yes, I am. / No, I'm not. 으로 대답해요. 'I am yes.' 처럼 말하지 않도록 주의!"}, {"day": 4, "type": "학습", "pattern": "I'm not ~", "meaning": "저는 ~이 아니에요", "situation": "상대방의 오해를 부드럽게 바로잡는 상황", "examples": [{"en": "I'm not a tourist.", "pronunciation": "아임 낫 어 투어리스트", "ko": "저는 관광객이 아니에요.", "context": "오해를 바로잡을 때"}, {"en": "I'm not angry.", "pronunciation": "아임 낫 앵그리", "ko": "저는 화난 게 아니에요.", "context": "감정을 부정할 때"}, {"en": "I'm not ready yet.", "pronunciation": "아임 낫 레디 옛", "ko": "저는 아직 준비가 안 됐어요.", "context": "준비 상태를 말할 때"}, {"en": "I'm not that kind of person.", "pronunciation": "아임 낫 댓 카인드 오브 퍼슨", "ko": "저는 그런 사람이 아니에요.", "context": "자신을 해명할 때"}, {"en": "I'm not sure about that.", "pronunciation": "아임 낫 슈어 어바웃 댓", "ko": "그것에 대해선 잘 모르겠어요.", "context": "확신이 없을 때"}], "tip": "I'm not ~은 부드럽게 부정할 때 써요. 강하게 부정하고 싶을 땐 'I am NOT ~' 처럼 NOT을 강조해서 말해요."}, {"day": 5, "type": "학습", "pattern": "Where are you from?", "meaning": "어디 출신이에요?", "situation": "카페에서 외국인과 첫 대화를 나누는 상황", "examples": [{"en": "Where are you from?", "pronunciation": "웨어 아 유 프럼", "ko": "어디 출신이에요?", "context": "외국인에게 가장 먼저 쓰는 표현"}, {"en": "I'm from Korea. Where are you from?", "pronunciation": "아임 프럼 코리아. 웨어 아 유 프럼", "ko": "저는 한국 출신이에요. 당신은요?", "context": "내 출신을 말하고 되물을 때"}, {"en": "Are you from the US?", "pronunciation": "아 유 프럼 더 유에스", "ko": "미국 출신이에요?", "context": "출신을 추측해서 물어볼 때"}, {"en": "I'm originally from Busan.", "pronunciation": "아임 오리지널리 프럼 부산", "ko": "저는 원래 부산 출신이에요.", "context": "고향을 말할 때"}, {"en": "Oh, I've always wanted to visit there!", "pronunciation": "오, 아이브 올웨이즈 원티드 투 비짓 데어", "ko": "오, 거기 항상 가보고 싶었어요!", "context": "상대방 나라에 관심 표현할 때"}], "tip": "대답할 때 'I'm from + 나라/도시' 로 바로 말하면 돼요. Where are you from? = Where do you come from? 둘 다 같은 뜻이에요."}, {"day": 6, "type": "학습", "pattern": "It's ~ / They're ~", "meaning": "그것은 ~이에요 / 그것들은 ~이에요", "situation": "카페 안의 사물이나 장소를 설명하는 상황", "examples": [{"en": "It's really cozy here.", "pronunciation": "잇츠 리얼리 코지 히어", "ko": "여기 정말 아늑하네요.", "context": "장소 분위기를 표현할 때"}, {"en": "It's my favorite café.", "pronunciation": "잇츠 마이 페이버릿 카페", "ko": "여기가 제가 제일 좋아하는 카페예요.", "context": "좋아하는 장소를 소개할 때"}, {"en": "It's not far from here.", "pronunciation": "잇츠 낫 파 프럼 히어", "ko": "여기서 멀지 않아요.", "context": "거리를 설명할 때"}, {"en": "They're really good friends of mine.", "pronunciation": "데이아 리얼리 굿 프렌즈 오브 마인", "ko": "그들은 제 정말 좋은 친구들이에요.", "context": "여러 명을 소개할 때"}, {"en": "They're always here on weekends.", "pronunciation": "데이아 올웨이즈 히어 온 위켄즈", "ko": "그들은 주말마다 항상 여기 있어요.", "context": "습관적인 상황을 설명할 때"}], "tip": "It's = It is (하나의 사물·장소), They're = They are (여러 개·여러 명). 하나면 It's, 둘 이상이면 They're!"}, {"day": 7, "type": "복습", "title": "be동사 총정리", "review_days": [1, 2, 3, 4, 5, 6], "summary": [{"day": 1, "pattern": "I'm ~", "ko": "저는 ~이에요"}, {"day": 2, "pattern": "She is ~ / He is ~", "ko": "그녀는/그는 ~이에요"}, {"day": 3, "pattern": "Are you ~?", "ko": "당신은 ~인가요?"}, {"day": 4, "pattern": "I'm not ~", "ko": "저는 ~이 아니에요"}, {"day": 5, "pattern": "Where are you from?", "ko": "어디 출신이에요?"}, {"day": 6, "pattern": "It's ~ / They're ~", "ko": "그것은/그것들은 ~이에요"}], "quiz": [{"question": "저는 선생님이에요.", "hint": "I'm _____.", "answer": "a teacher"}, {"question": "그는 의사예요.", "hint": "He _____ a doctor.", "answer": "is"}, {"question": "학생이에요?", "hint": "_____ you a student?", "answer": "Are"}, {"question": "저는 화난 게 아니에요.", "hint": "I'm _____ angry.", "answer": "not"}, {"question": "여기 정말 아늑하네요.", "hint": "_____ really cozy here.", "answer": "It's"}], "mini_story": "Mina walks into a café. She sees a friendly face. 'Hi! I'm Mina. Are you new here?' 'Yes! I'm Jake. I'm from Canada.' 'Oh, it's my favorite café! She's my friend Lisa — she's really kind.' 'Nice to meet you both! I'm so happy to be here.'", "tip": "be동사는 주어에 따라 달라져요. I → am / He·She·It → is / You·We·They → are"}, {"day": 8, "type": "학습", "pattern": "I'm doing ~", "meaning": "저는 지금 ~하고 있어요", "situation": "카톡 답장이 늦었을 때 지금 상황을 설명하기", "examples": [{"en": "I'm working right now.", "pronunciation": "아임 워킹 라이트 나우", "ko": "저 지금 일하고 있어요.", "context": "바빠서 답장이 늦을 때"}, {"en": "I'm eating lunch.", "pronunciation": "아임 이팅 런치", "ko": "저 지금 점심 먹고 있어요.", "context": "식사 중임을 알릴 때"}, {"en": "I'm watching a movie.", "pronunciation": "아임 워칭 어 무비", "ko": "저 지금 영화 보고 있어요.", "context": "현재 하고 있는 활동을 말할 때"}, {"en": "I'm driving, so I'll call you back.", "pronunciation": "아임 드라이빙, 쏘 아일 콜 유 백", "ko": "운전 중이라서 나중에 전화할게요.", "context": "전화를 받기 어려울 때"}, {"en": "I'm getting ready to go out.", "pronunciation": "아임 게팅 레디 투 고 아웃", "ko": "나가려고 준비하고 있어요.", "context": "외출 준비 중임을 말할 때"}], "tip": "I'm + 동사ing = 지금 이 순간 하고 있는 일이에요. 'I'm doing'은 'I do'와 달리 지금 이 순간에 집중한 표현이에요!"}, {"day": 9, "type": "학습", "pattern": "What are you doing?", "meaning": "지금 뭐 해요?", "situation": "친구에게 카톡이나 전화로 지금 뭐 하는지 물어보기", "examples": [{"en": "What are you doing?", "pronunciation": "왓 아 유 두잉", "ko": "지금 뭐 해요?", "context": "친구에게 현재 상황을 물어볼 때"}, {"en": "What are you doing this evening?", "pronunciation": "왓 아 유 두잉 디스 이브닝", "ko": "오늘 저녁에 뭐 해요?", "context": "저녁 약속을 잡으려 할 때"}, {"en": "What are you guys doing over there?", "pronunciation": "왓 아 유 가이즈 두잉 오버 데어", "ko": "거기서 다들 뭐 하고 있어요?", "context": "여러 명에게 물어볼 때"}, {"en": "What are you doing tomorrow?", "pronunciation": "왓 아 유 두잉 투머로우", "ko": "내일 뭐 할 거예요?", "context": "내일 계획을 물어볼 때"}, {"en": "What are you looking for?", "pronunciation": "왓 아 유 루킹 포", "ko": "뭘 찾고 있어요?", "context": "무언가를 찾고 있는 사람에게"}], "tip": "What are you doing? 은 지금 상황뿐 아니라 가까운 미래 계획을 물어볼 때도 써요. 'What are you doing tomorrow?' 는 내일 계획을 묻는 자연스러운 표현이에요!"}, {"day": 10, "type": "학습", "pattern": "She's wearing ~", "meaning": "그녀는 ~을 입고 있어요", "situation": "약속 장소에서 친구를 찾거나 누군가의 옷차림을 설명할 때", "examples": [{"en": "She's wearing a red dress.", "pronunciation": "쉬즈 웨어링 어 레드 드레스", question": "지금 뭐 해요?", "hint": "What are you _____?", "answer": "doing"}, {"question": "그는 안경을 쓰고 있어요.", "hint": "He's _____ glasses.", "answer": "wearing"}, {"question": "오늘 몸이 안 좋아요.", "hint": "I'm not _____ well today.", "answer": "feeling"}, {"question": "버스 기다리고 있어요?", "hint": "Are you _____ for the bus?", "answer": "waiting"}], "mini_story": "Jisu is at a bus stop. She sees her coworker Minho. 'Hey Minho! Are you waiting for the bus?' 'Yeah, I'm waiting for the 302. What are you doing here?' 'I'm meeting a friend nearby. Are you okay? You're not feeling well?' 'I'm feeling a little tired. They're talking about a new café around here.' 'Oh, everyone is talking about that place! Let's check it out sometime.'", "tip": "현재진행형 = be동사(am/is/are) + 동사ing. 지금 이 순간 일어나고 있는 일을 표현할 때 써요!"}, {"day": 15, "type": "학습", "pattern": "I work at ~", "meaning": "저는 ~에서 일해요", "situation": "처음 만난 자리에서 직업을 소개하는 상황", "examples": [{"en": "I work at a hospital.", "pronunciation": "아이 워크 앳 어 하스피털", "ko": "저는 병원에서 일해요.", "context": "직장을 소개할 때"}, {"en": "I work at a café downtown.", "pronunciation": "아이 워크 앳 어 카페 다운타운", "ko": "저는 시내 카페에서 일해요.", "context": "직장 위치를 말할 때"}, {"en": "I work at a small startup.", "pronunciation": "아이 워크 앳 어 스몰 스타트업", "ko": "저는 작은 스타트업에서 일해요.", "context": "회사 규모를 함께 말할 때"}, {"en": "I work at home most of the time.", "pronunciation": "아이 워크 앳 홈 모스트 오브 더 타임", "ko": "저는 대부분 집에서 일해요.", "context": "재택근무를 말할 때"}, {"en": "I work at a school as a teacher.", "pronunciation": "아이 워크 앳 어 스쿨 애즈 어 티처", "ko": "저는 학교에서 선생님으로 일해요.", "context": "직업과 직장을 함께 말할 때"}], "tip": "'I work at + 장소' / 'I work as + 직업' — 둘 다 자주 쓰는 표현이에요. 예: I work at Google. / I work as a designer."}, {"day": 16, "type": "학습", "pattern": "I like ~", "meaning": "저는 ~을 좋아해요", "situation": "친구와 취향이나 관심사를 나누는 상황", "examples": [{"en": "I like coffee in the morning.", "pronunciation": "아이 라이크 커피 인 더 모닝", "ko": "저는 아침에 커피를 좋아해요.", "context": "좋아하는 것을 말할 때"}, {"en": "I like watching movies on weekends.", "pronunciation": "아이 라이크 워칭 무비즈 온 위켄즈", "ko": "저는 주말에 영화 보는 걸 좋아해요.", "context": "좋아하는 활동을 말할 때"}, {"en": "I like spending time with my friends.", "pronunciation": "아이 라이크 스펜딩 타임 위드 마이 프렌즈", "ko": "저는 친구들과 시간 보내는 걸 좋아해요.", "context": "좋아하는 상황을 말할 때"}, {"en": "I like trying new foods.", "pronunciation": "아이 라이크 트라잉 뉴 푸즈", "ko": "저는 새로운 음식을 먹어보는 걸 좋아해요.", "context": "도전적인 취향을 말할 때"}, {"en": "I really like the way you explained that.", "pronunciation": "아이 리얼리 라이크 더 웨이 유 익스플레인드 댓", "ko": "당신이 설명하는 방식이 정말 좋아요.", "context": "상대방을 칭찬할 때"}], "tip": "I like + 명사 / I like + 동사ing — 둘 다 가능해요. 'I like to + 동사'도 같은 뜻이에요. 예: I like to read. = I like reading."}, {"day": 17, "type": "학습", "pattern": "I don't like ~", "meaning": "저는 ~을 좋아하지 않아요", "situation": "음식이나 취향에 대해 솔직하게 말하는 상황", "examples": [{"en": "I don't like spicy food.", "pronunciation": "아이 돈 라이크 스파이시 푸드", "ko": "저는 매운 음식을 좋아하지 않아요.", "context": "음식 취향을 말할 때"}, {"en": "I don't like getting up early.", "pronunciation": "아이 돈 라이크 게팅 업 얼리", "ko": "저는 일찍 일어나는 걸 좋아하지 않아요.", "context": "싫어하는 습관을 말할 때"}, {"en": "I don't like crowded places.", "pronunciation": "아이 돈 라이크 크라우디드 플레이시즈", "ko": "저는 사람 많은 곳을 좋아하지 않아요.", "context": "싫어하는 환경을 말할 때"}, {"en": "I don't like it when it's too noisy.", "pronunciation": "아이 돈 라이크 잇 웬 잇츠 투 노이지", "ko": "너무 시끄러울 때가 싫어요.", "context": "싫어하는 상황을 말할 때"}, {"en": "I don't like being late.", "pronunciation": "아이 돈 라이크 비잉 레이트", "ko": "저는 늦는 걸 좋아하지 않아요.", "context": "성격·가치관을 말할 때"}], "tip": "don't like는 hate(증오하다)보다 훨씬 부드러운 표현이에요. 'I hate ~'는 강하게 들릴 수 있으니 일상에선 'I don't like ~'가 더 자연스러워요!"}, {"day": 18, "type": "학습", "pattern": "Do you ~?", "meaning": "당신은 ~해요?", "situation": "처음 만난 사람이나 친구에게 취미를 물어보는 상황", "examples": [{"en": "Do you exercise regularly?", "pronunciation": "두 유 엑서사이즈 레귤러리", "ko": "규칙적으로 운동해요?", "context": "생활 습관을 물어볼 때"}, {"en": "Do you enjoy cooking?", "pronunciation": "두 유 인조이 쿠킹", "ko": "요리하는 걸 즐겨요?", "context": "취미를 물어볼 때"}, {"en": "Do you usually take the subway?", "pronunciation": "두 유 유주얼리 테이크 더 서브웨이", "ko": "보통 지하철을 타요?", "context": "이동 수단을 물어볼 때"}, {"en": "Do you drink coffee every day?", "pronunciation": "두 유 드링크 커피 에브리 데이", "ko": "매일 커피 마셔요?", "context": "음료 습관을 물어볼 때"}, {"en": "Do you have any hobbies?", "pronunciation": "두 유 해브 애니 하비즈", "ko": "취미가 있어요?", "context": "처음 만났을 때 공통점 찾기"}], "tip": "Do you ~? 는 Yes, I do. / No, I don't. 로 대답해요. 조금 더 자세히 대답하고 싶을 땐 'Yes, I do. I usually ~' 처럼 이어서 말해요!"}, {"day": 19, "type": "학습", "pattern": "She doesn't ~", "meaning": "그녀는 ~하지 않아요", "situation": "다른 사람의 습관이나 성향을 설명하는 상황", "examples": [{"en": "She doesn't eat meat.", "pronunciation": "쉬 더즌트 잇 밋", "ko": "그녀는 고기를 먹지 않아요.", "context": "식습관을 설명할 때"}, {"en": "He doesn't drink alcohol.", "pronunciation": "히 더즌트 드링크 알코올", "ko": "그는 술을 마시지 않아요.", "context": "음주 습관을 말할 때"}, {"en": "She doesn't check her phone at dinner.", "pronunciation": "쉬 더즌트 체크 허 폰 앳 디너", "ko": "그녀는 저녁 식사 중에 폰을 확인하지 않아요.", "context": "좋은 습관을 소개할 때"}, {"en": "He doesn't talk much, but he's really kind.", "pronunciation": "히 더즌트 토크 머치, 벗 히즈 리얼리 카인드", "ko": "그는 말이 많지 않지만 정말 친절해요.", "context": "성격을 설명할 때"}, {"en": "She doesn't live far from here.", "pronunciation": "쉬 더즌트 리브 파 프럼 히어", "ko": "그녀는 여기서 멀리 살지 않아요.", "context": "사는 곳을 설명할 때"}], "tip": "3인칭 단수(He / She / It) 부정은 don't가 아니라 doesn't예요. 'She don't ~' (X) → 'She doesn't ~' (O) — 꼭 기억하세요!"}, {"day": 20, "type": "학습", "pattern": "I always / usually ~", "meaning": "저는 항상/보통 ~해요", "situation": "자신의 하루 루틴이나 생활 습관을 소개하는 상황", "examples": [{"en": "I always have coffee in the morning.", "pronunciation": "아이 올웨이즈 해브 커피 인 더 모닝", "ko": "저는 항상 아침에 커피를 마셔요.", "context": "빠지지 않는 습관을 말할 때"}, {"en": "I usually take a walk after dinner.", "pronunciation": "아이 유주얼리 테이크 어 워크 애프터 디너", "ko": "저는 보통 저녁 먹고 산책해요.", "context": "저녁 루틴을 말할 때"}, {"en": "I always check my phone when I wake up.", "pronunciation": "아이 올웨이즈 체크 마이 폰 웬 아이 웨이크 업", "ko": "저는 항상 일어나자마자 폰을 확인해요.", "context": "아침 습관을 말할 때"}, {"en": "I usually go to bed around 11.", "pronunciation": "아이 유주얼리 고 투 {"question": "저는 병원에서 일해요.", "hint": "I _____ at a hospital.", "answer": "work"}, {"question": "저는 매운 음식을 좋아하지 않아요.", "hint": "I _____ like spicy food.", "answer": "don't"}, {"question": "규칙적으로 운동해요?", "hint": "_____ you exercise regularly?", "answer": "Do"}, {"question": "그녀는 고기를 먹지 않아요.", "hint": "She _____ eat meat.", "answer": "doesn't"}, {"question": "저는 보통 11시쯤 자요.", "hint": "I _____ go to bed around 11.", "answer": "usually"}], "mini_story": "Sora and Tom meet at a company lunch. 'Do you work near here?' Tom asks. 'Yes! I work at the building next door. I usually walk to work.' 'I like that. I don't like taking the subway — it's always so crowded.' 'I know! I always have coffee before I start. Do you drink coffee?' 'I don't really like coffee. I usually have tea. She doesn't drink either,' he says, pointing to his colleague. 'Oh! I'm actually studying to become a barista on weekends. I study every Saturday.'", "tip": "현재형은 '지금'이 아니라 '평소, 항상, 반복'을 말할 때 써요. 지금 일어나는 일은 현재진행형(~ing)으로 표현하는 것 잊지 마세요!"}, {"day": 23, "type": "학습", "pattern": "I have ~", "meaning": "저는 ~이 있어요", "situation": "티켓·예약 확인이나 소지품을 말하는 상황", "examples": [{"en": "I have a reservation.", "pronunciation": "아이 해브 어 레저베이션", "ko": "예약이 있어요.", "context": "식당·호텔 체크인할 때"}, {"en": "I have two tickets for tonight.", "pronunciation": "아이 해브 투 티켓츠 포 투나잇", "ko": "오늘 밤 티켓 두 장이 있어요.", "context": "공연·영화 티켓을 말할 때"}, {"en": "I have a meeting at 3.", "pronunciation": "아이 해브 어 미팅 앳 쓰리", "ko": "3시에 미팅이 있어요.", "context": "일정을 말할 때"}, {"en": "I have some questions.", "pronunciation": "아이 해브 썸 퀘스쳔즈", "ko": "질문이 몇 가지 있어요.", "context": "궁금한 것을 말할 때"}, {"en": "I have everything I need.", "pronunciation": "아이 해브 에브리씽 아이 니드", "ko": "필요한 건 다 있어요.", "context": "준비 완료를 말할 때"}], "tip": "have는 '가지다' 외에도 '(일정이) 있다'는 뜻으로도 자주 써요. 예: I have a cold.(감기에 걸렸어요.) / I have time.(시간이 있어요.)"}, {"day": 24, "type": "학습", "pattern": "Do you have ~?", "meaning": "~이 있어요?", "situation": "편의점이나 가게에서 원하는 것이 있는지 물어보는 상황", "examples": [{"en": "Do  좀 더 공손하게 하려면 앞에 'Hey,'나 'Excuse me,'를 붙이거나 Could you ~?로 바꾸면 됩니다!"}, {"day": 54, "type": "학습", "pattern": "Could you ~?", "meaning": "~해주실 수 있을까요?", "situation": "호텔, 식당, 공식적인 자리에서 정중하게 부탁하는 상황", "examples": [{"en": "Could you bring me another towel?", "pronunciation": "쿠드 유 브링 미 어나더 타월", "ko": "수건을 하나 더 가져다주실 수 있을까요?", "context": "호텔에서"}, {"en": "Could you speak more slowly?", "pronunciation": "쿠드 유 스피크 모어 슬로울리", "ko": "좀 더 천천히 말해주실 수 있을까요?", "context": "외국인과 대화할 때"}, {"en": "Could you recommend a good restaurant?", "pronunciation": "쿠드 유 레커멘드 어 굿 레스토랑", "ko": "좋은 식당을 추천해주실 수 있을까요?", "context": "현지인에게 물어볼 때"}, {"en": "Could you check my reservation?", "pronunciation": "쿠드 유 첵 마이 레저베이션", "ko": "제 예약을 확인해주실 수 있을까요?", "context": "호텔 프런트에서"}, {"en": "Could you hold the door for me?", "pronunciation": "쿠드 유 홀드 더 도어 포 미", "ko": "문 좀 잡아주실 수 있을까요?", "context": "손이 가득찼을 때"}], "tip": "Could you ~?는 Can you ~?보다 훨씬 공손한 표현이에요. 처음 보는 사람, 나이 많은 분, 고객 서비스 직원에게 쓰기 딱 좋아요. Could는 can의 공손한 버전!"}, {"day": 55, "type": "학습", "pattern": "I can't ~", "meaning": "저는 ~할 수 없어요 / 못해요", "situation": "능력이나 상황상 할 수 없는 것을 설명하는 상황", "examples": [{"en": "I can't make it tonight.", "pronunciation": "아이 캔트 메이크 잇 투나이트", "ko": "오늘 밤은 못 가요.", "context": "약속을 못 지킬 때"}, {"en": "I can't hear you. Can you speak up?", "pronunciation": "아이 캔트 히어 유 캔 유 스피크 업", "ko": "잘 안 들려요. 좀 크게 말해줄 수 있어요?", "context": "소리가 안 들릴 때"}, {"en": "I can't eat spicy food.", "pronunciation": "아이 캔트 이트 스파이시 푸드", "ko": "저는 매운 음식을 못 먹어요.", "context": "음식 제한을 말할 때"}, {"en": "I can't believe it!", "pronunciation": "아이 캔트 빌리브 잇", "ko": "믿을 수가 없어요!", "context": "놀랐을 때"}, {"en": "I can't find my keys.", "pronunciation": "아이 캔트 파인드 마이 키즈", "ko": "열쇠를 못 찾겠어요.", "context": "물건을 잃어버렸을 때"}], "tip": "can't는 cannot의 줄임말이에요. 발음할 때 't'를 살짝 삼키듯이 '캔트'보다 '캔(ㅌ)' 처럼 발음하는 게 자연스러워요. can(캔)과 can't(캔트) 발음 차이를 귀 기울여 들어봐요!"}, {"day": 56, "type": "학습", "pattern": "Could I ~?", "meaning": "제가 ~해도 될까요?", "situation": "Can I보다 더 정중하게 허락을 구하거나 부탁하는 상황", "examples": [{"en": "Could I have a glass of water?", "pronunciation": "쿠드 아이 해브 어 글래스 오브 워터", "ko": "물 한 잔 주실 수 있을까요?", "context": "식당이나 카페에서"}, {"en": "Could I borrow your pen?", "pronunciation": "쿠드 아이 바로우 유어 펜", "ko": "펜 좀 빌려도 될까요?", "context": "필기도구가 필요할 때"}, {"en": "Could I leave a bit early today?", "pronunciation": "쿠드 아이 리브 어 빗 얼리 투데이", "ko": "오늘 조금 일찍 나가도 될까요?", "context": "상사에게 양해를 구할 때"}, {"en": "Could I get your business card?", "pronunciation": "쿠드 아이 겟 유어 비즈니스 카드", "ko": "명함 한 장 받을 수 있을까요?", "context": "비즈니스 미팅에서"}, {"en": "Could I try this on?", "pronunciation": "쿠드 아이 트라이 디스 온", "ko": "이거 입어봐도 될까요?", "context": "옷가게에서"}], "tip": "Could I ~?와 Can I ~?는 비슷하지만 Could I가 더 격식 있고 공손해요. 면접, 업무 상황, 처음 만나는 사람에게는 Could I를 쓰는 게 인상이 훨씬 좋아요!"}, {"day": 57, "type": "학습", "pattern": "I could / I couldn't ~", "meaning": "~할 수 있었어요 / ~할 수 없었어요", "situation": "과거에 할 수 있었던 것, 또는 할 수 없었던 것을 말하는 상황", "examples": [{"en": "I could swim when I was young.", "pronunciation": "아이 쿠드 스윔 웬 아이 워즈 영", "ko": "어릴 때는 수영을 잘했어요.", "context": "어릴 때 능력을 말할 때"}, {"en": "I couldn't sleep last night.", "pronunciation": "아이 쿠든트 슬립 라스트 나이트", "ko": "어젯밤에 잠을 못 잤어요.", "context": "잠 못 잔 이유를 말할 때"}, {"en": "I could see the ocean from my room.", "pronunciation": "아이 쿠드 씨 디 오션 프럼 마이 룸", "ko": "방에서 바다가 보였어요.", "context": "여행지 묘사할 때"}, {"en": "I couldn't understand what he said.", "pronunciation": "아이 쿠든트 언더스탠드 왓 히 세드", "ko": "그가 하는 말을 이해할 수 없었어요.", "context": "언어 장벽이 있었을 때"}, {"en": "I couldn't believe how beautiful it was.", "pronunciation": "아이 쿠든트 빌리브 하우 뷰티풀 잇 워즈", "ko": "얼마나 아름다운지 믿기지 않았어요.", "context": "감동적인 경험을 나눌 때"}], "tip": "could는 과거의 능력, couldn't는 과거에 불가능했던 것을 표현해요. can → could(과거), can't → couldn't(과거) — 짝꿍처럼 기억해요!"}, {"day": 58, "type": "복습", "title": "can / could 총정리", "review_days": [52, 53, 54, 55, 56, 57], "summary": [{"day": 52, "pattern": "Can I ~?", "ko": "제가 ~해도 될까요? (허락)"}, {"day": 53, "pattern": "Can you ~?", "ko": "~해줄 수 있어요? (부탁)"}, {"day": 54, "pattern": "Could you ~?", "ko": "~해주실 수 있을까요? (정중한 부탁)"}, {"day": 55, "pattern": "I can't ~", "ko": "저는 ~할 수 없어요"}, {"day": 56, "pattern": "Could I ~?", "ko": "제가 ~해도 될까요? (정중한 허락)"}, {"day": 57, "pattern": "I could / I couldn't ~", "ko": "~할 수 있었어요 / 없었어요 (과거)"}], "quiz": [{"question": "충전기 좀 써도 될까요?", "hint": "Can I _____ your charger?", "answer": "use"}, {"question": "다시 한번 말해줄 수 있어요?", "hint": "Can you say that _____?", "answer": "again"}, {"question": "좀 더 천천히 말해주실 수 있을까요?", "hint": "Could you speak more _____?", "answer": "slowly"}, {"question": "오늘 밤은 못 가요.", "hint": "I can't _____ it tonight.", "answer": "make"}, {"question": "어젯밤에 잠을 못 잤어요.", "hint": "I couldn't _____ last night.", "answer": "sleep"}], "mini_story": "Tom is at a hotel. He walks up to the front desk. 'Could I check in early?' he asks politely. 'Sorry, we can't do that before 2 PM,' says the staff. 'Could you keep my luggage then?' 'Of course!' Later, a stranger asks, 'Can you take a photo of me?' 'Sure!' Tom replies. He couldn't find a good angle at first, but eventually got a great shot. 'Can I see it?' the stranger asks. 'Of course! I could see the sunset perfectly from here!'", "tip": "can vs could 핵심 정리! can → 일반적인 능력·허락·부탁 | could → 더 공손한 허락·부탁, 또는 과거 능력. 격식체가 필요한 상황에서는 항상 could를 선택하세요!"}, {"day": 59, "type": "학습", "pattern": "I have to ~", "meaning": "저는 ~해야 해요", "situation": "해야 하는 일, 의무나 필요한 상황을 말할 때", "examples": [{"en": "I have to go now.", "pronunciation": "아이 해브 투 고우 나우", "ko": "지금 가야 해요.", "context": "자리를 떠야 할 때"}, {"en": "I have to finish this by tomorrow.", "pronunciation": "아이 해브 투 피니쉬 디스 바이 투모로우", "ko": "이걸 내일까지 끝내야 해요.", "context": "마감이 있을 때"}, {"en": "I have to wake up early tomorrow.", "pronunciation": "아이 해브 투 웨이크 업 얼리 투모로우", "ko": "내일 일찍 일어나야 해요.", "context": "일정이 있을 때"}, {"en": "I have to call my mom.", "pronunciation": "아이 해브 투 콜 마이 맘", "ko": "엄마한테 전화해야 해요.", "context": "연락해야 할 때"}, {"en": "Do I have to pay in advance?", "pronunciation": "두 아이 해브 투 페이 인 어드밴스", "ko": "미리 결제해야 하나요?", "context": "결제 조건을 확인할 때"}], "tip": "have to는 외부 상황이나 규칙 때문에 해야 하는 것을 말해요. must보다 일상적으로 더 많이 써요. 'I have to'는 빠르게 말하면 '아이 해프터'처럼 들리기도 해요!"}, {"day": 60, "type": "학습", "pattern": "You must ~", "meaning": "반드시 ~해야 해요", "situation": "중요한 규칙, 강한 의무, 또는 강한 추천을 말하는 상황", "examples": [{"en": "You must wear a seatbelt.", "pronunciation": "유 머스트 웨어 어 싯벨트", "ko": "반드시 안전벨트를 매야 해요.", "context": "차 안에서 규칙 말할 때"}, {"en": "You must try this dish!", "pronunciation": "유 머스트 트라이 디스 디쉬", "ko": "이 요리는 꼭 먹어봐야 해요!", "context": "강하게 추천할 때"}, {"en": "You must not smoke here.", "pronunciation": "유 머스트 낫 스모크 히어", "ko": "여기서 흡연하시면 안 됩니다.", "context": "금지 규칙을 알려줄 때"}, {"en": "You must be so tired.", "pronunciation": "유 머스트 비 쏘 타이어드", "ko": "정말 피곤하시겠어요.", "context": "상대방 상황을 추측할 때"}, {"en": "You must show your ID at the door.", "pronunciation": "유 머스트 쇼우 유어 아이디 앳 더 도어", "ko": "입구에서 신분증을 보여주셔야 합니다.", "context": "입장 규칙 안내"}], "tip": "must는 강한 의무나 확신을 나타내요. 'You must try this!'처럼 추천에도 써요. must not(머스트 낫)은 금지를 뜻해요. don't have to(안 해도 됨)와 헷갈리지 마세요!"}, {"day": 61, "type": "학습", "pattern": "I don't have to ~", "meaning": "저는 ~하지 않아도 돼요", "situation": "할 필요가 없거나 선택 사항임을 말하는 상황", "examples": [{"en": "I don't have to work tomorrow.", "pronunciation": "아이 돈트 해브 투 워크 투모로우", "ko": "내일 일 안 해도 돼요.", "context": "휴일이나 쉬는 날"}, {"en": "You don't have to pay for this.", "pronunciation": "유 돈트 해브 투 페이 포 디스", "ko": "이건 돈 안 내셔도 돼요.", "context": "무료임을 알려줄 때"}, {"en": "I don't have to be there until noon.", "pronunciation": "아이 돈트 해브 투 비 데어 언틸 눈", "ko": "정오까지만 거기 있으면 돼요.", "context": "시간 여유가 있을 때"}, {"en": "You don't have to explain yourself.", "pronunciation": "유 돈트 해브 투 익스플레인 유어셀프", "ko": "굳이 설명 안 하셔도 돼요.", "context": "상대방을 안심시킬 때"}, {"en": "I don't have to decide right now.", "pronunciation": "아이 돈트 해브 투 디사이드 라잇 나우", "ko": "지금 바로 결정 안 해도 돼요.", "context": "여유를 가질 때"}], "tip": "don't have to는 '안 해도 됨 (선택)'이에요. must not은 '하면 안 됨 (금지)'이고요. 완전히 반대 의미이니 헷갈리지 마세요! 'You don't have to come.' (안 와도 돼) vs 'You must not come.' (오면 안 돼)"}, {"day": 62, "type": "학습", "pattern": "Should I ~?", "meaning": "제가 ~해야 할까요?", "situation": "결정이 필요할 때 상대방의 조언을 구하는 상황", "examples": [{"en": "Should I call first?", "pronunciation": "슈드 아이 콜 퍼스트", "ko": "먼저 전화해야 할까요?", "context": "예의를 갖출지 고민될 때"}, {"en": "Should I bring anything?", "pronunciation": "슈드 아이 브링 애니씽", "ko": "뭔가 가져가야 할까요?", "context": "모임에 참석할 때"}, {"en": "Should I apologize to her?", "pronunciation": "슈드 아이 어팔러자이즈 투 허", "ko": "그녀에게 사과해야 할까요?", "context": "상황 판단이 필요할 때"}, {"en": "Should I take a taxi or the subway?", "pronunciation": "슈드 아이 테이크 어 택시 오어 더 서브웨이", "ko": "택시를 탈까요, 지하철을 탈까요?", "context": "이동 수단을 고민할 때"}, {"en": "Should I say something or just ignore it?", "pronunciation": "슈드 아이 세이 썸씽 오어 저스트 이그노어 잇", "ko": "말을 해야 할까요, 그냥 넘어가야 할까요?", "context": "민감한 상황에서 판단할 때"}], "tip": "Should I ~?는 '내가 이걸 해야 할까?' 하고 스스로 판단이 안 설 때 쓰는 표현이에요. 대답은 Yes, you should. / No, you don't have to. / It depends. 등으로 해요!"}, {"day": 63, "type": "학습", "pattern": "You should ~", "meaning": "~하는 게 좋을 것 같아요", "situation": "친구에게 조언을 해주거나 권유하는 상황", "examples": [{"en": "You should see a doctor.", "pronunciation": "유 슈드 씨 어 닥터", "ko": "병원에 가보는 게 좋을 것 같아요.", "context": "몸이 안 좋을 때 조언"}, {"en": "You should try this place.", "pronunciation": "유 슈드 트라이 디스 플레이스", "ko": "이 곳 한번 가봐요.", "context": "맛집이나 좋은 곳을 추천할 때"}, {"en": "You should get some rest.", "pronunciation": "유 슈드 겟 썸 레스트", "ko": "좀 쉬는 게 좋을 것 같아요.", "context": "무리하는 사람에게 조언"}, {"en": "You should tell him how you feel.", "pronunciation": "유 슈드 텔 힘 하우 유 필", "ko": "네 마음을 그에게 말하는 게 좋을 것 같아요.", "context": "감정 표현을 권유할 때"}, {"en": "You should back up your files.", "pronunciation": "유 슈드 백 업 유어 파일즈", "ko": "파일을 백업해두는 게 좋을 것 같아요.", "context": "실용적인 조언을 할 때"}], "tip": "should는 강제가 아닌 부드러운 조언·권유예요. 'You must'(반드시 해야 함)보다 훨씬 부드러워요. 조언할 때 앞에 'I think'를 붙이면 더 부드럽게 들려요: 'I think you should ~'"}, {"day": 64, "type": "학습", "pattern": "I'd better ~", "meaning": "~하는 게 낫겠어요 (그렇지 않으면 안 좋을 것 같아서)", "situation": "서둘러야 하거나, 하지 않으면 결과가 안 좋을 것 같을 때", "examples": [{"en": "I'd better leave now or I'll be late.", "pronunciation": "아이드 베러 리브 나우 오어 아일 비 레잇", "ko": "지금 출발하는 게 낫겠어요, 안 그러면 늦겠어요.", "context": "시간이 촉박할 때"}, {"en": "I'd better call and cancel.", "pronunciation": "아이드 베러 콜 앤드 캔슬", "ko": "전화해서 취소하는 게 낫겠어요.", "context": "약속을 못 지킬 것 같을 때"}, {"en": "You'd better take an umbrella.", "pronunciation": "유드 베러 테이크 언 엄브렐라", "ko": "우산 챙기는 게 좋겠어요.", "context": "비 올 것 같을 때"}, {"en": "I'd better not eat any more.", "pronunciation": "아이드 베러 낫 이트 애니 모어", "ko": "더 먹지 않는 게 낫겠어요.", "context": "절제가 필요할 때"}, {"en": "We'd better hurry up.", "pronunciation": "위드 베러 허리 업", "ko": "서두르는 게 낫겠어요.", "context": "시간이 없을 때"}], "tip": "'I'd better'는 'I had better'의 줄임말이에요. should보다 더 긴박한 느낌! '안 그러면 문제가 생길 것 같다'는 뉘앙스가 있어요. 'd better not은 하지 않는 게 낫다는 뜻이에요."}, {"day": 65, "type": "복습", "title": "must / have to / should 총정리", "review_days": [59, 60, 61, 62, 63, 64], "summary": [{"day": 59, "pattern": "I have to ~", "ko": "~해야 해요 (외부 의무)"}, {"day": 60, "pattern": "You must ~", "ko": "반드시 ~해야 해요 (강한 의무·추천)"}, {"day": 61, "pattern": "I don't have to ~", "ko": "~하지 않아도 돼요 (선택)"}, {"day": 62, "pattern": "Should I ~?", "ko": "~해야 할까요? (조언 구하기)"}, {"day": 63, "pattern": "You should ~", "ko": "~하는 게 좋을 것 같아요 (조언)"}, {"day": 64, "pattern": "I'd better ~", "ko": "~하는 게 낫겠어요 (긴박한 상황)"}], "quiz": [{"question": "지금 가야 해요.", "hint": "I have to _____ now.", "answer": "go"}, {"question": "이건 돈 안 내셔도 돼요.", "hint": "You don't have to _____ for this.", "answer": "pay"}, {"question": "병원에 가보는 게 좋을 것 같아요.", "hint": "You should see a _____.", "answer": "doctor"}, {"question": "서두르는 게 낫겠어요.", "hint": "We'd better _____ up.", "answer": "hurry"}, {"question": "반드시 안전벨트를 매야 해요.", "hint": "You must _____ a seatbelt.", "answer": "wear"}], "mini_story": "Amy has a big presentation tomorrow. She looks stressed. 'You should get some sleep,' her friend says. 'I know, but I have to finish these slides first.' 'You don't have to do everything tonight!' 'I'd better, or I won't be ready. Should I call my boss and explain?' 'No! You must not do that. Just focus.' 'You're right. I'd better stop overthinking and just do it.' An hour later: 'Done! I'd better sleep now.'", "tip": "헷갈리는 세 가지 비교! must/have to → 해야 함 | don't have to → 안 해도 됨(but must not은 하면 안 됨!) | should → 권유·조언 | had better → 더 긴박한 권유. 강도 순서: must > have to > had better > should"}, {"day": 66, "type": "학습", "pattern": "I'd like ~", "meaning": "저는 ~을 원해요 / ~하고 싶어요", "situation": "카페, 식당, 매장에서 정중하게 주문하거나 요청하는 상황", "examples": [{"en": "I'd like a latte, please.", "pronunciation": "아이드 라이크 어 라떼 플리즈", "ko": "라떼 한 잔 주세요.", "context": "카페에서 주문할 때"}, {"en": "I'd like to make a reservation.", "pronunciation": "아이드 라이크 투 메이크 어 레저베이션", "ko": "예약하고 싶어요.", "context": "식당·호텔 예약할 때"}, {"en": "I'd like the window seat, if possible.", "pronunciation": "아이드 라이크 더 윈도우 싯 이프 파서블", "ko": "가능하면 창가 자리로 주세요.", "context": "자리를 요청할 때"}, {"en": "I'd like to speak to the manager.", "pronunciation": "아이드 라이크 투 스피크 투 더 매니저", "ko": "매니저와 이야기하고 싶어요.", "context": "담당자를 찾을 때"}, {"en": "I'd like to try something different today.", "pronunciation": "아이드 라이크 투 트라이 썸씽 디퍼런트 투데이", "ko": "오늘은 색다른 걸 먹어보고 싶어요.", "context": "새로운 시도를 할 때"}], "tip": "I'd like은 I want보다 훨씬 공손하고 세련된 표현이에요. 주문할 때, 부탁할 때, 뭔가를 원할 때 I want 대신 I'd like을 쓰면 훨씬 자연스럽고 예의 바르게 들려요!"}, {"day": 67, "type": "학습", "pattern": "Would you like ~?", "meaning": "~하시겠어요? / ~드릴까요?", "situation": "음식을 권하거나 상대방이 원하는 것을 정중하게 물어보는 상황", "examples": [{"en": "Would you like some coffee?", "pronunciation": "우드 유 라이크 썸 커피", "ko": "커피 드시겠어요?", "context": "손님에게 음료를 권할 때"}, {"en": "Would you like to join us?", "pronunciation": "우드 유 라이크 투 조인 어스", "ko": "저희랑 같이하시겠어요?", "context": "함께 하자고 권유할 때"}, {"en": "Would you like a bag?", "pronunciation": "우드 유 라이크 어 백", "ko": "봉투 드릴까요?", "context": "계산할 때 점원이 물어볼 때"}, {"en": "Would you like anything else?", "pronunciation": "우드 유 라이크 애니씽 엘스", "ko": "다른 거 필요하신 게 있으세요?", "context": "서비스 마무리할 때"}, {"en": "Would you like me to help you with that?", "pronunciation": "우드 유 라이크 미 투 헬프 유 윗 댓", "ko": "제가 도와드릴까요?", "context": "도움을 제안할 때"}], "tip": "Would you like ~?는 Do you want ~?보다 훨씬 공손해요. 서비스업, 손님 접대, 격식 있는 자리에서 꼭 써야 하는 표현이에요. 대답은 Yes, please. / No, thank you. 가 자연스러워요!"}, {"day": 68, "type": "학습", "pattern": "I'd rather ~", "meaning": "저는 차라리 ~하겠어요", "situation": "두 가지 선택지 중 하나를 선호할 때, 또는 다른 것을 원할 때", "examples": [{"en": "I'd rather stay home tonight.", "pronunciation": "아이드 라더 스테이 홈 투나이트", "ko": "오늘 밤은 집에 있는 게 낫겠어요.", "context": "나가기 싫을 때"}, {"en": "I'd rather have tea than coffee.", "pronunciation": "아이드 라더 해브 티 댄 커피", "ko": "커피보다는 차가 낫겠어요.", "context": "음료를 고를 때"}, {"en": "I'd rather not talk about it.", "pronunciation": "아이드 라더 낫 톡 어바웃 잇", "ko": "그 얘기는 하지 않는 게 낫겠어요.", "context": "민감한 주제를 피할 때"}, {"en": "I'd rather walk than take a cab.", "pronunciation": "아이드 라더 워크 댄 테이크 어 캡", "ko": "택시보다 걸어가는 게 낫겠어요.", "context": "이동 방법을 선택할 때"}, {"en": "Would you rather eat in or go out?", "pronunciation": "우드 유 라더 이트 인 오어 고우 아웃", "ko": "집에서 먹을까요, 나가서 먹을까요?", "context": "상대방 선호를 물어볼 때"}], "tip": "I'd rather는 'I would rather'의 줄임말이에요. 비교할 때는 'I'd rather A than B' 형식으로 써요. 'I'd rather not'은 '~하고 싶지 않아요'라는 부드러운 거절 표현으로도 유용해요!"}, {"day": 69, "type": "학습", "pattern": "What is ~? / Where is ~?", "meaning": "~이 무엇인가요? / ~이 어디에 있나요?", "situation": "모르는 것을 물어보거나 위치를 찾는 상황", "examples": [{"en": "What is the WiFi password?", "pronunciation": "왓 이즈 더 와이파이 패스워드", "ko": "와이파이 비밀번호가 뭐예요?", "context": "카페나 호텔에서"}, {"en": "Where is the nearest subway station?", "pronunciation": "웨어 이즈 더 니어리스트 서브웨이 스테이션", "ko": "가장 가까운 지하철역이 어디예요?", "context": "길을 찾을 때"}, {"en": "What is this called in English?", "pronunciation": "왓 이즈 디스 콜드 인 잉글리쉬", "ko": "이게 영어로 뭐예요?", "context": "단어를 모를 때"}, {"en": "Where is the restroom?", "pronunciation": "웨어 이즈 더 레스트룸", "ko": "화장실이 어디예요?", "context": "화장실을 찾을 때"}, {"en": "What is the checkout time?", "pronunciation": "왓 이즈 더 체크아웃 타임", "ko": "체크아웃 시간이 언제예요?", "context": "호텔에서 확인할 때"}], "tip": "What과 Where는 가장 기본적인 의문사예요. 모르면 바로 물어볼 수 있는 가장 유용한 표현들이에요. 여행 중에 이 두 가지만 잘 써도 웬만한 상황은 다 해결돼요!"}, {"day": 70, "type": "학습", "pattern": "How much ~? / How long ~?", "meaning": "얼마예요? / 얼마나 걸려요?", "situation": "쇼핑하거나 이동 시간, 소요 시간을 물어보는 상황", "examples": [{"en": "How much is this?", "pronunciation": "하우 머치 이즈 디스", "ko": "이거 얼마예요?", "context": "쇼핑할 때"}, {"en": "How much does it cost to get there?", "pronunciation": "하우 머치 더즈 잇 코스트 투 겟 데어", "ko": "거기까지 얼마예요?", "context": "교통비를 물어볼 때"}, {"en": "How long does it take to get to the airport?", "pronunciation": "하우 롱 더즈 잇 테이크 투 겟 투 디 에어포트", "ko": "공항까지 얼마나 걸려요?", "context": "이동 시간을 확인할 때"}, {"en": "How long have you been waiting?", "pronunciation": "하우 롱 해브 유 빈 웨이팅", "ko": "얼마나 기다리셨어요?", "context": "상대방을 배려할 때"}, {"en": "How much longer do we have to wait?", "pronunciation": "하우 머치 롱거 두 위 해브 투 웨잇", "ko": "얼마나 더 기다려야 해요?", "context": "대기 시간을 확인할 때"}], "tip": "How much = 가격·양 | How long = 시간·거리를 물어볼 때 써요. 'How much is it?'와 'How much does it cost?'는 같은 의미예요. 둘 다 자연스럽게 쓸 수 있어요!"}, {"day": 71, "type": "학습", "pattern": "What time ~? / How do I ~?", "meaning": "몇 시에 ~해요? / ~는 어떻게 해요?", "situation": "시간이나 방법을 물어보는 상황", "examples": [{"en": "What time does it open?", "pronunciation": "왓 타임 더즈 잇 오픈", "ko": "몇 시에 열어요?", "context": "가게·시설 운영시간 확인"}, {"en": "What time should we meet?", "pronunciation": "왓 타임 슈드 위 밋", "ko": "몇 시에 만날까요?", "context": "약속 시간을 정할 때"}, {"en": "How do I get to the museum?", "pronunciation": "하우 두 아이 겟 투 더 뮤지엄", "ko": "박물관에 어떻게 가요?", "context": "길을 물어볼 때"}, {"en": "How do I use this machine?", "pronunciation": "하우 두 아이 유즈 디스 머신", "ko": "이 기계는 어떻게 사용해요?", "context": "기계 사용법을 모를 때"}, {"en": "What time is the last train?", "pronunciation": "왓 타임 이즈 더 라스트 트레인", "ko": "마지막 기차가 몇 시예요?", "context": "막차 시간을 확인할 때"}], "tip": "What time은 시간을 물어볼 때, How do I는 방법을 물어볼 때 써요. 여행 중 가장 자주 쓰는 질문들이에요. 'How do I ~?'는 기계·시스템 사용법뿐 아니라 절차를 물어볼 때도 써요!"}, {"day": 72, "type": "복습", "title": "would like / 질문 표현 총정리", "review_days": [66, 67, 68, 69, 70, 71], "summary": [{"day": 66, "pattern": "I'd like ~", "ko": "~을 원해요 (공손한 요청)"}, {"day": 67, "pattern": "Would you like ~?", "ko": "~하시겠어요? (권유)"}, {"day": 68, "pattern": "I'd rather ~", "ko": "차라리 ~하겠어요 (선호)"}, {"day": 69, "pattern": "What is ~? / Where is ~?", "ko": "무엇인가요? / 어디예요?"}, {"day": 70, "pattern": "How much ~? / How long ~?", "ko": "얼마예요? / 얼마나 걸려요?"}, {"day": 71, "pattern": "What time ~? / How do I ~?", "ko": "몇 시에? / 어떻게 해요?"}], "quiz": [{"question": "라떼 한 잔 주세요.", "hint": "I'd _____ a latte, please.", "answer": "like"}, {"question": "커피 드시겠어요?", "hint": "Would you _____ some coffee?", "answer": "like"}, {"question": "오늘 밤은 집에 있는 게 낫겠어요.", "hint": "I'd _____ stay home tonight.", "answer": "rather"}, {"question": "이거 얼마예요?", "hint": "How _____ is this?", "answer": "much"}, {"question": "몇 시에 열어요?", "hint": "What _____ does it open?", "answer": "time"}], "mini_story": "Kate arrives at a new café. 'I'd like a cappuccino, please,' she says. 'Would you like it hot or iced?' 'Hot, please. I'd rather not have iced drinks in the morning.' 'What time do you close?' she asks. 'At 9 PM.' 'How much is this muffin?' '3,500 won.' 'How do I connect to the WiFi?' 'The password is on the cup.' 'Where is the outlet?' 'Right behind you!' Kate smiles. A perfect start to the day.", "tip": "I'd like vs Would you like → I'd like은 내가 원하는 것, Would you like은 상대방이 원하는 것을 물을 때! 의문사 정리: What(무엇) / Where(어디) / When(언제) / How(어떻게) / How much(얼마) / How long(얼마나 길게)"}, {"day": 73, "type": "학습", "pattern": "If you ~, I'll ~", "meaning": "만약 ~하면, 저는 ~할 거예요", "situation": "조건을 걸거나 만약의 상황을 이야기하는 상황", "examples": [{"en": "If you're hungry, I'll cook something.", "pronunciation": "이프 유어 헝그리 아일 쿡 썸씽", "ko": "배고프면 제가 뭔가 만들게요.", "context": "상대방을 배려할 때"}, {"en": "If you need help, I'll be right here.", "pronunciation": "이프 유 니드 헬프 아일 비 라잇 히어", "ko": "도움이 필요하면 바로 여기 있을게요.", "context": "곁에 있어준다는 표현"}, {"en": "If it rains, we'll stay inside.", "pronunciation": "이프 잇 레인즈 위일 스테이 인사이드", "ko": "비가 오면 안에 있을 거예요.", "context": "날씨에 따른 계획"}, {"en": "If you hurry, you'll make the last train.", "pronunciation": "이프 유 허리 유일 메이크 더 라스트 트레인", "ko": "서두르면 막차를 탈 수 있을 거예요.", "context": "촉박한 상황에서 조언"}, {"en": "If you study hard, you'll pass the exam.", "pronunciation": "이프 유 스터디 하드 유일 패스 디 이그잼", "ko": "열심히 공부하면 시험에 합격할 거예요.", "context": "동기 부여를 줄 때"}], "tip": "If 뒤에는 현재형, 뒤 문장에는 will을 써요 — 미래 일인데 if 뒤에 will을 쓰지 않아요! 'If it will rain' (❌) → 'If it rains' (✅). 이게 영어에서 자주 틀리는 포인트예요!"}, {"day": 74, "type": "학습", "pattern": "Because ~", "meaning": "왜냐하면 ~ / ~ 때문에", "situation": "이유나 원인을 설명하는 상황", "examples": [{"en": "I'm late because the traffic was bad.", "pronunciation": "아임 레잇 비커즈 더 트래픽 워즈 배드", "ko": "차가 막혀서 늦었어요.", "context": "늦은 이유를 설명할 때"}, {"en": "I like this café because it's quiet.", "pronunciation": "아이 라이크 디스 카페 비커즈 잇츠 콰이엣", "ko": "조용해서 이 카페가 좋아요.", "context": "좋아하는 이유를 말할 때"}, {"en": "I chose this job because I love people.", "pronunciation": "아이 쵸즈 디스 잡 비커즈 아이 러브 피플", "ko": "사람들이 좋아서 이 일을 선택했어요.", "context": "직업 선택 이유"}, {"en": "I'm tired because I didn't sleep well.", "pronunciation": "아임 타이어드 비커즈 아이 디든트 슬립 웰", "ko": "잠을 잘 못 자서 피곤해요.", "context": "컨디션 이유를 말할 때"}, {"en": "She's happy because she got promoted.", "pronunciation": "쉬즈 해피 비커즈 쉬 갓 프로모티드", "ko": "승진해서 그녀가 기뻐요.", "context": "다른 사람 상황을 설명할 때"}], "tip": "because는 이유를 설명하는 가장 직접적인 접속사예요. because 앞에 결과, 뒤에 이유를 써요. 구어체에서는 문장 앞에 'Because ~'만 단독으로 쓰기도 해요 — 'Why did you leave?' / 'Because I was tired.'"}, {"day": 75, "type": "학습", "pattern": "When I ~, I ~", "meaning": "제가 ~할 때, 저는 ~해요", "situation": "특정 상황이 되면 자연스럽게 하게 되는 것을 설명하는 상황", "examples": [{"en": "When I'm stressed, I go for a walk.", "pronunciation": "웬 아임 스트레스트 아이 고우 포 어 워크", "ko": "스트레스받을 때는 산책을 해요.", "context": "스트레스 해소 방법"}, {"en": "When I travel, I always try the local food.", "pronunciation": "웬 아이 트래블 아이 올웨이즈 트라이 더 로컬 푸드", "ko": "여행할 때는 항상 현지 음식을 먹어요.", "context": "여행 습관을 말할 때"}, {"en": "When I listen to music, I feel much better.", "pronunciation": "웬 아이 리슨 투 뮤직 아이 필 머치 베러", "ko": "음악을 들으면 훨씬 기분이 좋아져요.", "context": "기분 전환 방법"}, {"en": "When I was a child, I wanted to be a teacher.", "pronunciation": "웬 아이 워즈 어 차일드 아이 원티드 투 비 어 티처", "ko": "어렸을 때는 선생님이 되고 싶었어요.", "context": "어린 시절 꿈을 말할 때"}, {"en": "When I get home, I'll send you the file.", "pronunciation": "웬 아이 겟 홈 아일 센드 유 더 파일", "ko": "집에 가면 파일 보낼게요.", "context": "나중에 할 일을 약속할 때"}], "tip": "When은 '~할 때'라는 시간 접속사예요. If(만약)와 다르게 When은 확실하게 일어날 상황에 써요. 'When I get home'(집에 가면 — 확실) vs 'If I get home early'(일찍 집에 가면 — 조건)"}, {"day": 76, "type": "학습", "pattern": "So ~ / That's why ~", "meaning": "그래서 ~ / 그래서 ~인 거예요", "situation": "원인이 있고 그 결과를 말하는 상황", "examples": [{"en": "It was raining, so I took a taxi.", "pronunciation": "잇 워즈 레이닝 쏘 아이 툭 어 택시", "ko": "비가 와서 택시를 탔어요.", "context": "날씨로 인한 결정"}, {"en": "I was hungry, so I ordered a pizza.", "pronunciation": "아이 워즈 헝그리 쏘 아이 오더드 어 피자", "ko": "배가 고파서 피자를 시켰어요.", "context": "배고픔의 결과"}, {"en": "She was tired. That's why she left early.", "pronunciation": "쉬 워즈 타이어드 댓츠 와이 쉬 레프트 얼리", "ko": "그녀는 피곤했어요. 그래서 일찍 떠난 거예요.", "context": "다른 사람 행동을 설명할 때"}, {"en": "I love cooking. That's why I watch food shows.", "pronunciation": "아이 러브 쿠킹 댓츠 와이 아이 워치 푸드 쇼즈", "ko": "요리를 좋아해요. 그래서 음식 프로그램을 봐요.", "context": "취미를 설명할 때"}, {"en": "I missed the bus, so I was late.", "pronunciation": "아이 미스트 더 버스 쏘 아이 워즈 레잇", "ko": "버스를 놓쳐서 늦었어요.", "context": "지각 이유를 설명할 때"}], "tip": "so는 원인 뒤에, 결과 앞에 와요. That's why도 같은 뜻인데 더 강조하는 느낌이에요. 차이: 'I was late, so I missed the train.(그래서~)' vs 'I missed the train. That's why I'm upset.(그래서 그런 거예요!)'"}, {"day": 77, "type": "학습", "pattern": "I'm so ~ that ~", "meaning": "너무 ~해서 ~해요", "situation": "감정이나 상태가 너무 강해서 어떤 결과가 생겼을 때", "examples": [{"en": "I'm so tired that I can't move.", "pronunciation": "아임 쏘 타이어드 댓 아이 캔트 무브", "ko": "너무 피곤해서 움직일 수가 없어요.", "context": "극도로 지쳤을 때"}, {"en": "The movie was so good that I watched it twice.", "pronunciation": "더 무비 워즈 쏘 굿 댓 아이 워치트 잇 트와이스", "ko": "영화가 너무 좋아서 두 번 봤어요.", "context": "좋아하는 것을 강조할 때"}, {"en": "I'm so happy that I could cry.", "pronunciation": "아임 쏘 해피 댓 아이 쿠드 크라이", "ko": "너무 행복해서 눈물이 날 것 같아요.", "context": "감동적인 순간에"}, {"en": "It was so cold that we went back inside.", "pronunciation": "잇 워즈 쏘 콜드 댓 위 웬트 백 인사이드", "ko": "너무 추워서 안으로 들어갔어요.", "context": "날씨 때문에 계획 변경"}, {"en": "She's so talented that everyone admires her.", "pronunciation": "쉬즈 쏘 탤런티드 댓 에브리원 애드마이어즈 허", "ko": "그녀는 너무 재능이 있어서 모두가 감탄해요.", "context": "칭찬할 때"}], "tip": "so ~ that ~은 '너무 ~해서 ~하다'라는 결과를 나타내는 구조예요. so 뒤에는 형용사/부사, that 뒤에는 결과 문장이 와요. 감정을 드라마틱하게 표현하고 싶을 때 최고예요!"}, {"day": 78, "type": "학습", "pattern": "Although ~ / Even though ~", "meaning": "비록 ~이지만 / ~임에도 불구하고", "situation": "예상과 반대되는 결과나 대조적인 상황을 말하는 상황", "examples": [{"en": "Although it was raining, we went out.", "pronunciation": "올도우 잇 워즈 레이닝 위 웬트 아웃", "ko": "비가 왔지만 우리는 나갔어요.", "context": "날씨에도 불구하고"}, {"en": "Even though I was tired, I kept working.", "pronunciation": "이븐 도우 아이 워즈 타이어드 아이 켑트 워킹", "ko": "피곤했지만 계속 일했어요.", "context": "힘든 상황을 극복할 때"}, {"en": "Although she studied hard, she didn't pass.", "pronunciation": "올도우 쉬 스터디드 하드 쉬 디든트 패스", "ko": "열심히 공부했지만 합격하지 못했어요.", "context": "아쉬운 결과를 설명할 때"}, {"en": "Even though it's expensive, it's worth it.", "pronunciation": "이븐 도우 잇츠 익스펜시브 잇츠 워스 잇", "ko": "비싸지만 그만한 가치가 있어요.", "context": "가격을 정당화할 때"}, {"en": "Although I don't speak French, I loved Paris.", "pronunciation": "올도우 아이 돈트 스피크 프렌치 아이 러브드 파리", "ko": "프랑스어를 못하지만 파리가 정말 좋았어요.", "context": "언어 장벽에도 좋은 경험"}], "tip": "Although와 even though는 거의 같은 의미예요. even though가 더 강한 대조를 나타내요. 'But'과의 차이: 'But'은 두 문장을 연결하고, although/even though는 한 문장 안에서 대조를 표현해요!"}, {"day": 79, "type": "학습", "pattern": "I think ~ / I feel ~", "meaning": "저는 ~라고 생각해요 / 저는 ~한 느낌이에요", "situation": "자신의 생각이나 감정을 부드럽게 표현하는 상황", "examples": [{"en": "I think we should leave now.", "pronunciation": "아이 씽크 위 슈드 리브 나우", "ko": "이제 출발해야 할 것 같아요.", "context": "의견을 부드럽게 말할 때"}, {"en": "I think you're right.", "pronunciation": "아이 씽크 유어 라잇", "ko": "당신 말이 맞는 것 같아요.", "context": "동의할 때"}, {"en": "I feel like something is missing.", "pronunciation": "아이 필 라이크 썸씽 이즈 미싱", "ko": "뭔가 빠진 것 같은 느낌이에요.", "context": "직감이 있을 때"}, {"en": "I feel a bit nervous about the interview.", "pronunciation": "아이 필 어 빗 너버스 어바웃 디 인터뷰", "ko": "면접이 좀 긴장돼요.", "context": "솔직한 감정을 표현할 때"}, {"en": "I don't think that's a good idea.", "pronunciation": "아이 돈트 씽크 댓츠 어 굿 아이디어", "ko": "그건 좋은 생각이 아닌 것 같아요.", "context": "부드럽게 반대할 때"}], "tip": "I think와 I feel을 쓰면 의견이나 감정을 부드럽게 표현할 수 있어요. 직접적인 'This is wrong'보다 'I think this might be wrong'이 훨씬 상대방을 배려하는 표현이에요!"}, {"day": 80, "type": "복습", "title": "연결 표현 총정리", "review_days": [73, 74, 75, 76, 77, 78, 79], "summary": [{"day": 73, "pattern": "If you ~, I'll ~", "ko": "만약 ~하면, ~할 거예요 (조건)"}, {"day": 74, "pattern": "Because ~", "ko": "왜냐하면 ~ (이유)"}, {"day": 75, "pattern": "When I ~, I ~", "ko": "~할 때, ~해요 (시간 연결)"}, {"day": 76, "pattern": "So ~ / That's why ~", "ko": "그래서 ~ (결과)"}, {"day": 77, "pattern": "I'm so ~ that ~", "ko": "너무 ~해서 ~ (강조 결과)"}, {"day": 78, "pattern": "Although / Even though ~", "ko": "~이지만 (대조)"}, {"day": 79, "pattern": "I think ~ / I feel ~", "ko": "~라고 생각해요 / ~한 느낌이에요"}], "quiz": [{"question": "배고프면 제가 뭔가 만들게요.", "hint": "If you're hungry, I'll _____ something.", "answer": "cook"}, {"question": "차가 막혀서 늦었어요.", "hint": "I'm late because the traffic was _____.", "answer": "bad"}, {"question": "비가 와서 택시를 탔어요.", "hint": "It was raining, _____ I took a taxi.", "answer": "so"}, {"question": "비가 왔지만 우리는 나갔어요.", "hint": "_____ it was raining, we went out.", "answer": "Although"}, {"question": "이제 출발해야 할 것 같아요.", "hint": "I _____ we should leave now.", "answer": "think"}], "mini_story": "Jisu and Sam are planning a picnic. 'If the weather is good, we'll go to the park,' Sam says. 'Although it looked cloudy this morning, I think it'll clear up,' Jisu replies. 'When I checked the forecast, it said sunny!' 'I feel a bit nervous because we haven't prepared much.' 'Don't worry. Even though we're short on time, we can manage. I'm so excited that I can't wait!' 'Me too! That's why I woke up early today.'", "tip": "연결 표현 핵심 정리! Because(이유) / So·That's why(결과) / If(조건) / When(시간) / Although·Even though(대조) / I think·I feel(의견·감정). 이 표현들을 쓰면 단문에서 복문으로 — 영어 실력이 한 단계 업그레이드돼요!"}, {"day": 81, "type": "학습", "pattern": "I'm so happy ~", "meaning": "정말 기쁘네요 ~ / ~해서 너무 기뻐요", "situation": "좋은 일이 생겼을 때 기쁜 감정을 표현하는 상황", "examples": [{"en": "I'm so happy for you!", "pronunciation": "아임 쏘 해피 포 유", "ko": "당신을 위해 너무 기뻐요!", "context": "상대방의 좋은 소식에 반응할 때"}, {"en": "I'm so happy that we finally met.", "pronunciation": "아임 쏘 해피 댓 위 파이널리 멧", "ko": "드디어 만나게 되어서 너무 기뻐요.", "context": "오랜만의 만남에서"}, {"en": "I'm so happy to be here.", "pronunciation": "아임 쏘 해피 투 비 히어", "ko": "여기 있게 되어서 너무 기뻐요.", "context": "특별한 자리에서 감사 표현"}, {"en": "I'm so happy things worked out.", "pronunciation": "아임 쏘 해피 씽즈 워크트 아웃", "ko": "일이 잘 풀려서 너무 기뻐요.", "context": "걱정했던 일이 잘 됐을 때"}, {"en": "I'm so happy you came.", "pronunciation": "아임 쏘 해피 유 케임", "ko": "와줘서 너무 기뻐요.", "context": "누군가를 환영할 때"}], "tip": "I'm so happy ~에서 뒤에 'for you', 'to ~', 'that ~', 이렇게 이유를 붙여서 표현해요. 비슷한 표현: I'm thrilled! (짜릿해요!) / I'm overjoyed! (너무 기뻐요!) / That's wonderful! (정말 멋져요!)"}, {"day": 82, "type": "학습", "pattern": "I'm worried about ~", "meaning": "저는 ~이 걱정돼요", "situation": "걱정되는 것을 솔직하게 표현하거나 상대방의 걱정을 공감할 때", "examples": [{"en": "I'm worried about the exam.", "pronunciation": "아임 워리드 어바웃 디 이그잼", "ko": "시험이 걱정돼요.", "context": "시험 전에"}, {"en": "I'm worried about you.", "pronunciation": "아임 워리드 어바웃 유", "ko": "당신이 걱정돼요.", "context": "상대방을 배려할 때"}, {"en": "I'm a bit worried about the weather.", "pronunciation": "아임 어 빗 워리드 어바웃 더 웨더", "ko": "날씨가 좀 걱정돼요.", "context": "야외 일정이 있을 때"}, {"en": "Don't worry about it. It'll be fine.", "pronunciation": "돈트 워리 어바웃 잇 잇일 비 파인", "ko": "걱정 마세요. 잘 될 거예요.", "context": "상대방을 안심시킬 때"}, {"en": "I'm worried about being late.", "pronunciation": "아임 워리드 어바웃 비잉 레잇", "ko": "늦을까봐 걱정돼요.", "context": "시간이 촉박할 때"}], "tip": "I'm worried about 뒤에는 명사나 동명사(-ing)를 써요. 걱정을 들어주는 표현: Don't worry. / I understand. / Everything will be okay. / I'm sure it'll work out."}, {"day": 83, "type": "학습", "pattern": "That's amazing! / That's terrible!", "meaning": "정말 대단해요! / 정말 안됐어요!", "situation": "상대방의 말에 자연스럽게 리액션을 보여주는 상황", "examples": [{"en": "That's amazing! I had no idea.", "pronunciation": "댓츠 어메이징 아이 해드 노우 아이디어", "ko": "대단해요! 전혀 몰랐어요.", "context": "놀라운 소식에 반응할 때"}, {"en": "That's terrible. Are you okay?", "pronunciation": "댓츠 테리블 아어 유 오케이", "ko": "정말 안됐어요. 괜찮으세요?", "context": "나쁜 소식에 공감할 때"}, {"en": "That's so funny! I can't stop laughing.", "pronunciation": "댓츠 쏘 퍼니 아이 캔트 스탑 래핑", "ko": "너무 웃겨요! 웃음이 안 멈춰요.", "context": "재미있는 이야기에 반응"}, {"en": "That's unbelievable! Really?", "pronunciation": "댓츠 언빌리버블 리얼리", "ko": "믿기지 않아요! 정말요?", "context": "충격적인 소식에"}, {"en": "That's so sweet of you!", "pronunciation": "댓츠 쏘 스윗 오브 유", "ko": "정말 다정하시네요!", "context": "친절한 행동에 감사할 때"}], "tip": "리액션 표현 모음: That's amazing!(놀라움) / That's terrible!(안타까움) / That's funny!(웃김) / That's sweet!(다정함) / That's incredible!(믿기 어려움) / That's crazy!(황당함). 'That's + 형용사' 패턴으로 무한 확장 가능!"}, {"day": 84, "type": "학습", "pattern": "Let's ~", "meaning": "~하자 / ~합시다", "situation": "친구나 동행에게 함께 무언가를 하자고 제안하는 상황", "examples": [{"en": "Let's go get something to eat.", "pronunciation": "렛츠 고우 겟 썸씽 투 이트", "ko": "뭔가 먹으러 가자.", "context": "배고플 때 제안"}, {"en": "Let's take a break.", "pronunciation": "렛츠 테이크 어 브레이크", "ko": "잠깐 쉬자.", "context": "쉬고 싶을 때"}, {"en": "Let's try something new today.", "pronunciation": "렛츠 트라이 썸씽 뉴 투데이", "ko": "오늘은 새로운 걸 해보자.", "context": "도전을 권유할 때"}, {"en": "Let's not talk about that anymore.", "pronunciation": "렛츠 낫 톡 어바웃 댓 애니모어", "ko": "그 얘기는 더 이상 하지 말자.", "context": "주제를 바꾸고 싶을 때"}, {"en": "Let's meet at 7 at the café.", "pronunciation": "렛츠 밋 앳 세븐 앳 더 카페", "ko": "카페에서 7시에 만나자.", "context": "약속을 잡을 때"}], "tip": "Let's는 'Let us'의 줄임말로, 상대방을 포함해서 함께 하자는 제안이에요. 거절할 때는 'Let's not ~' 또는 'How about ~ instead?'를 써요. ion": "하우 두 아이 겟 데어 바이 퍼블릭 트랜스포트", "ko": "대중교통으로 어떻게 가요?", "context": "교통 방법을 물어볼 때"}, {"en": "Is it walking distance from here?", "pronunciation": "이즈 잇 워킹 디스턴스 프럼 히어", "ko": "여기서 걸어갈 수 있는 거리예요?", "context": "걸어갈지 교통을 탈지 결정할 때"}], "tip": "길을 물어볼 때 핵심 표현 3가지! 'Where is ~?'(어디예요?) / 'How do I get to ~?'(어떻게 가요?) / 'Can you show me on the map?'(지도로 보여줄 수 있어요?). 스마트폰 지도를 보여주며 물어보면 더 쉬워요!"}, {"day": 91, "type": "학습", "pattern": "Can I pay by card?", "meaning": "카드로 결제할 수 있나요?", "situation": "쇼핑, 식당, 교통 등 결제할 때 쓰는 표현", "examples": [{"en": "Can I pay by card?", "pronunciation": "캔 아이 페이 바이 카드", "ko": "카드로 결제할 수 있나요?", "context": "결제 방법을 확인할 때"}, {"en": "Do you accept foreign cards?", "pronunciation": "두 유 억셉트 포린 카즈", "ko": "외국 카드도 되나요?", "context": "해외 카드를 쓸 때"}, {"en": "Could I get a receipt, please?", "pronunciation": "쿠드 아이 겟 어 리씻 플리즈", "ko": "영수증 주실 수 있을까요?", "context": "영수증이 필요할 때"}, {"en": "How much is the total?", "pronunciation": "하우 머치 이즈 더 토털", "ko": "총 얼마예요?", "context": "최종 금액 확인"}, {"en": "Keep the change.", "pronunciation": "킵 더 체인지", "ko": "잔돈은 가지세요.", "context": "팁을 줄 때"}], "tip": "결제 표현 모음! by card(카드로) / in cash(현금으로) / by transfer(이체로). 'Do you take ~?'도 같은 의미예요. 'Do you take American Express?'(아멕스 카드 되나요?) 이런 식으로요!"}, {"day": 92, "type": "학습", "pattern": "Is this seat taken?", "meaning": "이 자리 비어있나요?", "situation": "카페, 식당, 대중교통에서 빈자리를 확인하는 상황", "examples": [{"en": "Is this seat taken?", "pronunciation": "이즈 디스 싯 테이큰", "ko": "이 자리 비어있나요?", "context": "앉아도 되는지 확인할 때"}, {"en": "Do you mind if I sit here?", "pronunciation": "두 유 마인드 이프 아이 싯 히어", "ko": "여기 앉아도 괜찮으세요?", "context": "더 정중하게 물어볼 때"}, {"en": "Is anyone sitting here?", "pronunciation": "이즈 애니원 시팅 히어", "ko": "여기 누구 앉아 있나요?", "context": "자리 상태를 확인할 때"}, {"en": "Can I join you?", "pronunciation": "캔 아이 조인 유", "ko": "같이 앉아도 될까요?", "context": "합석을 부탁할 때"}, {"en": "I'm saving this seat for someone.", "pronunciation": "아임 세이빙 디스 싯 포 썸원", "ko": "이 자리는 누군가를 위해 맡아두고 있어요.", "context": "자리를 맡아줄 때"}], "tip": 헬프", "ko": "도움 정말 감사해요.", "context": "도움받았을 때"}, {"en": "I appreciate your patience.", "pronunciation": "아이 어프리쉬에이트 유어 페이션스", "ko": "기다려주셔서 감사해요.", "context": "기다려준 것에 감사할 때"}, {"en": "I appreciate you taking the time.", "pronunciation": "아이 어프리쉬에이트 유 테이킹 더 타임", "ko": "시간 내주셔서 감사해요.", "context": "미팅·통화 후"}, {"en": "We appreciate your business.", "pronunciation": "위 어프리쉬에이트 유어 비즈니스", "ko": "거래해주셔서 감사합니다.", "context": "고객에게 감사 표현"}, {"en": "I appreciate your understanding.", "pronunciation": "아이 어프리쉬에이트 유어 언더스탠딩", "ko": "이해해주셔서 감사해요.", "context": "양해를 구한 뒤 감사"}], "tip": "'Thank you'보다 'I appreciate ~'가 더 진심 어리고 격식 있는 표현이에요. 이메일 마무리에 'Thank you, and I appreciate your time.'처럼 쓰면 훨씬 전문적으로 보여요!"}, {"day": 99, "type": "복습", "title": "비즈니스 표현 총정리", "review_days": [95, 96, 97, 98], "summary": [{"day": 95, "pattern": "I was wondering if ~", "ko": "~인지 여쭤보려고요 (정중한 문의)"}, {"day": 96, "pattern": "Could you please ~?", "ko": "~해주실 수 있을까요? (격식 요청)"}, {"day": 97, "pattern": "I'll get back to you", "ko": "다시 연락드릴게요 (응답 약속)"}, {"day": 98, "pattern": "I appreciate ~", "ko": "~에 감사해요 (격식 감사)"}], "quiz": [{"question": "도와주실 수 있는지 여쭤보려고요.", "hint": "I was wondering if you could _____ me.", "answer": "help"}, {"question": "보고서 보내주실 수 있을까요?", "hint": "Could you please _____ me the report?", "answer": "send"}, {"question": "확인해보고 연락드릴게요.", "hint": "Let me check and I'll get _____ to you.", "answer": "back"}, {"question": "시간 내주셔서 감사해요.", "hint": "I appreciate you taking the _____.", "answer": "time"}, {"question": "가능한 빨리 다시 연락드릴게요.", "hint": "I'll get back to you as soon as _____.", "answer": "possible"}], "mini_story": "Jake sends an email: 'Dear Ms. Kim, I was wondering if we could schedule a meeting next week. Could you please let me know your availability? I appreciate your time, and I'll get back to you once I confirm with my team. Thank you for your understanding. Best regards, Jake.' Ms. Kim replies: 'Dear Jake, I appreciate you reaching out. I'll get back to you by tomorrow with some available times. Could you please send over the agenda beforehand? Best, Ms. Kim.'", "tip": "비즈니스 이메일 황금 구조! ① 인사 → ② I was wondering if ~ (목적) → ③ Could you please ~ (요청) → ④ I appreciate ~ (감사) → ⑤ I'll get back to you (마무리). 이 구조만 외워도 영어 이메일 걱정 끝!"}, {"day": 100, "type": "마무리", "title": "🎉 100일 달성! 나만의 자기소개 완성 스피치!", "description": "100일 동안 배운 표현을 모두 활용해서 나만의 자기소개 스피치를 완성해봐요!", "speech_template": {"intro": "Hi, I'm [이름]. (I'm ~ — Day 1)", "job": "I work at [회사/직업]. (I work at ~ — Day 15)", "hobby": "I like [취미]. I usually [습관]. (I like ~ / I usually ~ — Day 16, 20)", "experience": "I've been to [나라/장소]. I've never [못해본 것]. (Day 44, 46)", "plan": "I'm going to [계획]. I'd like to [목표]. (Day 37, 66)", "feeling": "I'm so happy [기쁜 것]. I appreciate [감사한 것]. (Day 81, 98)", "closing": "If you want to know more about me, I'll get back to you! (Day 73, 97)"}, "sample_speech": "Hi, I'm Sora. I work at a small company in Seoul. I like traveling and I usually explore new cafés on weekends. I've been to Japan twice, but I've never been to Europe — that's my dream! I'm going to visit Paris next year. I'd like to meet more people from different countries. I'm so happy that I finished this 100-day challenge! I really appreciate everyone who supported me along the way. If you'd like to be friends, I'll get back to you — I'm always happy to connect!", "review_all_patterns": ["I'm ~ (be동사)", "I'm doing ~ (현재진행)", "I work / I like ~ (현재형)", "I have ~ / There is ~ (have)", "I went / I ate ~ (과거형)", "I'm going to / I'll ~ (미래)", "I've been / I've never ~ (현재완료)", "Can I / Could you ~ (can·could)", "I have to / You should ~ (의무·조언)", "I'd like / Would you like ~ (would like)", "If / Because / Although ~ (연결)", "I'm so happy / Let's / How about ~ (감정·제안)", "I'd like to check in / How do I get to ~ (여행)", "I was wondering / I appreciate ~ (비즈니스)"], "tip": "100일 동안 정말 수고하셨어요! 배운 표현은 14개 파트, 약 430개 이상이에요. 이제 일상에서 하루에 표현 하나씩 써보세요. 말하기 두렵지 않아요 — 당신은 이미 충분히 준비되어 있어요! 🎉"}],2:[{"day": 1, "ty t": "바쁜 하루를 설명할 때"}, {"en": "We had a great meeting this morning.", "pronunciation": "위 해드 어 그레이트 미팅 디스 모닝", "ko": "오늘 아침 미팅이 잘 됐어요.", "context": "좋은 결과를 나눌 때"}, {"en": "I have to skip lunch — I have a meeting.", "pronunciation": "아이 해브 투 스킵 런치 아이 해브 어 미팅", "ko": "점심 건너뛰어야 해요 — 회의가 있거든요.", "context": "바쁜 이유를 설명할 때"}], "tip": "have a meeting 외에 have a call, have an appointment, have a date 등도 같은 패턴으로 써요. '~이 있다'고 할 때 have가 가장 자연스러워요."}, {"day": 15, "type": "학습", "part": "PART 2 — HAVE", "pattern": "have dinner / lunch", "meaning": "식사하다", "situation": "함께 밥을 먹거나 식사 약속을 잡는 상황", "examples": [{"en": "Let's have dinner together.", "pronunciation": "렛츠 해브 디너 투게더", "ko": "같이 저녁 먹어요.", "context": "식사 제안할 때"}, {"en": "Did you have lunch yet?", "pronunciation": "디쥬 해브 런치 옛", "ko": "점심 먹었어요?", "context": "상대방 안부 물을 때"}, {"en": "I haven't had breakfast.", "pronunciation": "아이 해브 낫 해드 브렉퍼스트", "ko": "아침을 못 먹었어요.", "context": "아직 못 먹었음을 말할 때"}, {"en": "We had a really nice dinner last night.", "pronunciation": "위 해드 어 리얼리 나이스 디너 래스트 나잇", "ko": "어젯밤에 정말 맛있는 저녁을 먹었어요.", "context": "좋은 식사 경험을 이야기할 때"}, {"en": "Want to have coffee later?", "pronunciation": "원 투 해브 커피 레이러", "ko": "나중에 커피 한잔 할래요?", "context": "가볍게 만남을 제안할 때"}], "tip": "영어는 eat dinner보다 have dinner가 훨씬 자연스러워요. have breakfast/lunch/dinner/coffee/a drink 모두 자주 쓰는 패턴이에요."}, {"day": 16, "type": "학습", "part": "PART 2 — HAVE", "pattern": "have trouble ~ing", "meaning": "~하는 데 어려움을 겪다", "situation": "뭔가 잘 안 되거나 힘든 상황을 설명할 때", "examples": [{"en": "I'm having trouble sleeping.", "pronunciation": "아임 해빙 트러블 슬리핑", "ko": "잠을 자는 게 힘들어요.", "context": "수면 문제를 말할 때"}, {"en": "She's having trouble at work.", "pronunciation": "쉬즈 해빙 트러블 앳 워크", "ko": "그녀는 직장에서 힘들어하고 있어요.", "context": "직장 어려움을 표현할 때"}, {"en": "I had trouble finding the place.", "pronunciation": "아이 해드 트러블 파인딩 더 플레이스", "ko": "그곳을 찾는 데 어려움이 있었어요.", "context": "길을 헤맸을 때"}, {"en": "Are you having trouble with the assignment?", "pronunciation": "아 유 해빙 트러블 위드 디 어사인먼트", "ko": "과제하는 데 어려움이 있어요?", "context": "도움을 제안할 때"}, {"en": "I'm having trouble understanding this.", "pronunciation": "아임 해빙 트러블 언더스탠딩 디스", "ko": "이걸 이해하는 게 어려워요.", "context": "이해가 안 될 때"}], "tip": "have trouble + 동명사(~ing). have difficulty ~ing와 같은 의미예요. 더 구어체는 have a hard time ~ing도 자주 써요."}, {"day": 17, "type": "학습", "part": "PART 2 — HAVE", "pattern": "have a feeling", "meaning": "느낌이 오다 / 예감이 있다", "situation": "직감이나 예감을 표현하는 상황", "examples": [{"en": "I have a feeling it's going to rain.", "pronunciation": "아이 해브 어 필링 잇츠 고잉 투 레인", "ko": "비가 올 것 같은 느낌이 와요.", "context": "날씨 예감을 말할 때"}, {"en": "I have a feeling this will work.", "pronunciation": "아이 해브 어 필링 디스 윌 워크", "ko": "이게 잘 될 것 같은 느낌이에요.", "context": "긍정적 예감을 표현할 때"}, {"en": "I have a bad feeling about this.", "pronunciation": "아이 해브 어 배드 필링 어바웃 디스", "ko": "이거 뭔가 안 좋은 느낌이에요.", "context": "불길한 예감을 표현할 때"}, {"en": "I had a feeling you'd say that.", "pronunciation": "아이 해드 어 필링 유드 쎄이 댓", "ko": "그렇게 말할 줄 알았어요.", "context": "예상이 맞았을 때"}, {"en": "I have a feeling we've met before.", "pronunciation": "아이 해브 어 필링 위브 멧 비포어", "ko": "전에 만난 것 같은 느낌이 들어요.", "context": "기시감이 들 때"}], "tip": "I have a feeling (that) + 문장 = ~할 것 같은 느낌이에요. 확신은 없지만 직감이 있을 때 써요. I think보다 더 감각적인 표현이에요."}, {"day": 18, "type": "학습", "part": "PART 2 — HAVE", "pattern": "have to ~", "meaning": "~해야 한다", "situation": "해야 할 일이 있거나 의무를 말하는 상황", "examples": [{"en": "I have to go now.", "pronunciation": "아이 해브 투 고 나우", "ko": "지금 가야 해요.", "context": "자리를 떠나야 할 때"}, {"en": "You have to try this!", "pronunciation": "유 해브 투 트라이 디스", "ko": "이거 꼭 먹어봐야 해요!", "context": "강력 추천할 때"}, {"en": "Do I have to?", "pronunciation": "두 아이 해브 투", "ko": "꼭 해야 해요?", "context": "하기 싫을 때"}, {"en": "We have to leave by 8.", "pronunciation": "위 해브 투 리브 바이 에잇", "ko": "8시까지 나가야 해요.", "context": "시간 제한을 말할 때"}, {"en": "I had to cancel the plan.", "pronunciation": "아이 해드 투 캔슬 더 플랜", "ko": "계획을 취소해야 했어요.", "context": "어쩔 수 없었던 상황을 설명할 때"}], "tip": "have to = must와 같은 뜻이지만 더 구어체예요. 부정형 don't have to = '안 해도 돼요' (must not = '하면 안 돼요'와 다름!)."}, {"day": 19, "type": "학습", "part": "PART 2 — HAVE", "pattern": "have + 목적어 + 과거분사", "meaning": "~을 해달라고 시키다 / ~이 되게 하다", "situation": "서비스를 받거나 다른 사람에게 무언가를 시키는 상황", "examples": [{"en": "I had my hair cut.", "pronunciation": "아이 해드 마이 헤어 컷", "ko": "머리를 잘랐어요. (미용실에서)", "context": "서비스를 받았을 때"}, {"en": "I need to have my car fixed.", "pronunciation": "아이 니드 투 해브 마이 카 픽스트", "ko": "차를 수리해야 해요.", "context": "수리 맡길 때"}, {"en": "She had the package delivered.", "pronunciation": "쉬 해드 더 패키지 딜리버드", "ko": "그녀는 소포를 배달시켰어요.", "context": "배달 서비스를 이용할 때"}, {"en": "I'll have it done by tomorrow.", "pronunciation": "아일 해브 잇 던 바이 투마로우", "ko": "내일까지 처리되게 할게요.", "context": "업무 처리를 약속할 때"}, {"en": "Can you have this translated?", "pronunciation": "캔 유 해브 디스 트랜슬레이티드", "ko": "이거 번역 맡겨줄 수 있어요?", "context": "번역 요청할 때"}], "tip": "have + 목적어 + pp(과거분사) = 남에게 시켜서 되게 하다. I cut my hair(내가 직접 잘랐다) vs I had my hair cut(미용실에서 잘랐다) — 큰 차이예요!"}, {"day": 20, "type": "복습", "part": "PART 2 — HAVE 총정리", "pattern": "HAVE 복습", "meaning": "Day 11~19 핵심 표현 총정리", "situation": "HAVE 동사 9가지 표현을 상황별로 복습", "examples": [{"en": "Do you have time to have lunch together?", "pronunciation": "두 유 해브 타임 투 해브 런치 투게더", "ko": "같이 점심 먹을 시간 있어요?", "context": "have time + have lunch 콤보"}, {"en": "I'm having trouble — can you have a look?", "pronunciation": "아임 해빙 트러블 캔 유 해브 어 룩", "ko": "어려움이 있는데 한번 봐줄 수 있어요?", "context": "have trouble + have a look 콤보"}, {"en": "I have a feeling we'll have fun at this meeting.", "pronunciation": "아이 해브 어 필링 위얼 해브 펀 앳 디스 미팅", "ko": "이 미팅이 재미있을 것 같은 예감이 와요.", "context": "have a feeling + have fun + have a meeting 콤보"}, {"en": "I have to have my phone fixed today.", "pronunciation": "아이 해브 투 해브 마이 폰 픽스트 투데이", "ko": "오늘 휴대폰을 수리 맡겨야 해요.", "context": "have to + have+pp 콤보"}, {"en": "We had a great meeting — let's have dinner to celebrate!", "pronunciation": "위 해드 어 그레이트 미팅 렛츠 해브 디너 투 셀레브레이트", "ko": "미팅이 잘 됐어요 — 축하 저녁 먹어요!", "context": "have a meeting + have dinner 콤보"}], "tip": "HAVE 하나로: 시간·음식·모임·감각·의무·서비스 요청까지 다 돼요! have time / have a look / have fun / have a meeting / have dinner / have trouble / have a feeling / have to / have+pp — 오늘 복습 완료!"}, {"day": 21, "type": "학습", "part": "PART 3 — MAKE", "pattern": "make sense", "meaning": "이해가 되다 / 말이 되다", "situation": "설명이나 상황이 논리적으로 이해될 때", "examples": [{"en": "That makes sense.", "pronunciation": "댓 메잌스 센스", "ko": "그거 말이 되네요. / 이해돼요.", "context": "설명이 납득될 때"}, {"en": "Does that make sense?", "pronunciation": "더즈 댓 메잌 센스", "ko": "이해가 돼요?", "context": "설명 후 확인할 때"}, {"en": "It doesn't make sense to me.", "pronunciation": "잇 더즌 메잌 센스 투 미", "ko": "저는 이해가 안 돼요.", "context": "납득이 안 될 때"}, {"en": "Now it all makes sense!", "pronunciation": "나우 잇 올 메잌스 센스", "ko": "이제 다 이해가 되네요!", "context": "뒤늦게 이해됐을 때"}, {"en": "That doesn't make any sense.", "pronunciation": "댓 더즌 메잌 애니 센스", "ko": "그건 말이 전혀 안 돼요.", "context": "비논리적인 상황에"}], "tip": "make sense = 말이 되다, 이해가 되다. make no sense = 전혀 말이 안 되다. 설명을 마친 후 'Does that make sense?' 라고 확인하는 게 아주 자연스러운 영어예요."}, {"day": 22, "type": "학습", "part": "PART 3 — MAKE", "pattern": "make it", "meaning": "해내다 / 시간 맞춰 도착하다 / 성공하다", "situation": "약속에 맞게 오거나 어떤 목표를 달성하는 상황", "examples": [{"en": "I made it!", "pronunciation": "아이 메이드 잇", "ko": "해냈어요! / 도착했어요!", "context": "성공하거나 늦지 않게 도착했을 때"}, {"en": "Can you make it by 6?", "pronunciation": "캔 유 메잌 잇 바이 식스", "ko": "6시까지 올 수 있어요?", "context": "시간 맞춰 올 수 있는지 확인할 때"}, {"en": "Sorry, I can't make it tonight.", "pronunciation": "쏘리 아이 캔 메잌 잇 투나잇", "ko": "미안해요, 오늘 저녁에 못 갈 것 같아요.", "context": "약속을 취소할 때"}, {"en": "She made it to the top.", "pronunciation": "쉬 메이드 잇 투 더 탑", "ko": "그녀는 정상에 올랐어요.", "context": "큰 성취를 말할 때"}, {"en": "We made it just in time!", "pronunciation": "위 메이드 잇 저스트 인 타임", "ko": "딱 맞춰 도착했어요!", "context": "간발의 차로 성공했을 때"}], "tip": "I can't make it. 은 약속이나 모임에 못 간다고 할 때 가장 자주 쓰는 표현이에요. 'I can't come.'보다 훨씬 자연스러워요!"}, {"day": 23, "type": "학습", "part": "PART 3 — MAKE", "pattern": "make sure", "meaning": "확실히 하다 / 반드시 ~하다", "situation": "중요한 일을 빠뜨리지 않도록 확인하는 상황", "examples": [{"en": "Make sure you lock the door.", "pronunciation": "메잌 슈어 유 락 더 도어", "ko": "문을 꼭 잠그세요.", "context": "중요한 걸 빠뜨리지 말라고 당부할 때"}, {"en": "I'll make sure it's done.", "pronunciation": "아일 메잌 슈어 잇츠 던", "ko": "확실히 처리되게 할게요.", "context": "책임지고 처리하겠다고 할 때"}, {"en": "Make sure to bring your ID.", "pronunciation": "메잌 슈어 투 브링 유어 아이디", "ko": "신분증 꼭 챙기세요.", "context": "필수 준비물을 당부할 때"}, {"en": "Did you make sure everything's okay?", "pronunciation": "디쥬 메잌 슈어 에브리띵스 오케이", "ko": "다 괜찮은지 확인했어요?", "context": "확인 여부를 물을 때"}, {"en": "Just make sure you're on time.", "pronunciation": "저스트 메잌 슈어 유어 온 타임", "ko": "시간 맞춰 오기만 하면 돼요.", "context": "한 가지만 부탁할 때"}], "tip": "Make sure + 주어 + 동사, 또는 Make sure + to부정사. 둘 다 자주 써요. 'Make sure to call me' = 'Make sure you call me' — 같은 의미예요."}, {"day": 24, "type": "학습", "part": "PART 3 — MAKE", "pattern": "make a decision", "meaning": "결정하다", "situation": "중요한 선택 앞에서 결정을 내려야 하는 상황", "examples": [{"en": "I need to make a decision.", "pronunciation": "아이 니드 투 메잌 어 디시전", "ko": "결정을 내려야 해요.", "context": "선택을 앞두고 있을 때"}, {"en": "It's hard to make a decision.", "pronunciation": "잇츠 하드 투 메잌 어 디시전", "ko": "결정하기가 어려워요.", "context": "고민될 때"}, {"en": "Have you made a decision yet?", "pronunciation": "해브 유 메이드 어 디시전 옛", "ko": "아직 결정 못 하셨어요?", "context": "결정 여부를 물을 때"}, {"en": "Let's make a decision together.", "pronunciation": "렛츠 메잌 어 디시전 투게더", "ko": "같이 결정해봐요.", "context": "함께 결정하자고 제안할 때"}, {"en": "I finally made a decision.", "pronunciation": "아이 파이널리 메이드 어 디시전", "ko": "드디어 결정했어요.", "context": "오래 고민 후 결정했을 때"}], "tip": "make a decision = decide. 둘 다 써요. 하지만 회화에서는 make a decision이 조금 더 격식 있고, decide가 더 간단해요. 상황에 맞게 골라 써요."}, {"day": 25, "type": "학습", "part": "PART 3 — MAKE", "pattern": "make a mistake", "meaning": "실수하다", "situation": "잘못을 인정하거나 실수를 이야기하는 상황", "examples": [{"en": "Everyone makes mistakes.", "pronunciation": "에브리원 메잌스 미스테잌스", "ko": "누구나 실수해요.", "contex 어요.", "context": "무언가에서 거리를 뒀을 때"}, {"en": "We deserve a break.", "pronunciation": "위 디저브 어 브레잌", "ko": "우리 쉴 자격이 있어요.", "context": "열심히 했으니 쉬어도 된다고 할 때"}, {"en": "Take a 10-minute break, then continue.", "pronunciation": "테잌 어 텐 미닛 브레잌 덴 컨티뉴", "ko": "10분 쉬고 다시 계속해요.", "context": "짧은 휴식을 권할 때"}], "tip": "take a break = have a break. 영국식은 have a break, 미국식은 take a break를 더 많이 써요. give someone a break = 그 사람 좀 봐줘요/쉬게 해줘요."}, {"day": 32, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take time", "meaning": "시간이 걸리다", "situation": "어떤 일이 시간이 필요함을 설명하는 상황", "examples": [{"en": "It takes time.", "pronunciation": "잇 테잌스 타임", "ko": "시간이 걸려요.", "context": "서두르지 말라고 할 때"}, {"en": "Learning English takes time.", "pronunciation": "러닝 잉글리쉬 테잌스 타임", "ko": "영어 배우는 건 시간이 걸려요.", "context": "꾸준함이 필요함을 말할 때"}, {"en": "It took me a long time to decide.", "pronunciation": "잇 툭 미 어 롱 타임 투 디사이드", "ko": "결정하는 데 오래 걸렸어요.", "context": "신중하게 결정했음을 설명할 때"}, {"en": "This will take some time.", "pronunciation": "디스 윌 테잌 썸 타임", "ko": "이거 좀 시간이 걸릴 거예요.", "context": "기다려달라고 미리 말할 때"}, {"en": "Take your time.", "pronunciation": "테잌 유어 타임", "ko": "천천히 하세요.", "context": "재촉하지 않겠다고 할 때"}], "tip": "It takes + 시간 + to + 동사 = ~하는 데 (시간)이 걸린다. 예: It takes 30 minutes to walk there.(거기 걸어서 30분 걸려요.) 정말 자주 쓰는 패턴이에요!"}, {"day": 33, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take care (of ~)", "meaning": "돌보다 / 처리하다 / 조심하다", "situation": "작별 인사를 하거나 누군가를 돌보는 상황", "examples": [{"en": "Take care of yourself.", "pronunciation": "테잌 케어 오브 유어셀프", "ko": "몸 조심하세요.", "context": "작별할 때 건강을 당부할 때"}, {"en": "Can you take care of this for me?", "pronunciation": "캔 유 테잌 케어 오브 디스 포 미", "ko": "이거 저 대신 처리해줄 수 있어요?", "context": "업무를 부탁할 때"}, {"en": "I'll take care of it.", "pronunciation": "아일 테잌 케어 오브 잇", "ko": "제가 처리할게요.", "context": "책임지고 하겠다고 할 때"}, {"en": "She takes good care of her parents.", "pronunciation": "쉬 테잌스 굿 케어 오브 허 페런츠", "ko": "그녀는 부모님을 잘 돌봐요.", "context": "효도하는 사람을 칭찬할 때"}, {"en": "Take care! See you soon.", "pronunciation": "테잌 케어 씨 유 순", "ko": "잘 가요! 곧 봐요.", "context": "헤어질 때 인사할 때"}], "tip": "Take care! = Goodbye! (헤어질 때 인사). Take care of = 돌보다/처리하다. I'll take care of it. = 제가 할게요. 상황에 따라 의미가 달라요."}, {"day": 34, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take a look", "meaning": "살펴보다 / 한번 보다", "situation": "무언가를 확인하거나 검토해달라고 부탁하는 상황", "examples": [{"en": "Can you take a look at this?", "pronunciation": "캔 유 테잌 어 룩 앳 디스", "ko": "이거 한번 봐줄 수 있어요?", "context": "검토를 부탁할 때"}, {"en": "Let me take a look.", "pronunciation": "렛 미 테잌 어 룩", "ko": "제가 한번 볼게요.", "context": "살펴보겠다고 할 때"}, {"en": "Take a look at the menu.", "pronunciation": "테잌 어 룩 앳 더 메뉴", "ko": "메뉴 한번 봐요.", "context": "식당에서 메뉴를 건넬 때"}, {"en": "I'll take a look and get back to you.", "pronunciation": "아일 테잌 어 룩 앤 겟 백 투 유", "ko": "한번 보고 다시 연락드릴게요.", "context": "확인 후 답주겠다고 할 때"}, {"en": "Just take a quick look.", "pronunciation": "저스트 테잌 어 퀵 룩", "ko": "잠깐만 봐봐요.", "context": "간단히 확인 요청할 때"}], "tip": "take a look = have a look = look at. 'Can I take a look?' 은 가게에서 물건 구경할 때도 자주 써요. 'Just looking!'(그냥 구경 중이에요!) 도 함께 외워두세요."}, {"day": 35, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take a photo", "meaning": "사진을 찍다", "situation": "사진 촬영을 요청하거나 사진에 대해 이야기하는 상황", "examples": [{"en": "Can I take a photo?", "pronunciation": "캔 아이 테잌 어 포토", "ko": "사진 찍어도 될까요?", "context": "허락을 구할 때"}, {"en": "Can you take a photo of us?", "pronunciation": "캔 유 테잌 어 포토 오브 어스", "ko": "저희 사진 찍어줄 수 있어요?", "context": "사진을 부탁할 때"}, {"en": "I took a lot of photos on the trip.", "pronunciation": "아이 툭 얼랏 오브 포토스 온 더 트립", "ko": "여행에서 사진을 많이 찍었어요.", "context": "여행 경험을 이야기할 때"}, {"en": "The photo didn't come out well.", "pronunciation": "더 포토 디든 컴 아웃 웰", "ko": "사진이 잘 안 나왔어요.", "context": "사진이 마음에 안 들 때"}, {"en": "Let's take a selfie!", "pronunciation": "렛츠 테잌 어 셀피", "ko": "셀카 찍어요!", "context": "함께 셀카 찍자고 할 때"}], "tip": "take a photo / take a picture — 둘 다 써요. 스마트폰 시대엔 take a photo가 더 자연스러워요. 'Shoot'도 사진 찍다는 뜻이에요 (사진 촬영 맥락에서만)."}, {"day": 36, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take off", "meaning": "벗다 / 이륙하다 / 떠나다", "situation": "옷을 벗거나 비행기가 이륙하는 상황", "examples": [{"en": "Please take off your shoes.", "pronunciation": "플리즈 테잌 오프 유어 슈즈", "ko": "신발을 벗어주세요.", "context": "집이나 신발 벗는 공간에서"}, {"en": "The plane is taking off.", "pronunciation": "더 플레인 이즈 테이킹 오프", "ko": "비행기가 이륙하고 있어요.", "context": "공항·비행기에서"}, {"en": "Take off your jacket — it's warm in here.", "pronunciation": "테잌 오프 유어 재킷 잇츠 웜 인 히어", "ko": "재킷 벗어요 — 여기 따뜻해요.", "context": "실내에서 외투를 벗으라고 할 때"}, {"en": "I need to take off now.", "pronunciation": "아이 니드 투 테잌 오프 나우", "ko": "이제 가야 할 것 같아요.", "context": "자리를 떠나야 할 때"}, {"en": "The business really took off.", "pronunciation": "더 비즈니스 리얼리 툭 오프", "ko": "사업이 정말 날아올랐어요.", "context": "성공적으로 성장했을 때"}], "tip": "take off는 의미가 여러 개! ① 옷을 벗다 ② 비행기 이륙 ③ 자리를 떠나다 ④ (사업 등이) 급성장하다. 맥락이 중요해요!"}, {"day": 37, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take place", "meaning": "일어나다 / 열리다 / 개최되다", "situation": "행사나 사건이 어디서 언제 열리는지 이야기하는 상황", "examples": [{"en": "The event takes place next week.", "pronunciation": "디 이벤트 테잌스 플레이스 넥스트 윅", "ko": "행사가 다음 주에 열려요.", "context": "일정을 알릴 때"}, {"en": "Where did it take place?", "pronunciation": "웨어 디드 잇 테잌 플레이스", "ko": "그게 어디서 있었어요?", "context": "장소를 물을 때"}, {"en": "The meeting will take place online.", "pronunciation": "더 미팅 윌 테잌 플레이스 온라인", "ko": "회의는 온라인으로 진행돼요.", "context": "방식을 알릴 때"}, {"en": "The accident took place at midnight.", "pronunciation": "디 엑시던트 툭 플레이스 앳 미드나잇", "ko": "사고는 자정에 일어났어요.", "context": "사건 발생 시점을 말할 때"}, {"en": "The ceremony takes place every year.", "pronunciation": "더 세레모니 테잌스 플레이스 에브리 이어", "ko": "그 행사는 매년 열려요.", "context": "정기 행사를 설명할 때"}], "tip": "take place = happen. 하지만 take place는 주로 예정된 행사나 공식적인 일에 써요. happen은 더 일반적이고 우연한 일에도 써요."}, {"day": 38, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take it easy", "meaning": "쉬엄쉬엄 하다 / 진정하다", "situation": "무리하지 말고 쉬라고 하거나 진정시키는 상황", "examples": [{"en": "Take it easy!", "pronunciation": "테잌 잇 이지", "ko": "천천히 해요! / 쉬엄쉬엄 해요!", "context": "무리하는 사람에게"}, {"en": "I'm just going to take it easy today.", "pronunciation": "아임 저스트 고잉 투 테잌 잇 이지 투데이", "ko": "오늘은 그냥 쉬엄쉬엄 할 거예요.", "context": "여유로운 하루를 계획할 때"}, {"en": "Take it easy — we have plenty of time.", "pronunciation": "테잌 잇 이지 위 해브 플렌티 오브 타임", "ko": "여유 있게 해요 — 시간 충분해요.", "context": "서두르는 사람을 안심시킬 때"}, {"en": "The doctor told me to take it easy.", "pronunciation": "더 닥터 톨드 미 투 테잌 잇 이지", "ko": "의사가 무리하지 말라고 했어요.", "context": "몸이 안 좋아 쉬어야 할 때"}, {"en": "Hey, take it easy! I didn't mean it.", "pronunciation": "헤이 테잌 잇 이지 아이 디든 민 잇", "ko": "진정해요! 그런 뜻이 아니었어요.", "context": "흥분한 사람을 달랠 때"}], "tip": "Take it easy! 는 헤어질 때 인사로도 써요. 'See you!' 'Take it easy!' 처럼요. 또 흥분한 사람에게 '진정해'라는 뜻으로도 써요."}, {"day": 39, "type": "학습", "part": "PART 4 — TAKE", "pattern": "take turns", "meaning": "번갈아 하다 / 교대로 하다", "situation": "서로 돌아가며 무언가를 하는 상황", "examples": [{"en": "Let's take turns.", "pronunciation": "렛츠 테잌 턴즈", "ko": "번갈아 가며 해요.", "context": "공평하게 나눠 하자고 할 때"}, {"en": "We take turns cooking.", "pronunciation": "위 테잌 턴즈 쿠킹", "ko": "저희는 번갈아 요리해요.", "context": "생활 방식을 설명할 때"}, {"en": "The kids should take turns.", "pronunciation": "더 키즈 슈드 테잌 턴즈", "ko": "아이들이 차례를 지켜야 해요.", "context": "아이들에게 순서를 가르칠 때"}, {"en": "Can we take turns driving?", "pronunciation": "캔 위 테잌 턴즈 드라이빙", "ko": "운전 번갈아 할 수 있어요?", "context": "장거리 운전 중 교대를 제안할 때"}, {"en": "We took turns speaking in English.", "pronunciation": "위 툭 턴즈 스피킹 인 잉글리쉬", "ko": "우리는 영어로 번갈아 말했어요.", "context": "영어 연습 방법을 이야기할 때"}], "tip": "take turns + 동명사(~ing) = 번갈아 ~하다. It's your turn.(당신 차례예요.) My turn!(제 차례예요!) turn 하나로도 많이 써요."}, {"day": 40, "type": "복습", "part": "PART 4 — TAKE 총정리", "pattern": "TAKE 복습", "meaning": "Day 31~39 핵심 표현 총정리", "situation": "TAKE 동사 9가지 표현을 상황별로 복습", "examples": [{"en": "Let's take a break — it's going to take time.", "pronunciation": "렛츠 테잌 어 브레잌 잇츠 고잉 투 테잌 타임", "ko": "쉬어요 — 시간이 걸릴 거예요.", "context": "take a break + take time 콤보"
